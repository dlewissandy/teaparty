<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TeaParty — Configuration</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="content" class="app-pane active" style="overflow-y:auto"></div>

<script>
var omConvId = 'om:unknown';

function openChat(convId) {
  window.location.href = 'chat.html?conv=' + encodeURIComponent(convId);
}

function openChatWithSeed(convId, seed) {
  var url = 'chat.html?conv=' + encodeURIComponent(convId);
  if (seed) url += '&seed=' + encodeURIComponent(seed);
  window.location.href = url;
}

var AVAILABLE_TOOLS = ['Read', 'Glob', 'Grep', 'Bash', 'Write', 'Edit',
  'WebSearch', 'WebFetch', 'Send', 'Reply', 'TodoRead', 'TodoWrite',
  'NotebookRead', 'NotebookEdit'];
var _agentCtx = null;

function patchCurrentAgent(updates) {
  if (!_agentCtx) return;
  var url = '/api/agents/' + encodeURIComponent(_agentCtx.name);
  if (_agentCtx.projectSlug) url += '?project=' + encodeURIComponent(_agentCtx.projectSlug);
  fetch(url, {
    method: 'PATCH',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(updates),
  });
}

function saveAgentField(field, value) {
  if (!_agentCtx) return;
  _agentCtx.fm[field] = value;
  var update = {};
  update[field] = value;
  patchCurrentAgent(update);
}

function toggleAgentSkill(skill) {
  if (!_agentCtx) return;
  var skills = Array.isArray(_agentCtx.fm.skills) ? _agentCtx.fm.skills.slice() : [];
  var idx = skills.indexOf(skill);
  if (idx >= 0) skills.splice(idx, 1);
  else skills.push(skill);
  _agentCtx.fm.skills = skills;
  patchCurrentAgent({skills: skills});
  _renderAgentContent();
}

function toggleAgentTool(tool) {
  if (!_agentCtx) return;
  var tools = (_agentCtx.fm.tools || '').split(',').map(function(t){ return t.trim(); }).filter(Boolean);
  var idx = tools.indexOf(tool);
  if (idx >= 0) tools.splice(idx, 1);
  else tools.push(tool);
  _agentCtx.fm.tools = tools.join(', ');
  patchCurrentAgent({tools: _agentCtx.fm.tools});
  _renderAgentContent();
}

function setAgentPermissionMode(mode) {
  if (!_agentCtx) return;
  _agentCtx.fm.permissionMode = mode;
  patchCurrentAgent({permissionMode: mode});
  _renderAgentContent();
}

function _renderAgentContent() {
  if (!_agentCtx) return;
  var fm = _agentCtx.fm;
  var catalog = _agentCtx.catalog;
  var name = _agentCtx.name;
  var projectSlug = _agentCtx.projectSlug;

  function escAttr(s) {
    return String(s || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  var breadcrumb = '<div class="breadcrumb-bar"><a onclick="configNav(\'global\')" style="cursor:pointer">Global Config</a>';
  if (projectSlug) {
    breadcrumb += ' <span>/</span> <a onclick="configNav(\'project\',\'' + projectSlug + '\')" style="cursor:pointer">' + projectSlug + '</a>';
  }
  breadcrumb += ' <span>/</span> <a>' + name + '</a></div>';

  var identityItems = [
    '<div class="item"><div class="item-icon icon-member">&#9672;</div><div class="item-body" style="width:100%;padding-right:8px"><input value="' + escAttr(fm.name) + '" placeholder="agent name" onblur="saveAgentField(\'name\', this.value)" style="width:100%;background:none;border:none;border-bottom:1px solid var(--border-color);color:var(--text);font-size:13px;padding:2px 0;outline:none"></div></div>',
    '<div class="item"><div class="item-icon" style="background:transparent"></div><div class="item-body" style="width:100%;padding-right:8px"><input value="' + escAttr(fm.description) + '" placeholder="description \u2014 dispatch signal for leads" onblur="saveAgentField(\'description\', this.value)" style="width:100%;background:none;border:none;border-bottom:1px solid var(--border-color);color:var(--text-dim);font-size:11px;padding:2px 0;outline:none"></div></div>',
  ];

  var validModels = ['claude-opus-4-6', 'claude-sonnet-4-6', 'claude-haiku-4-5',
    'claude-opus-4-5', 'claude-sonnet-4-5', 'opus', 'sonnet', 'haiku'];
  var modelOpts = validModels.map(function(m) {
    return '<option value="' + m + '"' + (fm.model === m ? ' selected' : '') + '>' + m + '</option>';
  }).join('');
  var settingsItems = [
    '<div class="item"><div class="item-icon icon-hook">&#9881;</div><div class="item-body"><div class="item-title">Model</div></div><select class="role-select" onchange="saveAgentField(\'model\', this.value)">' + modelOpts + '</select></div>',
    '<div class="item"><div class="item-icon" style="background:transparent"></div><div class="item-body"><div class="item-title">Max Turns</div></div><input type="number" value="' + escAttr(fm.maxTurns) + '" min="1" max="100" onblur="var v=parseInt(this.value);if(v>0)saveAgentField(\'maxTurns\',v);" style="width:60px;background:none;border:1px solid var(--border-color);color:var(--text);font-size:11px;padding:2px 4px;border-radius:3px;text-align:right"></div>',
  ];

  var allSkills = catalog.skills || [];
  var activeSkillSet = new Set(Array.isArray(fm.skills) ? fm.skills : []);
  var skillItems = allSkills.map(function(s) {
    var sName = typeof s === 'object' ? s.name : s;
    var isActive = activeSkillSet.has(sName);
    var cls = isActive ? ' item-catalog-active' : ' item-catalog-inactive';
    var toggle = '<span class="catalog-toggle' + (isActive ? ' toggle-on' : '') + '" onclick="event.stopPropagation();toggleAgentSkill(\'' + sName + '\')"></span>';
    return '<div class="item' + cls + '"><div class="item-icon icon-skill">&#9881;</div><div class="item-body"><div class="item-title">' + sName + '</div></div>' + toggle + '</div>';
  });

  var activeToolsSet = new Set(
    (fm.tools || '').split(',').map(function(t){ return t.trim(); }).filter(Boolean)
  );
  var toolItems = AVAILABLE_TOOLS.map(function(tool) {
    var isActive = activeToolsSet.has(tool);
    var cls = isActive ? ' item-catalog-active' : ' item-catalog-inactive';
    var toggle = '<span class="catalog-toggle' + (isActive ? ' toggle-on' : '') + '" onclick="event.stopPropagation();toggleAgentTool(\'' + tool + '\')"></span>';
    return '<div class="item' + cls + '"><div class="item-icon icon-member">&#9679;</div><div class="item-body"><div class="item-title">' + tool + '</div></div>' + toggle + '</div>';
  });

  var validModes = ['default', 'acceptEdits', 'plan'];
  var currentMode = fm.permissionMode || 'default';
  var permItems = validModes.map(function(mode) {
    var isActive = currentMode === mode;
    var cls = isActive ? ' item-catalog-active' : '';
    return '<div class="item' + cls + '" onclick="setAgentPermissionMode(\'' + mode + '\')" style="cursor:pointer"><div class="item-icon">&#9679;</div><div class="item-body"><div class="item-title">' + mode + '</div></div></div>';
  });

  var agentConvId = 'agent:' + name;
  var chatItems = [
    '<div class="item" onclick="openChat(\'' + agentConvId + '\')" style="cursor:pointer"><div class="item-icon" style="background:rgba(78,204,163,0.15);color:var(--green)">&#9654;</div><div class="item-body"><div class="item-title">Chat with Config Lead</div><div class="item-meta">Edit prose body, discuss changes</div></div></div>',
  ];

  document.title = 'TeaParty \u2014 ' + name + ' Agent';
  document.getElementById('content').innerHTML =
    breadcrumb +
    '<div class="pane-title">' + name + '</div>' +
    '<div class="pane-description">' + escAttr(fm.description || '') + '</div>' +
    '<div class="sections">' +
      sectionCard('Identity', identityItems, {}) +
      sectionCard('Settings', settingsItems, {}) +
      sectionCard('Skills', skillItems, {empty: 'No skills in catalog'}) +
      sectionCard('Tools', toolItems, {empty: 'No tools available'}) +
      sectionCard('Permissions', permItems, {}) +
      sectionCard('Chat', chatItems, {}) +
    '</div>';
}

async function renderAgent(name, projectSlug) {
  showLoading();
  var agentUrl = '/api/agents/' + encodeURIComponent(name);
  if (projectSlug) agentUrl += '?project=' + encodeURIComponent(projectSlug);
  var catalogUrl = '/api/catalog/' + (projectSlug ? encodeURIComponent(projectSlug) : 'org');
  var fm, catalog;
  try {
    var [agentResp, catalogResp] = await Promise.all([
      fetch(agentUrl),
      fetch(catalogUrl),
    ]);
    if (!agentResp.ok) {
      var err = await agentResp.json();
      showError('Agent not found: ' + (err.error || name));
      return;
    }
    fm = await agentResp.json();
    catalog = catalogResp.ok ? await catalogResp.json() : {agents: [], skills: [], hooks: []};
  } catch (e) {
    showError('Failed to load agent: ' + e.message);
    return;
  }
  _agentCtx = {name: fm.name || name, projectSlug: projectSlug || null, fm: fm, catalog: catalog};
  _renderAgentContent();
}

function configNav(level, nameOrSlug, extra) {
  if (level === 'global') {
    history.pushState({}, '', 'config.html');
    renderGlobal();
  } else if (level === 'project') {
    history.pushState({}, '', 'config.html?project=' + encodeURIComponent(nameOrSlug));
    renderProject(nameOrSlug);
  } else if (level === 'workgroup') {
    var projectSlug = extra || null;
    var url = 'config.html?workgroup=' + encodeURIComponent(nameOrSlug);
    if (projectSlug) url += '&project=' + encodeURIComponent(projectSlug);
    history.pushState({}, '', url);
    renderWorkgroup(nameOrSlug, projectSlug);
  } else if (level === 'agent') {
    var projectSlug = extra || null;
    var url = 'config.html?agent=' + encodeURIComponent(nameOrSlug);
    if (projectSlug) url += '&project=' + encodeURIComponent(projectSlug);
    history.pushState({}, '', url);
    renderAgent(nameOrSlug, projectSlug);
  }
}

async function setParticipantRole(scope, name, role, projectSlug) {
  var url;
  if (scope === 'global') {
    url = '/api/config/management/participant';
  } else if (scope.startsWith('wg:')) {
    var wgName = scope.slice(3);
    url = '/api/workgroups/' + encodeURIComponent(wgName) + '/participant';
    if (projectSlug) url += '?project=' + encodeURIComponent(projectSlug);
  } else {
    url = '/api/config/' + encodeURIComponent(scope) + '/participant';
  }
  await fetch(url, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({name: name, role: role}),
  });
}

async function toggleMembership(scope, type, name, active, projectSlug) {
  var url;
  if (scope === 'global') {
    url = '/api/config/management/toggle';
  } else if (scope.startsWith('wg:')) {
    var wgName = scope.slice(3);
    url = '/api/workgroups/' + encodeURIComponent(wgName) + '/toggle';
    if (projectSlug) url += '?project=' + encodeURIComponent(projectSlug);
  } else {
    url = '/api/config/' + encodeURIComponent(scope) + '/toggle';
  }
  await fetch(url, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({type: type, name: name, active: active}),
  });
  if (scope === 'global') {
    renderGlobal();
  } else if (scope.startsWith('wg:')) {
    renderWorkgroup(scope.slice(3), projectSlug || null);
  } else {
    renderProject(scope);
  }
}

function sectionCard(title, items, opts) {
  var buttons = '';
  if (opts && opts.addProjectBtn) {
    buttons += '<button class="action-btn" onclick="openChatWithSeed(\'om:add-project\', \'Please run the /add-project skill.\')">+ Add</button>';
    buttons += '<button class="action-btn" onclick="openChatWithSeed(\'om:new-project\', \'Please run the /create-project skill.\')">+ New</button>';
  } else {
    if (opts && opts.addBtn) buttons += '<button class="action-btn" onclick="openChat(\'' + omConvId + '\')">+ New</button>';
  }
  if (opts && opts.catalogBtn) buttons += '<button class="action-btn" style="background:rgba(78,204,163,0.15);color:var(--green)" onclick="openChat(\'' + omConvId + '\')">+ Catalog</button>';
  if (opts && opts.pinBtn) buttons += '<button class="action-btn" onclick="openChatWithSeed(\'' + omConvId + '\', \'Please pin a path to the artifact viewer for this project.\')">+ Pin</button>';
  var body = items.length === 0 ? '<div class="empty">' + (opts && opts.empty || 'None') + '</div>' : items.join('');
  return '<div class="section"><div class="section-header">' + title + '<span style="flex:1"></span>' + buttons + '</div><div class="section-scroll">' + body + '</div></div>';
}

function sourceBadge(source) {
  if (!source) return '';
  return '<span class="source-badge source-' + source + '">' + source + '</span>';
}

function overrideBadge(overrides) {
  if (!overrides || overrides.length === 0) return '';
  return '<span class="override-indicator">' + overrides.join(', ') + ' overridden</span>';
}

function showError(msg) {
  document.getElementById('content').innerHTML =
    '<div style="padding:24px;color:var(--text-dim);font-size:11px">' + msg + '</div>';
}

function showLoading() {
  document.getElementById('content').innerHTML =
    '<div style="padding:24px;color:var(--text-dim);font-size:11px">Loading...</div>';
}

async function renderGlobal() {
  showLoading();
  var configData, workgroupsData, artifactsData;
  try {
    var [cfgResp, wgResp] = await Promise.all([
      fetch('/api/config'),
      fetch('/api/workgroups'),
    ]);
    configData = await cfgResp.json();
    workgroupsData = await wgResp.json();
  } catch (e) {
    showError('Failed to load configuration: ' + e.message);
    return;
  }

  try {
    var artResp = await fetch('/api/artifacts/org');
    artifactsData = artResp.ok ? await artResp.json() : {};
  } catch (e) {
    artifactsData = {};
  }

  var m = configData.management_team || {};
  var projects = configData.projects || [];
  omConvId = m.decider ? 'om:' + m.decider : 'om:unknown';

  document.title = 'TeaParty \u2014 Global Configuration';

  var projectItems = projects.map(function(p) {
    var isActive = p.active !== false;
    var cls = isActive ? ' item-catalog-active' : ' item-catalog-inactive';
    var cardClick = ' onclick="configNav(\'project\',\'' + p.name + '\')" style="cursor:pointer"';
    var toggle = '<span class="catalog-toggle' + (isActive ? ' toggle-on' : '') + '" onclick="event.stopPropagation();toggleMembership(\'global\', \'project\', \'' + p.name + '\', ' + !isActive + ')"></span>';
    return '<div class="item' + cls + '"' + cardClick + '><div class="item-icon icon-project">&#9654;</div><div class="item-body"><div class="item-title">' + p.name + '</div><div class="item-meta">' + (p.path || '') + '</div></div>' + toggle + '</div>';
  });

  var wgItems = (workgroupsData || []).map(function(w) {
    var isActive = w.active !== false;
    var cls = isActive ? ' item-catalog-active' : ' item-catalog-inactive';
    var cardClick = ' onclick="configNav(\'workgroup\',\'' + w.name + '\')" style="cursor:pointer"';
    var toggle = '<span class="catalog-toggle' + (isActive ? ' toggle-on' : '') + '" onclick="event.stopPropagation();toggleMembership(\'global\', \'workgroup\', \'' + w.name + '\', ' + !isActive + ')"></span>';
    return '<div class="item' + cls + '"' + cardClick + '><div class="item-icon icon-workgroup">&#9670;</div><div class="item-body"><div class="item-title">' + w.name + '</div><div class="item-meta">' + (w.description || '') + '</div><div class="item-meta">' + (w.lead || '') + (w.agents_count != null ? ' &middot; ' + w.agents_count + ' agents' : '') + '</div></div>' + toggle + '</div>';
  });

  var agentItems = (m.agents || []).map(function(a) {
    var name = typeof a === 'object' ? a.name : a;
    var isActive = typeof a === 'object' ? a.active !== false : true;
    var cls = isActive ? ' item-catalog-active' : ' item-catalog-inactive';
    var cardClick = ' onclick="configNav(\'agent\',\'' + name + '\')" style="cursor:pointer"';
    var toggle = '<span class="catalog-toggle' + (isActive ? ' toggle-on' : '') + '" onclick="event.stopPropagation();toggleMembership(\'global\', \'agent\', \'' + name + '\', ' + !isActive + ')"></span>';
    return '<div class="item' + cls + '"' + cardClick + '><div class="item-icon icon-member">&#9672;</div><div class="item-body"><div class="item-title">' + name + '</div></div>' + toggle + '</div>';
  });

  var participantItems = [];
  if (m.lead) {
    participantItems.push('<div class="item" onclick="openChat(\'' + omConvId + '\')"><div class="item-icon icon-member">&#9733;</div><div class="item-body"><div class="item-title">Office Manager</div><div class="item-meta">' + m.lead + ' &middot; org-level coordination</div></div></div>');
  }
  (m.humans || []).forEach(function(h) {
    var sel = ['decider','advisor','inform','none'].map(function(r) {
      return '<option value="' + r + '"' + (h.role === r ? ' selected' : '') + '>' + r + '</option>';
    }).join('');
    participantItems.push('<div class="item"><div class="item-icon icon-member">&#9786;</div><div class="item-body"><div class="item-title">' + h.name + '</div></div><select class="role-select" onchange="setParticipantRole(\'global\',\'' + h.name + '\',this.value)">' + sel + '</select></div>');
  });

  var orgArtifactItems = Object.keys(artifactsData).map(function(heading) {
    return '<div class="item" onclick="window.open(\'artifacts.html?project=org\',\'_blank\')" style="background:rgba(78,204,163,0.03)"><div class="item-icon" style="background:rgba(78,204,163,0.15);color:var(--green)">&#9654;</div><div class="item-body"><div class="item-title">' + heading + '</div></div></div>';
  });

  var skillItems = (m.skills || []).map(function(s) {
    var name = typeof s === 'object' ? s.name : s;
    var file = typeof s === 'object' ? s.file : null;
    var isActive = typeof s === 'object' ? s.active !== false : true;
    var cls = isActive ? ' item-catalog-active' : ' item-catalog-inactive';
    var cardClick = file ? ' onclick="window.open(\'artifacts.html?file=\' + encodeURIComponent(\'' + file + '\'),\'_blank\')" style="cursor:pointer"' : '';
    var toggle = '<span class="catalog-toggle' + (isActive ? ' toggle-on' : '') + '" onclick="event.stopPropagation();toggleMembership(\'global\', \'skill\', \'' + name + '\', ' + !isActive + ')"></span>';
    return '<div class="item' + cls + '"' + cardClick + '><div class="item-icon icon-skill">&#9881;</div><div class="item-body"><div class="item-title">' + name + '</div></div>' + toggle + '</div>';
  });

  var hookItems = (m.hooks || []).map(function(h) {
    var isActive = h.active !== false;
    var cls = isActive ? ' item-catalog-active' : ' item-catalog-inactive';
    var meta = '&project=org' +
      (h.event ? '&hook_event=' + encodeURIComponent(h.event) : '') +
      (h.matcher ? '&hook_matcher=' + encodeURIComponent(h.matcher) : '') +
      (h.type ? '&hook_type=' + encodeURIComponent(h.type) : '');
    var cardClick = h.file ? ' onclick="window.open(\'artifacts.html?file=\' + encodeURIComponent(\'' + h.file + '\') + \'' + meta + '\',\'_blank\')" style="cursor:pointer"' : '';
    var toggle = (h.source === 'yaml')
      ? '<span class="catalog-toggle' + (isActive ? ' toggle-on' : '') + '" onclick="event.stopPropagation();toggleMembership(\'global\', \'hook\', \'' + (h.event || '') + '\', ' + !isActive + ')"></span>'
      : '';
    return '<div class="item' + cls + '"' + cardClick + '><div class="item-icon icon-hook">&#9889;</div><div class="item-body"><div class="item-title">' + (h.event || '') + (h.matcher ? ' [' + h.matcher + ']' : '') + '</div><div class="item-meta">' + (h.type || '') + '</div></div>' + toggle + '</div>';
  });

  var cronItems = (m.scheduled || []).map(function(c) {
    var isActive = c.enabled !== false;
    var cls = isActive ? ' item-catalog-active' : ' item-catalog-inactive';
    var cardClick = c.file ? ' onclick="window.open(\'artifacts.html?file=\' + encodeURIComponent(\'' + c.file + '\') + \'&project=org\',\'_blank\')" style="cursor:pointer"' : '';
    var toggle = '<span class="catalog-toggle' + (isActive ? ' toggle-on' : '') + '" onclick="event.stopPropagation();toggleMembership(\'global\', \'scheduled_task\', \'' + c.name + '\', ' + !isActive + ')"></span>';
    return '<div class="item' + cls + '"' + cardClick + '><div class="item-icon icon-cron">&#9200;</div><div class="item-body"><div class="item-title">' + c.name + '</div><div class="item-meta">' + c.schedule + (c.skill ? ' &middot; ' + c.skill : '') + '</div></div>' + toggle + '</div>';
  });

  var subtitle = projects.length + ' projects &middot; ' + (workgroupsData || []).length + ' workgroups &middot; ' + (m.agents || []).length + ' agents';

  document.getElementById('content').innerHTML =
    '<div class="pane-title">Global Configuration</div>' +
    '<div class="pane-description">' + (m.description || 'Organization catalog. Workgroups, agents, and skills defined here can be assembled into projects.') + '</div>' +
    '<div class="pane-subtitle">' + subtitle + '</div>' +
    '<div class="sections">' +
      sectionCard('Projects', projectItems, { addProjectBtn: true }) +
      sectionCard('Workgroups', wgItems, { addBtn: true, empty: 'No org-level workgroups' }) +
      sectionCard('Agents', agentItems, { addBtn: true }) +
      sectionCard('Participants', participantItems) +
      sectionCard('Artifacts', orgArtifactItems, { empty: 'No organizational artifacts' }) +
      sectionCard('Skills', skillItems, { addBtn: true }) +
      sectionCard('Hooks', hookItems, { addBtn: true }) +
      sectionCard('Scheduled Tasks', cronItems, { addBtn: true }) +
    '</div>';
}

async function renderProject(slug) {
  showLoading();
  var projectData, artifactsData, pinsData;
  try {
    var projResp = await fetch('/api/config/' + encodeURIComponent(slug));
    projectData = await projResp.json();
    if (!projResp.ok) {
      showError('Project not found: ' + (projectData.error || slug));
      return;
    }
  } catch (e) {
    showError('Failed to load project configuration: ' + e.message);
    return;
  }

  try {
    var [artResp, pinsResp] = await Promise.all([
      fetch('/api/artifacts/' + encodeURIComponent(slug)),
      fetch('/api/artifacts/' + encodeURIComponent(slug) + '/pins'),
    ]);
    artifactsData = artResp.ok ? await artResp.json() : {};
    pinsData = pinsResp.ok ? await pinsResp.json() : [];
  } catch (e) {
    artifactsData = {};
    pinsData = [];
  }

  var team = projectData.team || {};
  var workgroups = projectData.workgroups || [];

  omConvId = team.decider ? 'om:' + team.decider : 'om:unknown';

  document.title = 'TeaParty \u2014 ' + (team.name || slug) + ' Configuration';

  var wgItems = workgroups.map(function(w) {
    var src = sourceBadge(w.source);
    var ovr = overrideBadge(w.overrides);
    var agentInfo = w.agents_count != null ? w.agents_count + ' agents' : '';
    if (w.name.toLowerCase() === 'configuration') {
      return '<div class="item" onclick="configNav(\'workgroup\',\'' + w.name + '\',\'' + slug + '\')"><div class="item-icon icon-config">&#9881;</div><div class="item-body"><div class="item-title">' + w.name + ' ' + src + '</div><div class="item-meta">config &middot; ' + (w.lead || '') + '</div></div></div>';
    }
    var isActive = w.active === true;
    var cls = isActive ? ' item-catalog-active' : ' item-catalog-inactive';
    var cardClick = ' onclick="configNav(\'workgroup\',\'' + w.name + '\',\'' + slug + '\')" style="cursor:pointer"';
    var toggle = '<span class="catalog-toggle' + (isActive ? ' toggle-on' : '') + '" onclick="event.stopPropagation();toggleMembership(\'' + slug + '\', \'workgroup\', \'' + w.name + '\', ' + !isActive + ')"></span>';
    return '<div class="item' + cls + '"' + cardClick + '><div class="item-icon icon-workgroup">&#9670;</div><div class="item-body"><div class="item-title">' + w.name + ' ' + src + ' ' + ovr + '</div><div class="item-meta">' + (w.lead || '') + (agentInfo ? ' &middot; ' + agentInfo : '') + '</div></div>' + toggle + '</div>';
  });

  var agentItems = (team.agents || []).map(function(a) {
    var name = typeof a === 'object' ? a.name : a;
    var source = typeof a === 'object' ? a.source : null;
    var isActive = typeof a === 'object' ? a.active !== false : true;
    var src = sourceBadge(source);
    var cls = isActive ? ' item-catalog-active' : ' item-catalog-inactive';
    var cardClick = ' onclick="configNav(\'agent\',\'' + name + '\',\'' + slug + '\')" style="cursor:pointer"';
    var toggle = '<span class="catalog-toggle' + (isActive ? ' toggle-on' : '') + '" onclick="event.stopPropagation();toggleMembership(\'' + slug + '\', \'agent\', \'' + name + '\', ' + !isActive + ')"></span>';
    return '<div class="item' + cls + '"' + cardClick + '><div class="item-icon icon-member">&#9672;</div><div class="item-body"><div class="item-title">' + name + ' ' + src + '</div></div>' + toggle + '</div>';
  });

  var participantItems = [];
  var managerConvId = team.decider ? 'manager:' + team.decider : 'manager:unknown';
  if (team.lead) {
    participantItems.push('<div class="item" onclick="openChat(\'' + managerConvId + '\')"><div class="item-icon icon-member">&#9733;</div><div class="item-body"><div class="item-title">Manager</div><div class="item-meta">' + team.lead + ' &middot; operational control</div></div></div>');
  }
  (team.humans || []).forEach(function(h) {
    var sel = ['decider','advisor','inform','none'].map(function(r) {
      return '<option value="' + r + '"' + (h.role === r ? ' selected' : '') + '>' + r + '</option>';
    }).join('');
    participantItems.push('<div class="item"><div class="item-icon icon-member">&#9786;</div><div class="item-body"><div class="item-title">' + h.name + '</div></div><select class="role-select" onchange="setParticipantRole(\'' + slug + '\',\'' + h.name + '\',this.value)">' + sel + '</select></div>');
  });

  var artifactItems = Object.keys(artifactsData).map(function(heading) {
    return '<div class="item" onclick="window.open(\'artifacts.html?project=' + encodeURIComponent(slug) + '\',\'_blank\')" style="background:rgba(78,204,163,0.03)"><div class="item-icon" style="background:rgba(78,204,163,0.15);color:var(--green)">&#9654;</div><div class="item-body"><div class="item-title">' + heading + '</div></div></div>';
  });

  var skillItems = (team.skills || []).map(function(s) {
    var name = typeof s === 'object' ? s.name : s;
    var file = typeof s === 'object' ? s.file : null;
    var source = typeof s === 'object' ? s.source : null;
    var isActive = typeof s === 'object' ? s.active !== false : true;
    var src = sourceBadge(source);
    var cls = isActive ? ' item-catalog-active' : ' item-catalog-inactive';
    var cardClick = file ? ' onclick="window.open(\'artifacts.html?file=\' + encodeURIComponent(\'' + file + '\'),\'_blank\')" style="cursor:pointer"' : '';
    var toggle = '<span class="catalog-toggle' + (isActive ? ' toggle-on' : '') + '" onclick="event.stopPropagation();toggleMembership(\'' + slug + '\', \'skill\', \'' + name + '\', ' + !isActive + ')"></span>';
    return '<div class="item' + cls + '"' + cardClick + '><div class="item-icon icon-skill">&#9881;</div><div class="item-body"><div class="item-title">' + name + ' ' + src + '</div></div>' + toggle + '</div>';
  });

  var hookItems = (team.hooks || []).map(function(h) {
    var isActive = h.active !== false;
    var cls = isActive ? ' item-catalog-active' : ' item-catalog-inactive';
    var meta = '&project=' + encodeURIComponent(slug) +
      (h.event ? '&hook_event=' + encodeURIComponent(h.event) : '') +
      (h.matcher ? '&hook_matcher=' + encodeURIComponent(h.matcher) : '') +
      (h.type ? '&hook_type=' + encodeURIComponent(h.type) : '');
    var cardClick = h.file ? ' onclick="window.open(\'artifacts.html?file=\' + encodeURIComponent(\'' + h.file + '\') + \'' + meta + '\',\'_blank\')" style="cursor:pointer"' : '';
    var toggle = (h.source === 'yaml')
      ? '<span class="catalog-toggle' + (isActive ? ' toggle-on' : '') + '" onclick="event.stopPropagation();toggleMembership(\'' + slug + '\', \'hook\', \'' + (h.event || '') + '\', ' + !isActive + ')"></span>'
      : '';
    return '<div class="item' + cls + '"' + cardClick + '><div class="item-icon icon-hook">&#9889;</div><div class="item-body"><div class="item-title">' + (h.event || '') + (h.matcher ? ' [' + h.matcher + ']' : '') + '</div><div class="item-meta">' + (h.type || '') + '</div></div>' + toggle + '</div>';
  });

  var cronItems = (team.scheduled || []).map(function(c) {
    var isActive = c.enabled !== false;
    var cls = isActive ? ' item-catalog-active' : ' item-catalog-inactive';
    var cardClick = c.file ? ' onclick="window.open(\'artifacts.html?file=\' + encodeURIComponent(\'' + c.file + '\') + \'&project=' + encodeURIComponent(slug) + '\',\'_blank\')" style="cursor:pointer"' : '';
    var toggle = '<span class="catalog-toggle' + (isActive ? ' toggle-on' : '') + '" onclick="event.stopPropagation();toggleMembership(\'' + slug + '\', \'scheduled_task\', \'' + c.name + '\', ' + !isActive + ')"></span>';
    return '<div class="item' + cls + '"' + cardClick + '><div class="item-icon icon-cron">&#9200;</div><div class="item-body"><div class="item-title">' + c.name + '</div><div class="item-meta">' + c.schedule + (c.skill ? ' &middot; ' + c.skill : '') + '</div></div>' + toggle + '</div>';
  });

  var pinItems = (pinsData || []).map(function(p) {
    var icon = p.is_dir ? '&#9654;' : '&#9679;';
    var click = ' onclick="window.open(\'artifacts.html?project=' + encodeURIComponent(slug) + '\',\'_blank\')" style="cursor:pointer"';
    return '<div class="item"' + click + '><div class="item-icon" style="background:rgba(78,204,163,0.15);color:var(--green)">' + icon + '</div><div class="item-body"><div class="item-title">' + p.label + '</div><div class="item-meta">' + p.path + '</div></div></div>';
  });

  document.getElementById('content').innerHTML =
    '<div class="breadcrumb-bar"><a onclick="configNav(\'global\')" style="cursor:pointer">Global Config</a> <span>/</span> <a>' + (team.name || slug) + '</a></div>' +
    '<div class="pane-title">' + (team.name || slug) + '</div>' +
    '<div class="pane-description">' + (team.description || '') + '</div>' +
    '<div class="pane-subtitle">Decider: ' + (team.decider || '') + ' &middot; Lead: ' + (team.lead || '') + '</div>' +
    '<div class="sections">' +
      sectionCard('Workgroups', wgItems, { addBtn: true, catalogBtn: true, empty: 'No workgroups' }) +
      sectionCard('Agents', agentItems, { addBtn: true, catalogBtn: true, empty: 'No agents' }) +
      sectionCard('Participants', participantItems) +
      sectionCard('Artifacts', artifactItems.concat(pinItems), { pinBtn: true, slug: slug, empty: 'No artifacts' }) +
      sectionCard('Skills', skillItems, { addBtn: true, catalogBtn: true, empty: 'No skills' }) +
      sectionCard('Hooks', hookItems, { addBtn: true, empty: 'No project-scoped hooks' }) +
      sectionCard('Scheduled Tasks', cronItems, { addBtn: true, empty: 'No project-scoped tasks' }) +
    '</div>';
}

var _currentWgName = null;
var _currentWgProjectSlug = null;
var _currentWgArtifacts = [];

async function renderWorkgroup(name, projectSlug) {
  showLoading();
  var url = '/api/workgroups/' + encodeURIComponent(name);
  if (projectSlug) url += '?project=' + encodeURIComponent(projectSlug);
  var wgData;
  try {
    var resp = await fetch(url);
    wgData = await resp.json();
    if (!resp.ok) {
      showError('Workgroup not found: ' + (wgData.error || name));
      return;
    }
  } catch (e) {
    showError('Failed to load workgroup: ' + e.message);
    return;
  }

  _currentWgName = name;
  _currentWgProjectSlug = projectSlug || null;
  _currentWgArtifacts = (wgData.artifacts || []).slice();

  document.title = 'TeaParty \u2014 ' + name + ' Workgroup';

  var leadItems = [];
  if (wgData.lead) {
    leadItems.push('<div class="item"><div class="item-icon icon-member">&#9733;</div><div class="item-body"><div class="item-title">' + wgData.lead + '</div><div class="item-meta">workgroup lead</div></div></div>');
  }

  var memberItems = (wgData.agents || []).map(function(a) {
    var aName = a.name;
    var isActive = a.active !== false;
    var src = sourceBadge(a.source);
    var cls = isActive ? ' item-catalog-active' : ' item-catalog-inactive';
    var cardClick = ' onclick="configNav(\'agent\',\'' + aName + '\',\'' + (projectSlug || '') + '\')" style="cursor:pointer"';
    var toggle = '<span class="catalog-toggle' + (isActive ? ' toggle-on' : '') + '" onclick="event.stopPropagation();toggleMembership(\'wg:' + name + '\', \'agent\', \'' + aName + '\', ' + !isActive + ', \'' + (projectSlug || '') + '\')"></span>';
    return '<div class="item' + cls + '"' + cardClick + '><div class="item-icon icon-member">&#9672;</div><div class="item-body"><div class="item-title">' + aName + ' ' + src + '</div><div class="item-meta">' + (a.role || '') + (a.model ? ' &middot; ' + a.model : '') + '</div></div>' + toggle + '</div>';
  });

  var hookItems = (wgData.hooks || []).map(function(h) {
    var isActive = h.active !== false;
    var cls = isActive ? ' item-catalog-active' : ' item-catalog-inactive';
    var toggle = '<span class="catalog-toggle' + (isActive ? ' toggle-on' : '') + '" onclick="event.stopPropagation();toggleMembership(\'wg:' + name + '\', \'hook\', \'' + (h.event || '') + '\', ' + !isActive + ', \'' + (projectSlug || '') + '\')"></span>';
    return '<div class="item' + cls + '"><div class="item-icon icon-hook">&#9889;</div><div class="item-body"><div class="item-title">' + (h.event || '') + (h.matcher ? ' [' + h.matcher + ']' : '') + '</div><div class="item-meta">' + (h.type || '') + '</div></div>' + toggle + '</div>';
  });

  var humanItems = (wgData.humans || []).map(function(h) {
    var sel = ['decider','advisor','inform','none'].map(function(r) {
      return '<option value="' + r + '"' + (h.role === r ? ' selected' : '') + '>' + r + '</option>';
    }).join('');
    return '<div class="item"><div class="item-icon icon-member">&#9786;</div><div class="item-body"><div class="item-title">' + h.name + '</div></div><select class="role-select" onchange="setParticipantRole(\'wg:' + name + '\',\'' + h.name + '\',this.value,\'' + (projectSlug || '') + '\')">' + sel + '</select></div>';
  });

  var artifactItems = (wgData.artifacts || []).map(function(a) {
    var label = typeof a === 'object' ? (a.label || a.path || a) : a;
    var path = typeof a === 'object' ? (a.path || '') : a;
    var unpin = '<span class="catalog-toggle toggle-on" onclick="event.stopPropagation();unpinWorkgroupArtifact(\'' + path.replace(/\\/g, '\\\\').replace(/'/g, "\\'") + '\')"></span>';
    return '<div class="item item-catalog-active"><div class="item-icon" style="background:rgba(78,204,163,0.15);color:var(--green)">&#9654;</div><div class="item-body"><div class="item-title">' + label + '</div><div class="item-meta">' + path + '</div></div>' + unpin + '</div>';
  });

  var contextSection = '';
  if (!projectSlug) {
    try {
      var cfgResp = await fetch('/api/config');
      if (cfgResp.ok) {
        var cfgData = await cfgResp.json();
        var projectItems = (cfgData.projects || []).map(function(p) {
          var isActive = p.active !== false;
          var cls = isActive ? ' item-catalog-active' : ' item-catalog-inactive';
          var cardClick = ' onclick="configNav(\'project\',\'' + p.name + '\')" style="cursor:pointer"';
          var toggle = '<span class="catalog-toggle' + (isActive ? ' toggle-on' : '') + '" onclick="event.stopPropagation();toggleMembership(\'global\', \'project\', \'' + p.name + '\', ' + !isActive + ')"></span>';
          return '<div class="item' + cls + '"' + cardClick + '><div class="item-icon icon-project">&#9654;</div><div class="item-body"><div class="item-title">' + p.name + '</div><div class="item-meta">' + (p.path || '') + '</div></div>' + toggle + '</div>';
        });
        contextSection = sectionCard('Projects', projectItems, { empty: 'No projects' });
      }
    } catch (e) { }
  } else {
    try {
      var prjResp = await fetch('/api/config/' + encodeURIComponent(projectSlug));
      if (prjResp.ok) {
        var prjData = await prjResp.json();
        var subwgItems = (prjData.workgroups || []).map(function(w) {
          var isActive = w.active === true;
          var cls = isActive ? ' item-catalog-active' : ' item-catalog-inactive';
          var cardClick = ' onclick="configNav(\'workgroup\',\'' + w.name + '\',\'' + projectSlug + '\')" style="cursor:pointer"';
          var toggle = '<span class="catalog-toggle' + (isActive ? ' toggle-on' : '') + '" onclick="event.stopPropagation();toggleMembership(\'' + projectSlug + '\', \'workgroup\', \'' + w.name + '\', ' + !isActive + ')"></span>';
          return '<div class="item' + cls + '"' + cardClick + '><div class="item-icon icon-workgroup">&#9670;</div><div class="item-body"><div class="item-title">' + w.name + '</div><div class="item-meta">' + (w.lead || '') + '</div></div>' + toggle + '</div>';
        });
        contextSection = sectionCard('Workgroups', subwgItems, { empty: 'No workgroups' });
      }
    } catch (e) { }
  }

  var breadcrumb = '<div class="breadcrumb-bar"><a onclick="configNav(\'global\')" style="cursor:pointer">Global Config</a>';
  if (projectSlug) {
    breadcrumb += ' <span>/</span> <a onclick="configNav(\'project\',\'' + projectSlug + '\')" style="cursor:pointer">' + projectSlug + '</a>';
  }
  breadcrumb += ' <span>/</span> <a>' + name + '</a></div>';

  var sections = '<div class="sections">' +
    sectionCard('Lead', leadItems, { empty: 'No lead assigned' }) +
    sectionCard('Members', memberItems, { addBtn: true, catalogBtn: true, empty: 'No members' }) +
    sectionCard('Hooks', hookItems, { addBtn: true, empty: 'No hooks' }) +
    sectionCard('Humans', humanItems, { empty: 'No humans' }) +
    sectionCard('Artifacts', artifactItems, { addBtn: true, empty: 'No artifacts' }) +
    contextSection +
  '</div>';

  document.getElementById('content').innerHTML =
    breadcrumb +
    '<div class="pane-title">' + name + '</div>' +
    '<div class="pane-description">' + (wgData.description || '') + '</div>' +
    '<div class="pane-subtitle">Lead: ' + (wgData.lead || '') + ' &middot; ' + (wgData.agents_count || 0) + ' members</div>' +
    sections;
}

async function unpinWorkgroupArtifact(path) {
  var updated = (_currentWgArtifacts || []).filter(function(a) {
    var p = typeof a === 'object' ? (a.path || '') : a;
    return p !== path;
  });
  var url = '/api/workgroups/' + encodeURIComponent(_currentWgName);
  if (_currentWgProjectSlug) url += '?project=' + encodeURIComponent(_currentWgProjectSlug);
  await fetch(url, {
    method: 'PATCH',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({artifacts: updated}),
  });
  renderWorkgroup(_currentWgName, _currentWgProjectSlug);
}

var urlParams = new URLSearchParams(window.location.search);
var initAgent = urlParams.get('agent');
var initWorkgroup = urlParams.get('workgroup');
var initProject = urlParams.get('project');
if (initAgent) {
  renderAgent(initAgent, initProject);
} else if (initWorkgroup) {
  renderWorkgroup(initWorkgroup, initProject);
} else if (initProject) {
  renderProject(initProject);
} else {
  renderGlobal();
}
</script>
</body>
</html>
