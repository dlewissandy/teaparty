<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TeaParty — Artifacts</title>
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11.9.0/styles/atom-one-dark.min.css">
<style>
  #content.app-pane { display: flex; flex-direction: column; }
  .artifact-layout { display: flex; flex: 1; min-height: 0; }
  .artifact-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 7px 14px; background: var(--surface2); border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .artifact-header-title { font-size: 13px; font-weight: 600; color: var(--text); }
  .artifact-header-btn {
    font-size: 11px; color: var(--text-dim); cursor: pointer; padding: 2px 6px;
    border-radius: 3px; background: none; border: 1px solid var(--border);
  }
  .artifact-header-btn:hover { color: var(--text); border-color: var(--text-dim); }
  .artifact-nav {
    width: 220px; background: var(--surface); border-right: 1px solid var(--border);
    overflow-y: auto; flex-shrink: 0;
  }
  .artifact-nav-section {
    padding: 6px 10px; font-size: 8px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.5px; color: var(--green); border-bottom: 1px solid var(--border);
    background: rgba(78,204,163,0.03);
  }
  .artifact-nav-item {
    padding: 5px 6px 5px 16px; font-size: 10px; cursor: pointer;
    border-bottom: 1px solid var(--border); color: var(--text-dim);
    display: flex; align-items: center; gap: 4px;
  }
  .artifact-nav-item-label {
    flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .artifact-nav-close {
    flex-shrink: 0; font-size: 11px; line-height: 1; padding: 0 2px;
    color: var(--text-dim); opacity: 0.5;
  }
  .artifact-nav-close:hover { opacity: 1; color: var(--text); }
  .artifact-nav-item:hover { background: rgba(255,255,255,0.03); color: var(--text); }
  .artifact-nav-item.active { background: var(--surface2); color: var(--green); }
  .artifact-main { flex: 1; overflow-y: auto; padding: 16px 24px; }
  .artifact-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .artifact-path { font-size: 9px; color: var(--text-dim); margin-bottom: 12px; font-family: inherit; }
  .artifact-path code { color: var(--green); }
  .artifact-job-link {
    display: inline-block; font-size: 9px; padding: 2px 8px; border-radius: 3px;
    background: rgba(78,204,163,0.15); color: var(--green); cursor: pointer;
    margin-bottom: 12px;
  }
  .artifact-content {
    background: var(--surface); border: 1px solid var(--border); border-radius: 5px;
    padding: 16px; font-size: 11px; line-height: 1.7; color: var(--text-dim);
  }
  .artifact-content h1 { color: var(--text); font-size: 14px; margin: 16px 0 8px 0; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
  .artifact-content h1:first-child { margin-top: 0; }
  .artifact-content h2 { color: var(--text); font-size: 13px; margin: 14px 0 6px 0; }
  .artifact-content h3 { color: var(--text); font-size: 12px; margin: 12px 0 6px 0; }
  .artifact-content h3:first-child { margin-top: 0; }
  .artifact-content h4, .artifact-content h5, .artifact-content h6 { color: var(--text); font-size: 11px; margin: 10px 0 4px 0; }
  .artifact-content p { margin: 6px 0; }
  .artifact-content ul, .artifact-content ol { padding-left: 18px; margin: 4px 0; }
  .artifact-content li { margin: 3px 0; }
  .artifact-content a { color: var(--green); text-decoration: none; }
  .artifact-content a:hover { text-decoration: underline; }
  .artifact-content code { color: var(--green); font-size: 10px; background: rgba(78,204,163,0.08); padding: 1px 4px; border-radius: 2px; }
  .artifact-content pre { background: #282c34; border: 1px solid var(--border); border-radius: 4px; padding: 12px; overflow-x: auto; margin: 8px 0; }
  .artifact-content pre code { padding: 0; font-size: 10px; }
  .artifact-content pre code:not(.hljs) { background: none; color: inherit; }
  /* Code-file view: no outer box, full-width hljs block */
  .artifact-content.code-view { background: none; border: none; padding: 0; }
  .artifact-content.code-view pre { margin: 0; border-radius: 5px; border: none; }
  .artifact-content.code-view pre code.hljs { font-size: 11px; line-height: 1.55; border-radius: 5px; display: block; }
  .artifact-content blockquote { border-left: 3px solid var(--border); margin: 8px 0; padding: 4px 12px; color: var(--text-dim); font-style: italic; }
  .artifact-content hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
  .artifact-content table { border-collapse: collapse; width: 100%; margin: 8px 0; font-size: 10px; }
  .artifact-content th, .artifact-content td { border: 1px solid var(--border); padding: 4px 8px; text-align: left; }
  .artifact-content th { background: var(--surface2); color: var(--text); }
  .artifact-content img { max-width: 100%; }
  .artifact-loading { color: var(--text-dim); font-style: italic; font-size: 11px; padding: 16px; }
  .artifact-empty { color: var(--text-dim); font-style: italic; }
  .artifact-frontmatter {
    background: rgba(78,204,163,0.06); border: 1px solid rgba(78,204,163,0.25);
    border-radius: 5px; padding: 8px 12px; margin-bottom: 10px;
    font-size: 10px; font-family: monospace; line-height: 1.8;
  }
  .artifact-frontmatter-key { color: var(--green); }
  .artifact-frontmatter-val { color: var(--text); }
  .artifact-nav-folder {
    padding: 5px 6px 5px 10px; font-size: 10px; cursor: pointer;
    border-bottom: 1px solid var(--border); color: var(--text-dim);
    display: flex; align-items: center; gap: 4px;
  }
  .artifact-nav-folder:hover { background: rgba(255,255,255,0.03); color: var(--text); }
  .artifact-nav-folder-icon { font-size: 8px; color: var(--green); flex-shrink: 0; }
  .artifact-nav-divider {
    padding: 3px 10px; font-size: 8px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.5px; color: var(--text-dim); border-bottom: 1px solid var(--border);
    border-top: 1px solid var(--border); background: rgba(255,255,255,0.01);
    margin-top: 4px;
  }
</style>
</head>
<body>

<div id="content" class="app-pane active"></div>

<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11.9.0/highlight.min.js"></script>
<script>
var params = new URLSearchParams(window.location.search);
var currentProject = params.get('project') || 'poc';
var requestedFile = params.get('file') || null;
var hookMeta = params.get('hook_event') ? {
  event: params.get('hook_event') || '',
  matcher: params.get('hook_matcher') || '',
  type: params.get('hook_type') || '',
} : null;

var sections = [];     // [{heading, items: [{name, path}]}]
var pinnedNodes = [];  // [{path, label, is_dir, expanded, children}] — config-driven
var selectedFile = null;
var fileContent = null;
var loadError = null;

// ── Helpers ───────────────────────────────────────────────────────────────────

function escHtml(text) {
  return String(text)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function parseMdLinks(text) {
  var items = [];
  var regex = /\[([^\]]+)\]\(([^)]+)\)/g;
  var m;
  while ((m = regex.exec(text)) !== null) {
    var href = m[2];
    if (!href.startsWith('http') && !href.startsWith('#') && !href.startsWith('mailto:')) {
      items.push({name: m[1], path: href});
    }
  }
  return items;
}

function rewriteInternalLinks(html) {
  return html.replace(/href="([^"]+)"/g, function(match, href) {
    if (/^(https?:\/\/|#|mailto:|javascript:)/.test(href)) return match;
    return 'href="javascript:void(0)" onclick="loadFile(\'' + href + '\')"';
  });
}

// Make `filename.ext` code spans clickable — skills use backtick refs for progressive disclosure.
function rewriteCodeFileRefs(html) {
  return html.replace(/<code>([a-zA-Z0-9][a-zA-Z0-9_./-]*\.[a-zA-Z0-9]+)<\/code>/g, function(match, ref) {
    if (/\s/.test(ref)) return match;  // skip anything with whitespace
    return '<code class="file-ref" onclick="loadFile(\'' + ref + '\')" style="cursor:pointer">' + ref + '</code>';
  });
}

function isJobArtifact(path) {
  return path.indexOf('.sessions/') !== -1;
}

function jobConvId(path) {
  var m = path.match(/\.sessions\/([^/]+)\//);
  return m ? m[1] : null;
}

function renderMarkdown(content) {
  var html = marked.parse(content);
  html = rewriteInternalLinks(html);
  html = rewriteCodeFileRefs(html);
  return html;
}

var LANG_ALIASES = {
  yml: 'yaml', sh: 'bash', zsh: 'bash', bash: 'bash',
  js: 'javascript', ts: 'typescript', jsx: 'javascript', tsx: 'typescript',
  rb: 'ruby', rs: 'rust', cpp: 'cpp', h: 'c', hpp: 'cpp',
  cfg: 'ini', txt: 'plaintext',
};

function renderCode(content, ext) {
  var lang = LANG_ALIASES[ext] || ext;
  try {
    if (hljs.getLanguage(lang)) {
      return '<pre><code class="hljs language-' + escHtml(lang) + '">' +
        hljs.highlight(content, {language: lang, ignoreIllegals: true}).value +
        '</code></pre>';
    }
    // Language not in this build — let hljs detect it.
    var result = hljs.highlightAuto(content);
    return '<pre><code class="hljs">' + result.value + '</code></pre>';
  } catch(e) {}
  return '<pre><code>' + escHtml(content) + '</code></pre>';
}

// ── Pinned nodes ──────────────────────────────────────────────────────────────

async function fetchPins() {
  try {
    var resp = await fetch('/api/artifacts/' + encodeURIComponent(currentProject) + '/pins');
    if (!resp.ok) { pinnedNodes = []; return; }
    var data = await resp.json();
    pinnedNodes = data.map(function(p) {
      return {path: p.path, label: p.label, is_dir: p.is_dir, expanded: false, children: null};
    });
  } catch(e) {
    pinnedNodes = [];
  }
}

// Expand/collapse a folder node in the pinned tree. Lazy-loads children.
async function toggleFolder(path) {
  var node = findNode(pinnedNodes, path);
  if (!node) return;
  if (node.expanded) {
    node.expanded = false;
    render();
    return;
  }
  node.expanded = true;
  if (node.children === null) {
    try {
      var resp = await fetch('/api/fs/list?path=' + encodeURIComponent(path));
      if (resp.ok) {
        var data = await resp.json();
        node.children = (data.entries || []).map(function(e) {
          return {path: e.path, label: e.name, is_dir: e.is_dir, expanded: false, children: null};
        });
      } else {
        node.children = [];
      }
    } catch(e) {
      node.children = [];
    }
  }
  render();
}

function findNode(nodes, path) {
  for (var i = 0; i < nodes.length; i++) {
    if (nodes[i].path === path) return nodes[i];
    if (nodes[i].children) {
      var found = findNode(nodes[i].children, path);
      if (found) return found;
    }
  }
  return null;
}

// Expand all ancestor pinned folders that contain path, fetching children as needed.
// Returns true if path is inside (or equal to) a pinned node.
async function expandToPath(path, nodes) {
  nodes = nodes || pinnedNodes;
  for (var i = 0; i < nodes.length; i++) {
    var node = nodes[i];
    if (node.path === path) return true;
    if (node.is_dir && path.startsWith(node.path + '/')) {
      node.expanded = true;
      if (node.children === null) {
        try {
          var resp = await fetch('/api/fs/list?path=' + encodeURIComponent(node.path));
          if (resp.ok) {
            var data = await resp.json();
            node.children = (data.entries || []).map(function(e) {
              return {path: e.path, label: e.name, is_dir: e.is_dir, expanded: false, children: null};
            });
          } else {
            node.children = [];
          }
        } catch(e) {
          node.children = [];
        }
      }
      await expandToPath(path, node.children);
      return true;
    }
  }
  return false;
}

function renderPinnedNodes(nodes, depth) {
  var html = '';
  var indent = (depth * 12) + 'px';
  nodes.forEach(function(node) {
    var escapedPath = node.path.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    if (node.is_dir) {
      var icon = node.expanded ? '&#9660;' : '&#9654;';
      html += '<div class="artifact-nav-folder" style="padding-left:calc(10px + ' + indent + ')" onclick="toggleFolder(\'' + escapedPath + '\')">' +
        '<span class="artifact-nav-folder-icon">' + icon + '</span>' +
        '<span class="artifact-nav-item-label">' + escHtml(node.label) + '</span>' +
        '</div>';
      if (node.expanded && node.children && node.children.length > 0) {
        html += renderPinnedNodes(node.children, depth + 1);
      } else if (node.expanded && node.children !== null && node.children.length === 0) {
        html += '<div class="artifact-nav-item" style="padding-left:calc(16px + ' + indent + ');font-style:italic;cursor:default">(empty)</div>';
      }
    } else {
      var isActive = selectedFile === node.path;
      html += '<div class="artifact-nav-item ' + (isActive ? 'active' : '') + '" style="padding-left:calc(16px + ' + indent + ')" onclick="loadFile(\'' + escapedPath + '\')">' +
        '<span class="artifact-nav-item-label">' + escHtml(node.label) + '</span>' +
        '</div>';
    }
  });
  return html;
}

// ── Rendering ─────────────────────────────────────────────────────────────────

function render() {
  var displayName = currentProject.charAt(0).toUpperCase() + currentProject.slice(1);
  document.title = 'TeaParty \u2014 ' + displayName + ' Artifacts';

  var headerHtml = '<div class="artifact-header">' +
    '<span class="artifact-header-title">' + escHtml(displayName) + ' Artifacts</span>' +
    '<button class="artifact-header-btn" onclick="refresh()" title="Reload from store">\u21ba Refresh</button>' +
    '</div>';

  var navHtml = '<div class="artifact-nav">';

  // ── Pinned section (from config, survives refresh) ────────────────────────
  if (pinnedNodes.length > 0) {
    navHtml += '<div class="artifact-nav-section">Pinned</div>';
    navHtml += renderPinnedNodes(pinnedNodes, 0);
  }

  // ── Documentation sections (from project.md) ──────────────────────────────
  if (sections.length > 0) {
    if (pinnedNodes.length > 0) {
      navHtml += '<div class="artifact-nav-divider">Documentation</div>';
    } else {
      navHtml += '<div class="artifact-nav-section">Documentation</div>';
    }
  }
  sections.forEach(function(sec) {
    if (pinnedNodes.length > 0) {
      navHtml += '<div class="artifact-nav-folder" style="cursor:default;color:var(--text-dim);padding-left:10px">' +
        '<span class="artifact-nav-item-label">' + escHtml(sec.heading) + '</span></div>';
    } else {
      navHtml += '<div class="artifact-nav-section">' + escHtml(sec.heading) + '</div>';
    }
    if (sec.items.length === 0) {
      navHtml += '<div class="artifact-nav-item" style="font-style:italic;cursor:default">(no items)</div>';
    }
    sec.items.forEach(function(item) {
      var isActive = selectedFile === item.path;
      navHtml += '<div class="artifact-nav-item ' + (isActive ? 'active' : '') + '">' +
        '<span class="artifact-nav-item-label" onclick="loadFile(\'' + item.path + '\')">' + escHtml(item.name) + '</span>' +
        '<span class="artifact-nav-close" onclick="closeFile(\'' + item.path + '\')" title="Close">&times;</span>' +
        '</div>';
    });
  });
  navHtml += '</div>';

  var mainHtml = '<div class="artifact-main">';
  if (loadError) {
    mainHtml += '<div class="artifact-loading">' + escHtml(loadError) + '</div>';
  } else if (selectedFile !== null && fileContent === null) {
    mainHtml += '<div class="artifact-loading">Loading\u2026</div>';
  } else if (selectedFile !== null && fileContent !== null) {
    mainHtml += renderFileView(selectedFile, fileContent);
  } else {
    mainHtml += renderOverview();
  }
  mainHtml += '</div>';

  document.getElementById('content').innerHTML =
    headerHtml + '<div class="artifact-layout">' + navHtml + mainHtml + '</div>';

  document.querySelectorAll('.artifact-content pre code:not(.hljs)').forEach(function(el) {
    hljs.highlightElement(el);
  });
}

function renderOverview() {
  var displayName = currentProject.charAt(0).toUpperCase() + currentProject.slice(1);
  var html = '<div class="artifact-title">' + escHtml(displayName) + '</div>';
  html += '<div class="artifact-content">';
  if (sections.length === 0) {
    html += '<p class="artifact-empty">No documentation found for this project.</p>';
  }
  sections.forEach(function(sec) {
    html += '<h3>' + escHtml(sec.heading) + '</h3>';
    if (sec.body) {
      html += renderMarkdown(sec.body);
    } else {
      html += '<p class="artifact-empty">(no content)</p>';
    }
  });
  html += '</div>';
  return html;
}

var IMAGE_EXTS = ['jpg', 'jpeg', 'png', 'gif', 'svg', 'webp'];

function renderFileView(path, content) {
  var filename = path.split('/').pop();
  var ext = filename.includes('.') ? filename.split('.').pop().toLowerCase() : '';
  var codeExts = ['py', 'js', 'ts', 'jsx', 'tsx', 'json', 'yaml', 'yml', 'sh', 'bash', 'zsh',
    'toml', 'cfg', 'ini', 'html', 'css', 'rb', 'rs', 'go', 'java', 'c', 'cpp', 'h',
    'sql', 'xml', 'txt'];
  var fileUrl = '/api/file?path=' + encodeURIComponent(path);

  var html = '';
  html += '<div class="artifact-title">' + escHtml(filename) + '</div>';
  html += '<div class="artifact-path"><code>' + escHtml(path) + '</code></div>';

  if (isJobArtifact(path)) {
    var convId = jobConvId(path);
    if (convId) {
      html += '<div class="artifact-job-link" onclick="openJobChat(' + JSON.stringify(convId) + ')">View job conversation &#8594;</div>';
    }
  }

  if (hookMeta) {
    html += '<div class="artifact-frontmatter">';
    if (hookMeta.event) html += '<div><span class="artifact-frontmatter-key">event: </span><span class="artifact-frontmatter-val">' + escHtml(hookMeta.event) + '</span></div>';
    if (hookMeta.matcher) html += '<div><span class="artifact-frontmatter-key">matcher: </span><span class="artifact-frontmatter-val">' + escHtml(hookMeta.matcher) + '</span></div>';
    if (hookMeta.type) html += '<div><span class="artifact-frontmatter-key">type: </span><span class="artifact-frontmatter-val">' + escHtml(hookMeta.type) + '</span></div>';
    html += '</div>';
  }

  var isCode = codeExts.indexOf(ext) !== -1;
  html += '<div class="artifact-content' + (isCode ? ' code-view' : '') + '">';
  if (ext === 'md') {
    html += renderMarkdown(content);
  } else if (IMAGE_EXTS.indexOf(ext) !== -1) {
    html += '<img src="' + fileUrl + '" style="max-width:100%;height:auto;display:block">';
  } else if (ext === 'pdf') {
    html += '<iframe src="' + fileUrl + '" style="width:100%;height:80vh;border:none"></iframe>';
  } else if (isCode) {
    html += renderCode(content, ext);
  } else {
    html += '<pre><code>' + escHtml(content) + '</code></pre>';
  }
  html += '</div>';

  return html;
}

// ── Actions ───────────────────────────────────────────────────────────────────

async function loadFile(path) {
  // Resolve relative paths against the current file's directory.
  if (selectedFile && !path.startsWith('/')) {
    var dir = selectedFile.substring(0, selectedFile.lastIndexOf('/'));
    path = dir + '/' + path;
  }
  // Normalize away . and .. segments so sibling/cousin paths resolve correctly.
  path = path.split('/').reduce(function(acc, seg) {
    if (seg === '..') { acc.pop(); } else if (seg !== '.') { acc.push(seg); }
    return acc;
  }, []).join('/');
  selectedFile = path;
  fileContent = null;
  loadError = null;

  // Expand ancestor pinned folders to reveal path, then check if it's in the nav.
  var inPinned = await expandToPath(path);
  var inNav = inPinned || sections.some(function(s) {
    return s.items.some(function(i) { return i.path === path; });
  });
  if (!inNav) {
    var name = path.split('/').pop();
    if (sections.length === 0) {
      sections = [{heading: 'File', items: [{name: name, path: path}]}];
    } else {
      sections[0].items.push({name: name, path: path});
    }
  }

  // Binary files (images, PDFs) are rendered directly from URL — no text fetch needed.
  var ext = path.split('.').pop().toLowerCase();
  if (IMAGE_EXTS.indexOf(ext) !== -1 || ext === 'pdf') {
    fileContent = '';  // non-null sentinel: renderFileView uses URL, ignores content
    render();
    return;
  }

  render();

  try {
    var resp = await fetch('/api/file?path=' + encodeURIComponent(path));
    if (!resp.ok) {
      loadError = resp.status === 404 ? 'File not found: ' + path : 'Error loading file (' + resp.status + ')';
    } else {
      fileContent = await resp.text();
    }
  } catch(e) {
    loadError = 'Could not load file: ' + e.message;
  }
  render();
}

function openJobChat(convId) {
  window.open('chat.html?conv=' + encodeURIComponent(convId), '_blank');
}

function closeFile(path) {
  sections = sections.map(function(s) {
    return {heading: s.heading, items: s.items.filter(function(i) { return i.path !== path; }), body: s.body};
  }).filter(function(s) { return s.items.length > 0; });
  if (selectedFile === path) {
    selectedFile = null;
    fileContent = null;
    loadError = null;
    var first = sections.length > 0 && sections[0].items.length > 0 ? sections[0].items[0] : null;
    if (first) { loadFile(first.path); return; }
  }
  render();
}

async function refresh() {
  if (requestedFile) {
    if (selectedFile) loadFile(selectedFile);
    return;
  }
  loadError = null;
  try {
    var [artResp, pinsResp] = await Promise.all([
      fetch('/api/artifacts/' + encodeURIComponent(currentProject)),
      fetch('/api/artifacts/' + encodeURIComponent(currentProject) + '/pins'),
    ]);
    if (pinsResp.ok) {
      var pinsData = await pinsResp.json();
      pinnedNodes = pinsData.map(function(p) {
        return {path: p.path, label: p.label, is_dir: p.is_dir, expanded: false, children: null};
      });
    }
    if (!artResp.ok) {
      loadError = artResp.status === 404
        ? 'No documentation found for project: ' + currentProject
        : 'Error loading project (' + artResp.status + ')';
      render();
      return;
    }
    var data = await artResp.json();
    sections = Object.entries(data).map(function(entry) {
      return {heading: entry[0], items: parseMdLinks(entry[1]), body: entry[1]};
    });
  } catch(e) {
    loadError = 'Could not connect to bridge: ' + e.message;
    render();
    return;
  }
  if (selectedFile) { fileContent = null; loadFile(selectedFile); } else { render(); }
}

// ── Init ──────────────────────────────────────────────────────────────────────

async function init() {
  // File-direct mode: ?file= — populate a synthetic nav entry and load immediately.
  // ?project= sets the title but does not trigger artifact list fetch; the file is what matters.
  if (requestedFile) {
    var filename = requestedFile.split('/').pop();
    sections = [{heading: 'File', items: [{name: filename, path: requestedFile}]}];
    await fetchPins();
    await loadFile(requestedFile);
    return;
  }

  try {
    var [artResp, pinsResp] = await Promise.all([
      fetch('/api/artifacts/' + encodeURIComponent(currentProject)),
      fetch('/api/artifacts/' + encodeURIComponent(currentProject) + '/pins'),
    ]);
    if (pinsResp.ok) {
      var pinsData = await pinsResp.json();
      pinnedNodes = pinsData.map(function(p) {
        return {path: p.path, label: p.label, is_dir: p.is_dir, expanded: false, children: null};
      });
    }
    if (!artResp.ok) {
      loadError = artResp.status === 404
        ? 'No documentation found for project: ' + currentProject
        : 'Error loading project (' + artResp.status + ')';
      render();
      return;
    }
    var data = await artResp.json();
    sections = Object.entries(data).map(function(entry) {
      return {heading: entry[0], items: parseMdLinks(entry[1]), body: entry[1]};
    });
  } catch(e) {
    loadError = 'Could not connect to bridge: ' + e.message;
    render();
    return;
  }

  render();
}

init();
</script>
</body>
</html>
