<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" width="960" height="480" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f1e"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>

    <!-- Phase panel gradients -->
    <linearGradient id="intentGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ecdc4" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#4ecdc4" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="planGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f9c74f" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#f9c74f" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="execGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f07167" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#f07167" stop-opacity="0.06"/>
    </linearGradient>

    <!-- Arrow markers -->
    <marker id="arrowFwd" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0.5 L6,3.5 L0,6.5 Z" fill="#aaaacc" opacity="0.7"/>
    </marker>
    <marker id="arrowBack" markerWidth="7" markerHeight="7" refX="1" refY="3.5" orient="auto">
      <path d="M6,0.5 L0,3.5 L6,6.5 Z" fill="#ff6b6b"/>
    </marker>
    <marker id="arrowLoop" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0.5 L5,3 L0,5.5 Z" fill="#aaaacc" opacity="0.5"/>
    </marker>

    <!-- Drop shadow for panels -->
    <filter id="panelShadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.5"/>
    </filter>

    <!-- Glow for backtrack arrows -->
    <filter id="backtrackGlow" x="-20%" y="-80%" width="140%" height="260%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ═══════════════════ BACKGROUND ═══════════════════ -->
  <rect width="960" height="480" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="80" x2="960" y2="80"/>
    <line x1="0" y1="160" x2="960" y2="160"/>
    <line x1="0" y1="240" x2="960" y2="240"/>
    <line x1="0" y1="320" x2="960" y2="320"/>
    <line x1="0" y1="400" x2="960" y2="400"/>
  </g>

  <!-- ═══════════════════ TITLE ═══════════════════ -->
  <text x="480" y="32" text-anchor="middle" fill="#e0e0f0" font-size="15" font-weight="600" letter-spacing="0.05em" opacity="0.9">
    TeaParty CfA — Conversation for Action Protocol
  </text>
  <text x="480" y="50" text-anchor="middle" fill="#8888aa" font-size="10.5" letter-spacing="0.08em">
    THREE-PHASE FLOW WITH CROSS-PHASE BACKTRACKS
  </text>

  <!-- ═══════════════════ PHASE PANELS ═══════════════════ -->

  <!-- Phase 1: Intent -->
  <rect x="14" y="62" width="278" height="270" rx="12" ry="12"
        fill="url(#intentGrad)" stroke="#4ecdc4" stroke-width="1.5" stroke-opacity="0.5"
        filter="url(#panelShadow)"/>
  <text x="153" y="82" text-anchor="middle" fill="#4ecdc4" font-size="11.5" font-weight="700" letter-spacing="0.12em" opacity="0.9">PHASE 1</text>
  <text x="153" y="97" text-anchor="middle" fill="#4ecdc4" font-size="16" font-weight="700">Intent</text>

  <!-- Phase 2: Planning -->
  <rect x="340" y="62" width="238" height="270" rx="12" ry="12"
        fill="url(#planGrad)" stroke="#f9c74f" stroke-width="1.5" stroke-opacity="0.5"
        filter="url(#panelShadow)"/>
  <text x="459" y="82" text-anchor="middle" fill="#f9c74f" font-size="11.5" font-weight="700" letter-spacing="0.12em" opacity="0.9">PHASE 2</text>
  <text x="459" y="97" text-anchor="middle" fill="#f9c74f" font-size="16" font-weight="700">Planning</text>

  <!-- Phase 3: Execution -->
  <rect x="626" y="62" width="320" height="270" rx="12" ry="12"
        fill="url(#execGrad)" stroke="#f07167" stroke-width="1.5" stroke-opacity="0.5"
        filter="url(#panelShadow)"/>
  <text x="786" y="82" text-anchor="middle" fill="#f07167" font-size="11.5" font-weight="700" letter-spacing="0.12em" opacity="0.9">PHASE 3</text>
  <text x="786" y="97" text-anchor="middle" fill="#f07167" font-size="16" font-weight="700">Execution</text>

  <!-- ═══════════════════ STATE NODES — helpers ═══════════════════ -->
  <!-- Node style: rounded rect, phase color border, dark fill -->

  <!-- ── INTENT PHASE NODES ── -->
  <!-- IDEA -->
  <rect x="24" y="112" width="56" height="26" rx="5" fill="#0f0f1e" stroke="#4ecdc4" stroke-width="1.3"/>
  <text x="52" y="129" text-anchor="middle" fill="#4ecdc4" font-size="10.5" font-weight="600">IDEA</text>

  <!-- PROPOSAL -->
  <rect x="24" y="155" width="68" height="26" rx="5" fill="#0f0f1e" stroke="#4ecdc4" stroke-width="1.3"/>
  <text x="58" y="172" text-anchor="middle" fill="#4ecdc4" font-size="10.5" font-weight="600">PROPOSAL</text>

  <!-- Synthesis loop box (Intent) -->
  <rect x="106" y="145" width="160" height="108" rx="8" fill="#4ecdc4" fill-opacity="0.06" stroke="#4ecdc4" stroke-width="1" stroke-dasharray="4,3" stroke-opacity="0.4"/>
  <text x="186" y="159" text-anchor="middle" fill="#4ecdc4" font-size="9" opacity="0.6" letter-spacing="0.06em">synthesis loop</text>

  <!-- QUESTION (Intent) -->
  <rect x="112" y="164" width="70" height="24" rx="5" fill="#0f0f1e" stroke="#4ecdc4" stroke-width="1.1"/>
  <text x="147" y="180" text-anchor="middle" fill="#4ecdc4" font-size="9.5" font-weight="600">QUESTION</text>

  <!-- ESCALATE (Intent) -->
  <rect x="190" y="164" width="68" height="24" rx="5" fill="#0f0f1e" stroke="#4ecdc4" stroke-width="1.1"/>
  <text x="224" y="180" text-anchor="middle" fill="#4ecdc4" font-size="9.5" font-weight="600">ESCALATE</text>

  <!-- ASSERT (Intent) -->
  <rect x="112" y="198" width="56" height="24" rx="5" fill="#0f0f1e" stroke="#4ecdc4" stroke-width="1.1"/>
  <text x="140" y="214" text-anchor="middle" fill="#4ecdc4" font-size="9.5" font-weight="600">ASSERT</text>

  <!-- RESPONSE (Intent) -->
  <rect x="178" y="198" width="72" height="24" rx="5" fill="#0f0f1e" stroke="#4ecdc4" stroke-width="1.1"/>
  <text x="214" y="214" text-anchor="middle" fill="#4ecdc4" font-size="9.5" font-weight="600">RESPONSE</text>

  <!-- Loop arrows inside Intent synthesis box -->
  <!-- QUESTION -> ASSERT -->
  <path d="M147,188 C147,196 140,196 140,198" stroke="#4ecdc4" stroke-width="1" fill="none" stroke-opacity="0.4" marker-end="url(#arrowLoop)"/>
  <!-- ASSERT -> RESPONSE -->
  <path d="M168,210 L178,210" stroke="#4ecdc4" stroke-width="1" fill="none" stroke-opacity="0.4" marker-end="url(#arrowLoop)"/>
  <!-- RESPONSE -> QUESTION (loop back) -->
  <path d="M214,198 C214,188 147,184 147,188" stroke="#4ecdc4" stroke-width="1" fill="none" stroke-opacity="0.3" stroke-dasharray="3,2"/>

  <!-- INTENT (terminal of phase 1) -->
  <rect x="131" y="235" width="56" height="26" rx="5" fill="#0f0f1e" stroke="#4ecdc4" stroke-width="1.8"/>
  <text x="159" y="252" text-anchor="middle" fill="#4ecdc4" font-size="10.5" font-weight="700">INTENT</text>

  <!-- Forward arrows in Intent phase -->
  <!-- IDEA -> PROPOSAL -->
  <path d="M52,138 L52,155" stroke="#aaaacc" stroke-width="1.3" fill="none" stroke-opacity="0.5" marker-end="url(#arrowFwd)"/>
  <!-- PROPOSAL -> synthesis loop entry -->
  <path d="M92,168 L112,168" stroke="#aaaacc" stroke-width="1.3" fill="none" stroke-opacity="0.5" marker-end="url(#arrowFwd)"/>
  <!-- synthesis loop -> INTENT -->
  <path d="M159,245 L159,239" stroke="#4ecdc4" stroke-width="1.3" fill="none" stroke-opacity="0.6" marker-end="url(#arrowFwd)"/>
  <!-- ESCALATE connects up -->
  <path d="M224,164 C224,155 186,155 186,159" stroke="#4ecdc4" stroke-width="1" fill="none" stroke-opacity="0.3" stroke-dasharray="3,2"/>

  <!-- ── PLANNING PHASE NODES ── -->
  <!-- DRAFT -->
  <rect x="352" y="112" width="52" height="26" rx="5" fill="#0f0f1e" stroke="#f9c74f" stroke-width="1.3"/>
  <text x="378" y="129" text-anchor="middle" fill="#f9c74f" font-size="10.5" font-weight="600">DRAFT</text>

  <!-- Synthesis loop box (Planning) -->
  <rect x="350" y="148" width="232" height="108" rx="8" fill="#f9c74f" fill-opacity="0.05" stroke="#f9c74f" stroke-width="1" stroke-dasharray="4,3" stroke-opacity="0.4"/>
  <text x="466" y="162" text-anchor="middle" fill="#f9c74f" font-size="9" opacity="0.6" letter-spacing="0.06em">synthesis loop</text>

  <!-- QUESTION (Planning) -->
  <rect x="356" y="167" width="70" height="24" rx="5" fill="#0f0f1e" stroke="#f9c74f" stroke-width="1.1"/>
  <text x="391" y="183" text-anchor="middle" fill="#f9c74f" font-size="9.5" font-weight="600">QUESTION</text>

  <!-- ESCALATE (Planning) -->
  <rect x="436" y="167" width="68" height="24" rx="5" fill="#0f0f1e" stroke="#f9c74f" stroke-width="1.1"/>
  <text x="470" y="183" text-anchor="middle" fill="#f9c74f" font-size="9.5" font-weight="600">ESCALATE</text>

  <!-- ASSERT (Planning) -->
  <rect x="356" y="201" width="56" height="24" rx="5" fill="#0f0f1e" stroke="#f9c74f" stroke-width="1.1"/>
  <text x="384" y="217" text-anchor="middle" fill="#f9c74f" font-size="9.5" font-weight="600">ASSERT</text>

  <!-- RESPONSE (Planning) -->
  <rect x="422" y="201" width="72" height="24" rx="5" fill="#0f0f1e" stroke="#f9c74f" stroke-width="1.1"/>
  <text x="458" y="217" text-anchor="middle" fill="#f9c74f" font-size="9.5" font-weight="600">RESPONSE</text>

  <!-- Loop arrows inside Planning synthesis box -->
  <path d="M391,191 C391,199 384,199 384,201" stroke="#f9c74f" stroke-width="1" fill="none" stroke-opacity="0.4" marker-end="url(#arrowLoop)"/>
  <path d="M412,213 L422,213" stroke="#f9c74f" stroke-width="1" fill="none" stroke-opacity="0.4" marker-end="url(#arrowLoop)"/>
  <path d="M458,201 C458,188 391,184 391,188" stroke="#f9c74f" stroke-width="1" fill="none" stroke-opacity="0.3" stroke-dasharray="3,2"/>
  <path d="M470,167 C470,158 430,158 430,162" stroke="#f9c74f" stroke-width="1" fill="none" stroke-opacity="0.3" stroke-dasharray="3,2"/>

  <!-- PLAN (terminal of phase 2) -->
  <rect x="430" y="238" width="48" height="26" rx="5" fill="#0f0f1e" stroke="#f9c74f" stroke-width="1.8"/>
  <text x="454" y="255" text-anchor="middle" fill="#f9c74f" font-size="10.5" font-weight="700">PLAN</text>

  <!-- Forward arrows in Planning phase -->
  <!-- DRAFT -> synthesis loop -->
  <path d="M378,138 L378,148" stroke="#aaaacc" stroke-width="1.3" fill="none" stroke-opacity="0.5" marker-end="url(#arrowFwd)"/>
  <!-- synthesis loop -> PLAN -->
  <path d="M454,256 L454,248" stroke="#f9c74f" stroke-width="1.3" fill="none" stroke-opacity="0.6" marker-end="url(#arrowFwd)"/>

  <!-- ── EXECUTION PHASE NODES ── -->
  <!-- TASK -->
  <rect x="634" y="112" width="46" height="26" rx="5" fill="#0f0f1e" stroke="#f07167" stroke-width="1.3"/>
  <text x="657" y="129" text-anchor="middle" fill="#f07167" font-size="10.5" font-weight="600">TASK</text>

  <!-- TASK_IN_PROGRESS -->
  <rect x="692" y="112" width="94" height="26" rx="5" fill="#0f0f1e" stroke="#f07167" stroke-width="1.3"/>
  <text x="739" y="129" text-anchor="middle" fill="#f07167" font-size="9.5" font-weight="600">TASK_IN_PROGRESS</text>

  <!-- Task synthesis loop box -->
  <rect x="634" y="148" width="200" height="74" rx="8" fill="#f07167" fill-opacity="0.05" stroke="#f07167" stroke-width="1" stroke-dasharray="4,3" stroke-opacity="0.4"/>
  <text x="734" y="162" text-anchor="middle" fill="#f07167" font-size="9" opacity="0.6" letter-spacing="0.06em">task synthesis loop</text>

  <!-- TASK_QUESTION -->
  <rect x="640" y="168" width="84" height="24" rx="5" fill="#0f0f1e" stroke="#f07167" stroke-width="1.1"/>
  <text x="682" y="183" text-anchor="middle" fill="#f07167" font-size="9.5" font-weight="600">TASK_QUESTION</text>

  <!-- FAILED_TASK -->
  <rect x="736" y="168" width="72" height="24" rx="5" fill="#0f0f1e" stroke="#f07167" stroke-width="1.1"/>
  <text x="772" y="183" text-anchor="middle" fill="#f07167" font-size="9.5" font-weight="600">FAILED_TASK</text>

  <!-- Loop arrow Task_Question -> loop back -->
  <path d="M682,192 C682,200 682,200 682,192" stroke="#f07167" stroke-width="0.8" fill="none" stroke-opacity="0.3" stroke-dasharray="2,2"/>

  <!-- COMPLETED_TASK -->
  <rect x="648" y="236" width="90" height="24" rx="5" fill="#0f0f1e" stroke="#f07167" stroke-width="1.3"/>
  <text x="693" y="252" text-anchor="middle" fill="#f07167" font-size="9.5" font-weight="600">COMPLETED_TASK</text>

  <!-- WORK_IN_PROGRESS -->
  <rect x="750" y="236" width="96" height="24" rx="5" fill="#0f0f1e" stroke="#f07167" stroke-width="1.3"/>
  <text x="798" y="252" text-anchor="middle" fill="#f07167" font-size="9.5" font-weight="600">WORK_IN_PROGRESS</text>

  <!-- WORK_ASSERT -->
  <rect x="742" y="275" width="78" height="24" rx="5" fill="#0f0f1e" stroke="#f07167" stroke-width="1.3"/>
  <text x="781" y="291" text-anchor="middle" fill="#f07167" font-size="9.5" font-weight="600">WORK_ASSERT</text>

  <!-- COMPLETED_WORK -->
  <rect x="848" y="275" width="90" height="24" rx="5" fill="#0f0f1e" stroke="#f07167" stroke-width="1.8"/>
  <text x="893" y="291" text-anchor="middle" fill="#f07167" font-size="10.5" font-weight="700">COMPLETED_WORK</text>

  <!-- Forward arrows in Execution phase -->
  <!-- TASK -> TASK_IN_PROGRESS -->
  <path d="M680,125 L692,125" stroke="#aaaacc" stroke-width="1.3" fill="none" stroke-opacity="0.5" marker-end="url(#arrowFwd)"/>
  <!-- TASK_IN_PROGRESS -> task synthesis loop -->
  <path d="M739,138 L720,148" stroke="#aaaacc" stroke-width="1.3" fill="none" stroke-opacity="0.5" marker-end="url(#arrowFwd)"/>
  <!-- task synthesis loop -> COMPLETED_TASK -->
  <path d="M693,222 L693,236" stroke="#f07167" stroke-width="1.3" fill="none" stroke-opacity="0.6" marker-end="url(#arrowFwd)"/>
  <!-- COMPLETED_TASK -> WORK_IN_PROGRESS -->
  <path d="M738,248 L750,248" stroke="#aaaacc" stroke-width="1.3" fill="none" stroke-opacity="0.5" marker-end="url(#arrowFwd)"/>
  <!-- WORK_IN_PROGRESS -> WORK_ASSERT -->
  <path d="M798,260 L798,272 L820,272 L820,280" stroke="#aaaacc" stroke-width="1.3" fill="none" stroke-opacity="0.5" marker-end="url(#arrowFwd)"/>
  <!-- WORK_ASSERT -> COMPLETED_WORK -->
  <path d="M820,287 L848,287" stroke="#aaaacc" stroke-width="1.3" fill="none" stroke-opacity="0.5" marker-end="url(#arrowFwd)"/>

  <!-- Inter-phase forward arrows -->
  <!-- INTENT -> Planning DRAFT (phase boundary arrow) -->
  <path d="M292,248 L315,248 L315,125 L352,125" stroke="#aaaacc" stroke-width="1.5" fill="none" stroke-opacity="0.55" marker-end="url(#arrowFwd)"/>

  <!-- PLAN -> Execution TASK (phase boundary arrow) -->
  <path d="M578,125 L600,125 L600,125 L634,125" stroke="#aaaacc" stroke-width="1.5" fill="none" stroke-opacity="0.55" marker-end="url(#arrowFwd)"/>
  <!-- PLAN exit path -->
  <path d="M478,251 L578,251 L578,125" stroke="#aaaacc" stroke-width="1.5" fill="none" stroke-opacity="0.55"/>

  <!-- ═══════════════════ BACKTRACK ARROWS ═══════════════════ -->
  <!-- All drawn as curved paths going above the panels, right to left -->
  <!-- Color: #ff6b6b, dashed, with glow filter -->

  <g stroke="#ff6b6b" stroke-width="2" fill="none" stroke-dasharray="6,4" filter="url(#backtrackGlow)" opacity="0.92" marker-start="url(#arrowBack)">

    <!-- 1. Planning DRAFT → Intent RESPONSE (refine-intent) -->
    <!-- From: DRAFT top (~378, 112) going above to Intent RESPONSE (~214, 198) -->
    <path d="M378,112 C378,72 214,72 214,198"/>
    <!-- Label -->
    <text x="296" y="66" text-anchor="middle" fill="#ff6b6b" font-size="9" font-weight="600" stroke="none" filter="none" opacity="0.9" letter-spacing="0.04em">refine-intent</text>

    <!-- 2. Planning QUESTION → Intent QUESTION (backtrack) -->
    <!-- From: Planning QUESTION (~391, 167) to Intent QUESTION (~147, 164) -->
    <path d="M391,167 C391,52 147,52 147,164"/>
    <text x="269" y="46" text-anchor="middle" fill="#ff6b6b" font-size="9" font-weight="600" stroke="none" filter="none" opacity="0.9" letter-spacing="0.04em">backtrack</text>

    <!-- 3. Execution TASK_QUESTION → Planning QUESTION (backtrack) -->
    <!-- From: Execution TASK_QUESTION (~682, 168) to Planning QUESTION (~391, 167) -->
    <path d="M682,168 C682,38 391,38 391,167"/>
    <text x="536" y="32" text-anchor="middle" fill="#ff6b6b" font-size="9" font-weight="600" stroke="none" filter="none" opacity="0.9" letter-spacing="0.04em">backtrack</text>

    <!-- 4. Execution FAILED_TASK → Planning QUESTION (backtrack) -->
    <!-- From: Execution FAILED_TASK (~772, 168) to Planning QUESTION (~391, 167) -->
    <path d="M772,168 C772,20 391,20 391,167"/>
    <text x="582" y="14" text-anchor="middle" fill="#ff9b9b" font-size="9" font-weight="600" stroke="none" filter="none" opacity="0.85" letter-spacing="0.04em">backtrack</text>

    <!-- 5. Execution WORK_IN_PROGRESS → Planning QUESTION (backtrack) -->
    <!-- From: WORK_IN_PROGRESS top (~798, 236) to Planning QUESTION (~391, 167) -->
    <path d="M798,236 C798,8 391,8 391,167"/>
    <text x="595" y="2" text-anchor="middle" fill="#ffbbbb" font-size="9" font-weight="600" stroke="none" filter="none" opacity="0.8" letter-spacing="0.04em">backtrack</text>

    <!-- 6. Execution WORK_ASSERT → Planning RESPONSE (revise-plan) -->
    <!-- From: WORK_ASSERT top (~781, 275) to Planning RESPONSE (~458, 201) -->
    <path d="M781,275 C781,84 458,84 458,201"/>
    <text x="620" y="78" text-anchor="middle" fill="#ff6b6b" font-size="9" font-weight="600" stroke="none" filter="none" opacity="0.9" letter-spacing="0.04em">revise-plan</text>

    <!-- 7. Execution WORK_ASSERT → Intent RESPONSE (refine-intent) -->
    <!-- From: WORK_ASSERT left side (~742, 287) curving far above to Intent RESPONSE (~214, 198) -->
    <path d="M781,275 C781,94 214,94 214,198"/>
    <!-- Second refine-intent label shifted slightly so they don't collide -->
    <text x="497" y="88" text-anchor="middle" fill="#ff9b9b" font-size="9" font-weight="600" stroke="none" filter="none" opacity="0.85" letter-spacing="0.04em">refine-intent</text>

  </g>

  <!-- ═══════════════════ LEGEND ═══════════════════ -->
  <rect x="14" y="348" width="932" height="48" rx="8" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Forward flow legend -->
  <line x1="36" y1="372" x2="68" y2="372" stroke="#aaaacc" stroke-width="2" stroke-opacity="0.7" marker-end="url(#arrowFwd)"/>
  <text x="76" y="376" fill="#aaaacc" font-size="11" opacity="0.85">forward flow</text>

  <!-- Backtrack legend -->
  <line x1="200" y1="372" x2="168" y2="372" stroke="#ff6b6b" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowBack)"/>
  <text x="208" y="376" fill="#ff6b6b" font-size="11" opacity="0.9">cross-phase backtrack (right-to-left)</text>

  <!-- Phase color chips -->
  <rect x="500" y="362" width="12" height="12" rx="2" fill="#4ecdc4" opacity="0.7"/>
  <text x="518" y="373" fill="#aaaacc" font-size="11" opacity="0.8">Intent</text>
  <rect x="580" y="362" width="12" height="12" rx="2" fill="#f9c74f" opacity="0.7"/>
  <text x="598" y="373" fill="#aaaacc" font-size="11" opacity="0.8">Planning</text>
  <rect x="672" y="362" width="12" height="12" rx="2" fill="#f07167" opacity="0.7"/>
  <text x="690" y="373" fill="#aaaacc" font-size="11" opacity="0.8">Execution</text>

  <!-- Caption -->
  <text x="480" y="418" text-anchor="middle" fill="#555577" font-size="9.5" letter-spacing="0.05em">
    Backtracks reflect protocol flexibility — any phase may re-enter an earlier phase when clarification, replanning, or re-scoping is needed.
  </text>

</svg>
