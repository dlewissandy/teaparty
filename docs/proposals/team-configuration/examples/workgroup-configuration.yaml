# Management-Level Workgroup Configuration — ~/.teaparty/workgroups/configuration.yaml
#
# Workgroups can exist at any non-leaf level. The Configuration Team is a management-level
# workgroup — it lives under ~/.teaparty/workgroups/, not inside a project.

name: Configuration
description: Creates and modifies Claude Code configuration artifacts — agents, skills, hooks, MCP servers, and scheduled tasks.
lead: configuration-lead

team_file: .claude/agents/configuration-team.json

agents:
  - name: Configuration Lead
    role: team-lead
    model: claude-sonnet-4
  - name: Project Specialist
    role: specialist
    model: claude-sonnet-4
  - name: Workgroup Specialist
    role: specialist
    model: claude-sonnet-4
  - name: Agent Specialist
    role: specialist
    model: claude-opus-4
  - name: Skills Specialist
    role: specialist
    model: claude-opus-4
  - name: Systems Engineer
    role: specialist
    model: claude-sonnet-4

# Workgroup-level skills: full catalog of skills this workgroup makes available for dispatch.
# This is NOT an access control list — it describes what the workgroup can do as a unit.
# Per-agent access is controlled by the skills: allowlist in each agent definition.
skills:
  - create-project
  - edit-project
  - remove-project
  - create-workgroup
  - edit-workgroup
  - remove-workgroup
  - create-agent
  - edit-agent
  - remove-agent
  - create-skill
  - edit-skill
  - remove-skill
  - optimize-skill
  - create-hook
  - edit-hook
  - remove-hook
  - create-scheduled-task
  - edit-scheduled-task
  - remove-scheduled-task

norms:
  quality:
    - Created artifacts must be validated before reporting completion
    - Skills must use progressive disclosure — no monolithic SKILL.md files
  delegation:
    - Project Specialist handles project creation, registration, and onboarding
    - Workgroup Specialist handles workgroup creation and modification
    - Agent Specialist handles agent definition creation and modification
    - Skills Specialist handles skill creation, editing, and optimization
    - Systems Engineer handles hooks, MCP servers, and scheduled tasks
    - Configuration Lead coordinates multi-artifact requests

stats:
  storage: ~/.teaparty/stats/configuration.json
