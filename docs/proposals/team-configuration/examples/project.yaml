# Project Configuration — {project}/.teaparty.local/project.yaml
#
# Describes a single project. Lives inside the project's own directory.
# The project lead reads this to understand its team.

name: My Backend
description: Backend API service — REST endpoints, database layer, authentication, and deployment infrastructure.
lead: project-lead                              # → .teaparty/project/agents/project-lead/agent.md
humans:
  decider: darrell                              # human whose approval matters at gates
  advisors:
    - alice                                     # can interject in chats; input is advice, not directive
  inform:
    - bob                                       # can see dashboard and read chats; no input

workgroups:
  - name: Coding
    config: .teaparty/workgroups/coding.yaml
  - name: Research
    config: .teaparty/workgroups/research.yaml
  - name: Configuration
    config: .teaparty/workgroups/configuration.yaml

members:
  workgroups:
    - Coding
    - Research
  # Configuration is registered but not a member — reached via config screen only

scheduled:
  - name: health-check
    schedule: "*/30 * * * *"
    skill: health-check
    enabled: true

hooks:
  - event: PreToolUse
    matcher: Bash
    handler: .teaparty/project/hooks/validate-worktree.sh

stats:
  storage: .teaparty/stats/project.json
