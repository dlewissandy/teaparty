# Project Configuration — {project}/.teaparty/project.yaml
#
# Describes a single project. Lives inside the project's own directory.
# The project lead reads this to understand its team.

name: My Backend
description: Backend API service — REST endpoints, database layer, authentication, and deployment infrastructure.
lead: project-lead                              # → .claude/agents/project-lead.md
decider: darrell                                # human whose approval matters at gates

# Four member types: agents, humans, workgroups, teams
# (teams would be sub-projects — not shown here, future use)

agents:
  - project-lead                                # team lead (implicit)
  - qa-reviewer                                 # specialist — reviews code, runs tests, validates spec compliance

humans:
  - name: darrell
    role: decider                               # final call at gates; proxy models this human
  - name: alice
    role: advisor                               # can interject in chats; input is advice, not directive
  - name: bob
    role: informed                              # can see dashboard and read chats; no input

workgroups:
  # Reference an org-level shared workgroup (defined in ~/.teaparty/workgroups/)
  - ref: coding
    status: active
  # Define a project-scoped workgroup (lives in this project's .teaparty/workgroups/)
  - name: Research
    config: workgroups/research.yaml
    status: idle

skills:
  # Org skill registration: names here are org skills pulled into this project.
  # These must be installed in {teaparty_home}/.claude/skills/; unresolvable names
  # are flagged as 'missing' in the dashboard rather than silently omitted.
  # Local skills in {project_dir}/.claude/skills/ are discovered automatically
  # and take precedence over org skills with the same name.
  - fix-issue

scheduled:
  - name: health-check
    schedule: "*/30 * * * *"
    skill: health-check
    enabled: true

hooks:
  - event: PreToolUse
    matcher: Bash
    handler: .claude/hooks/validate-worktree.sh

norms:
  quality:
    - All code changes must have tests
    - Database migrations require rollback strategies
  delegation:
    - Coding workgroup handles implementation and testing
    - Research workgroup handles design proposals and literature review
    - QA reviewer handles post-implementation review directly (no workgroup)

stats:
  storage: .teaparty/stats/project.json
