# Workgroup Configuration — {project}/.teaparty/workgroups/coding.yaml
#
# Describes a single workgroup. The workgroup lead reads this to understand its team.

name: Coding
description: Implementation, testing, and code review. Handles all coding tasks including bug fixes, new features, refactoring, and test coverage.
lead: coding-lead
humans:
  decider: primus
members:
  agents:
    - architect
    - developer
    - reviewer
  hooks:
    - pre-commit
artifacts:
  - path: NORMS.md
  - path: docs/
    label: Docs
stats:
  storage: .teaparty/stats/coding.json
