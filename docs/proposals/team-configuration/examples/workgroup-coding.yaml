# Workgroup Configuration — ~/.teaparty/workgroups/coding.yaml (org-level)
# or {project}/.teaparty/workgroups/coding.yaml (project override)
#
# Describes a single workgroup. The workgroup lead reads this to understand its team.
# If both org-level and project-level exist, the project-level definition wins
# (same precedence as .claude/ project vs global settings).

name: Coding
description: Implementation, testing, and code review. Handles all coding tasks including bug fixes, new features, refactoring, and test coverage.
lead: coding-lead

# Team agent definition — full prompts and tool configs
team_file: .claude/agents/coding-team.json

# Agent summary (for dashboard display / quick reference)
agents:
  - name: Coding Lead
    role: team-lead
    model: claude-sonnet-4
  - name: Architect
    role: specialist
    model: claude-opus-4
  - name: Developer
    role: specialist
    model: claude-sonnet-4
  - name: Reviewer
    role: specialist
    model: claude-sonnet-4

skills:
  - fix-issue
  - code-cleanup

norms:
  quality:
    - Code review required before merge
    - Test coverage must not decrease
  tools:
    - Developers may not use WebSearch
    - Architect has read-only access
  delegation:
    - Architect produces the plan, Developer implements
    - Reviewer checks against plan before approval

stats:
  storage: .teaparty/stats/coding.json
