# TeaParty Management Team Configuration — ~/.teaparty/teaparty.yaml
#
# The root entry point. An agent reads this first to understand the organization.

name: Management Team
description: Cross-project coordination, human interaction, organizational strategy, and configuration management.
lead: office-manager                            # → .claude/agents/office-manager.md
humans:
  decider: darrell                              # human whose approval matters at gates
  advisors:
    - alice                                     # can interject; advice not directive

projects:
  - name: My Backend
    path: ~/git/my-backend                      # git repo location on disk
    config: .teaparty/project.yaml
  - name: Joke-book
    path: ~/work/joke-book
    config: .teaparty/project.yaml

members:
  projects:
    - My Backend
    - Joke-book
  # agents: []  # optional — OM dispatches to project leads by default

workgroups:
  - name: Configuration
    config: workgroups/configuration.yaml       # relative to ~/.teaparty/

scheduled:
  - name: nightly-test-sweep
    schedule: "0 2 * * *"
    skill: test-sweep
    args: "--all-projects"
  - name: weekly-digest
    schedule: "0 9 * * 1"
    skill: weekly-digest

stats:
  storage: ~/.teaparty/stats/management.json
