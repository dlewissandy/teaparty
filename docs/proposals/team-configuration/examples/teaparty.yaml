# TeaParty Management Team Configuration — ~/.teaparty/teaparty.yaml
#
# The root entry point. An agent reads this first to understand the organization.

name: Management Team
description: Cross-project coordination, human interaction, organizational strategy, and configuration management.
lead: office-manager                            # → .claude/agents/office-manager.md
decider: darrell                                # human whose approval matters at gates

agents:
  - office-manager                              # team lead
  - auditor                                     # specialist
  - researcher                                  # specialist
  - strategist                                  # specialist
  # each name → .claude/agents/{name}.md

humans:
  - name: darrell
    role: decider                               # final call; proxy models this human
  - name: alice
    role: advisor                               # can interject; advice not directive

teams:
  - name: My Backend
    path: ~/git/my-backend                      # git repo location on disk
  - name: Joke-book
    path: ~/work/joke-book

workgroups:
  - name: Configuration
    config: workgroups/configuration.yaml       # relative to ~/.teaparty/
    status: active

skills:
  # Catalog registration: names here are promoted to the org-level skill catalog.
  # This is a subset of what is installed at {teaparty_home}/.claude/skills/.
  # Skills installed on disk but not listed here are discovered and shown in the
  # Skill Catalog but are not explicitly promoted via this YAML.
  - sprint-plan                                 # each name → .claude/skills/{name}/
  - audit
  - close-milestone
  - fix-issue
  - refine
  - research

scheduled:
  - name: nightly-test-sweep
    schedule: "0 2 * * *"
    skill: test-sweep
    args: "--all-projects"
  - name: weekly-digest
    schedule: "0 9 * * 1"
    skill: weekly-digest

stats:
  storage: ~/.teaparty/stats/management.json
