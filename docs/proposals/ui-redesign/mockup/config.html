<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TeaParty — Configuration</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="content" class="app-pane active" style="overflow-y:auto"></div>

<script>
var omConvId = 'om:unknown';

function openChat(convId) {
  window.location.href = 'chat.html?conv=' + encodeURIComponent(convId);
}

function configNav(level, projectSlug) {
  if (level === 'global') {
    history.pushState({}, '', 'config.html');
    renderGlobal();
  } else if (level === 'project') {
    history.pushState({}, '', 'config.html?project=' + encodeURIComponent(projectSlug));
    renderProject(projectSlug);
  }
}

function sectionCard(title, items, opts) {
  var buttons = '';
  if (opts && opts.addBtn) buttons += '<button class="action-btn" onclick="openChat(\'' + omConvId + '\')">+ New</button>';
  if (opts && opts.catalogBtn) buttons += '<button class="action-btn" style="background:rgba(78,204,163,0.15);color:var(--green)" onclick="openChat(\'' + omConvId + '\')">+ Catalog</button>';
  var body = items.length === 0 ? '<div class="empty">' + (opts && opts.empty || 'None') + '</div>' : items.join('');
  return '<div class="section"><div class="section-header">' + title + '<span style="flex:1"></span>' + buttons + '</div><div class="section-scroll">' + body + '</div></div>';
}

function sourceBadge(source) {
  if (!source) return '';
  return '<span class="source-badge source-' + source + '">' + source + '</span>';
}

function overrideBadge(overrides) {
  if (!overrides || overrides.length === 0) return '';
  return '<span class="override-indicator">' + overrides.join(', ') + ' overridden</span>';
}

function showError(msg) {
  document.getElementById('content').innerHTML =
    '<div style="padding:24px;color:var(--text-dim);font-size:11px">' + msg + '</div>';
}

function showLoading() {
  document.getElementById('content').innerHTML =
    '<div style="padding:24px;color:var(--text-dim);font-size:11px">Loading...</div>';
}

async function renderGlobal() {
  showLoading();
  var configData, workgroupsData, artifactsData;
  try {
    var [cfgResp, wgResp] = await Promise.all([
      fetch('/api/config'),
      fetch('/api/workgroups'),
    ]);
    configData = await cfgResp.json();
    workgroupsData = await wgResp.json();
  } catch (e) {
    showError('Failed to load configuration: ' + e.message);
    return;
  }

  try {
    var artResp = await fetch('/api/artifacts/org');
    artifactsData = artResp.ok ? await artResp.json() : {};
  } catch (e) {
    artifactsData = {};
  }

  var m = configData.management_team || {};
  var projects = configData.projects || [];
  omConvId = m.decider ? 'om:' + m.decider : 'om:unknown';

  document.title = 'TeaParty \u2014 Global Configuration';

  var projectItems = projects.map(function(p) {
    var slug = p.slug || p.name.toLowerCase().replace(/\s+/g, '-');
    return '<div class="item" onclick="configNav(\'project\',\'' + slug + '\')"><div class="item-icon icon-project">&#9654;</div><div class="item-body"><div class="item-title">' + p.name + '</div><div class="item-meta">' + (p.path || '') + '</div></div></div>';
  });

  var wgItems = (workgroupsData || []).map(function(w) {
    return '<div class="item"><div class="item-icon icon-workgroup">&#9670;</div><div class="item-body"><div class="item-title">' + w.name + '</div><div class="item-meta">' + (w.description || '') + '</div><div class="item-meta">' + (w.lead || '') + (w.agents_count != null ? ' &middot; ' + w.agents_count + ' agents' : '') + '</div></div></div>';
  });

  var agentItems = (m.agents || []).map(function(name) {
    return '<div class="item"><div class="item-icon icon-member">&#9672;</div><div class="item-body"><div class="item-title">' + name + '</div></div></div>';
  });

  var participantItems = [];
  if (m.lead) {
    participantItems.push('<div class="item" onclick="openChat(\'' + omConvId + '\')"><div class="item-icon icon-member">&#9733;</div><div class="item-body"><div class="item-title">Office Manager</div><div class="item-meta">' + m.lead + ' &middot; org-level coordination</div></div></div>');
  }
  (m.humans || []).forEach(function(h) {
    participantItems.push('<div class="item"><div class="item-icon icon-member">&#9786;</div><div class="item-body"><div class="item-title">' + h.name + '</div></div><span style="font-size:9px;color:var(--text-dim)">' + h.role + '</span></div>');
  });

  var orgArtifactItems = Object.keys(artifactsData).map(function(heading) {
    return '<div class="item" onclick="window.open(\'artifacts.html?project=org\',\'_blank\')" style="background:rgba(78,204,163,0.03)"><div class="item-icon" style="background:rgba(78,204,163,0.15);color:var(--green)">&#9654;</div><div class="item-body"><div class="item-title">' + heading + '</div></div></div>';
  });

  var skillItems = (m.skills || []).map(function(name) {
    return '<div class="item"><div class="item-icon icon-skill">&#9881;</div><div class="item-body"><div class="item-title">' + name + '</div></div></div>';
  });

  var hookItems = (m.hooks || []).map(function(h) {
    return '<div class="item"><div class="item-icon icon-hook">&#9889;</div><div class="item-body"><div class="item-title">' + (h.event || '') + (h.matcher ? ' [' + h.matcher + ']' : '') + '</div><div class="item-meta">' + (h.type || '') + '</div></div></div>';
  });

  var cronItems = (m.scheduled || []).map(function(c) {
    var badge = c.enabled ? 'active' : 'idle';
    return '<div class="item"><div class="item-icon icon-cron">&#9200;</div><div class="item-body"><div class="item-title">' + c.name + '</div><div class="item-meta">' + c.schedule + '</div></div><span class="item-badge badge-' + badge + '">' + badge + '</span></div>';
  });

  var subtitle = projects.length + ' projects &middot; ' + (workgroupsData || []).length + ' workgroups &middot; ' + (m.agents || []).length + ' agents';

  document.getElementById('content').innerHTML =
    '<div class="pane-title">Global Configuration</div>' +
    '<div class="pane-description">' + (m.description || 'Organization catalog. Workgroups, agents, and skills defined here can be assembled into projects.') + '</div>' +
    '<div class="pane-subtitle">' + subtitle + '</div>' +
    '<div class="sections">' +
      sectionCard('Projects', projectItems, { addBtn: true }) +
      sectionCard('Workgroup Catalog', wgItems, { addBtn: true, empty: 'No org-level workgroups' }) +
      sectionCard('Agent Catalog', agentItems, { addBtn: true }) +
      sectionCard('Participants', participantItems) +
      sectionCard('Artifacts', orgArtifactItems, { empty: 'No organizational artifacts' }) +
      sectionCard('Skill Catalog', skillItems, { addBtn: true }) +
      sectionCard('Hooks', hookItems, { addBtn: true }) +
      sectionCard('Scheduled Tasks', cronItems, { addBtn: true }) +
    '</div>';
}

async function renderProject(slug) {
  showLoading();
  var projectData, artifactsData;
  try {
    var projResp = await fetch('/api/config/' + encodeURIComponent(slug));
    projectData = await projResp.json();
    if (!projResp.ok) {
      showError('Project not found: ' + (projectData.error || slug));
      return;
    }
  } catch (e) {
    showError('Failed to load project configuration: ' + e.message);
    return;
  }

  try {
    var artResp = await fetch('/api/artifacts/' + encodeURIComponent(slug));
    artifactsData = artResp.ok ? await artResp.json() : {};
  } catch (e) {
    artifactsData = {};
  }

  var team = projectData.team || {};
  var workgroups = projectData.workgroups || [];

  omConvId = team.decider ? 'om:' + team.decider : 'om:unknown';

  document.title = 'TeaParty \u2014 ' + (team.name || slug) + ' Configuration';

  var wgItems = workgroups.map(function(w) {
    var src = sourceBadge(w.source);
    var ovr = overrideBadge(w.overrides);
    var agentInfo = w.agents_count != null ? w.agents_count + ' agents' : '';
    return '<div class="item"><div class="item-icon icon-workgroup">&#9670;</div><div class="item-body"><div class="item-title">' + w.name + ' ' + src + ' ' + ovr + '</div><div class="item-meta">' + (w.lead || '') + (agentInfo ? ' &middot; ' + agentInfo : '') + '</div></div></div>';
  });

  var agentItems = (team.agents || []).map(function(name) {
    var generated = team.lead && name === team.lead;
    var src = generated ? sourceBadge('generated') : '';
    return '<div class="item"><div class="item-icon icon-member">&#9672;</div><div class="item-body"><div class="item-title">' + name + ' ' + src + '</div></div></div>';
  });

  var participantItems = [];
  if (team.lead) {
    participantItems.push('<div class="item"><div class="item-icon icon-member">&#9733;</div><div class="item-body"><div class="item-title">Manager</div><div class="item-meta">' + team.lead + ' &middot; operational control</div></div></div>');
  }
  var proxyConvId = team.decider ? 'proxy:' + team.decider : 'proxy:unknown';
  participantItems.push('<div class="item" onclick="openChat(\'' + proxyConvId + '\')"><div class="item-icon icon-participant">&#9670;</div><div class="item-body"><div class="item-title">Proxy</div><div class="item-meta">project learning &middot; decision patterns</div></div></div>');
  (team.humans || []).forEach(function(h) {
    participantItems.push('<div class="item"><div class="item-icon icon-member">&#9786;</div><div class="item-body"><div class="item-title">' + h.name + '</div></div><span style="font-size:9px;color:var(--text-dim)">' + h.role + '</span></div>');
  });

  var artifactItems = Object.keys(artifactsData).map(function(heading) {
    return '<div class="item" onclick="window.open(\'artifacts.html?project=' + encodeURIComponent(slug) + '\',\'_blank\')" style="background:rgba(78,204,163,0.03)"><div class="item-icon" style="background:rgba(78,204,163,0.15);color:var(--green)">&#9654;</div><div class="item-body"><div class="item-title">' + heading + '</div></div></div>';
  });

  var skillItems = (team.skills || []).map(function(name) {
    return '<div class="item"><div class="item-icon icon-skill">&#9881;</div><div class="item-body"><div class="item-title">' + name + '</div></div></div>';
  });

  var hookItems = (team.hooks || []).map(function(h) {
    return '<div class="item"><div class="item-icon icon-hook">&#9889;</div><div class="item-body"><div class="item-title">' + (h.event || '') + (h.matcher ? ' [' + h.matcher + ']' : '') + '</div><div class="item-meta">' + (h.type || '') + '</div></div></div>';
  });

  var cronItems = (team.scheduled || []).map(function(c) {
    var badge = c.enabled ? 'active' : 'idle';
    return '<div class="item"><div class="item-icon icon-cron">&#9200;</div><div class="item-body"><div class="item-title">' + c.name + '</div><div class="item-meta">' + c.schedule + '</div></div><span class="item-badge badge-' + badge + '">' + badge + '</span></div>';
  });

  document.getElementById('content').innerHTML =
    '<div class="breadcrumb-bar"><a onclick="configNav(\'global\')" style="cursor:pointer">Global Config</a> <span>/</span> <a>' + (team.name || slug) + '</a></div>' +
    '<div class="pane-title">' + (team.name || slug) + '</div>' +
    '<div class="pane-description">' + (team.description || '') + '</div>' +
    '<div class="pane-subtitle">Decider: ' + (team.decider || '') + ' &middot; Lead: ' + (team.lead || '') + '</div>' +
    '<div class="sections">' +
      sectionCard('Workgroups', wgItems, { addBtn: true, catalogBtn: true, empty: 'No workgroups' }) +
      sectionCard('Agents', agentItems, { addBtn: true, catalogBtn: true, empty: 'No agents' }) +
      sectionCard('Participants', participantItems) +
      sectionCard('Artifacts', artifactItems, { empty: 'No project artifacts' }) +
      sectionCard('Skills', skillItems, { addBtn: true, catalogBtn: true, empty: 'No skills' }) +
      sectionCard('Hooks', hookItems, { addBtn: true, empty: 'No project-scoped hooks' }) +
      sectionCard('Scheduled Tasks', cronItems, { addBtn: true, empty: 'No project-scoped tasks' }) +
    '</div>';
}

var urlParams = new URLSearchParams(window.location.search);
var initProject = urlParams.get('project');
if (initProject) {
  renderProject(initProject);
} else {
  renderGlobal();
}
</script>
</body>
</html>
