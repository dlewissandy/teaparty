<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TeaParty — Statistics</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="content" class="app-pane active" style="overflow-y:auto"></div>

<script src="data.js"></script>
<script>
function render() {
  const s = mockData.stats;
  const m = s.management;
  const maxTasks = Math.max(...s.daily.map(d => d.tasks));
  const maxTokens = Math.max(...s.daily.map(d => d.tokens));
  const maxEsc = Math.max(...s.phaseEscalations.map(d => d.count));

  document.getElementById('content').innerHTML = `
    <div class="pane-title">Statistics</div>
    <div class="pane-subtitle">Organization-wide metrics</div>

    <div class="summary-stats">
      <div class="stat"><div class="stat-value stat-green">${m.jobsCompleted}</div><div class="stat-label">Jobs Done</div></div>
      <div class="stat"><div class="stat-value stat-green">${m.tasksCompleted}</div><div class="stat-label">Tasks Done</div></div>
      <div class="stat"><div class="stat-value">${m.activeJobs}</div><div class="stat-label">Active</div></div>
      <div class="stat"><div class="stat-value stat-yellow">${m.backtracks}</div><div class="stat-label">Backtracks</div></div>
      <div class="stat"><div class="stat-value stat-red">${m.withdrawals}</div><div class="stat-label">Withdrawals</div></div>
      <div class="stat"><div class="stat-value stat-purple">${m.escalations}</div><div class="stat-label">Escalations</div></div>
      <div class="stat"><div class="stat-value stat-green">${m.proxyAccuracy}%</div><div class="stat-label">Proxy Acc.</div></div>
      <div class="stat"><div class="stat-value stat-dim">${m.tokensUsed}</div><div class="stat-label">Tokens</div></div>
      <div class="stat"><div class="stat-value stat-green">${m.skillsLearned}</div><div class="stat-label">Skills</div></div>
    </div>

    <div class="chart-grid">
      <div class="chart-card">
        <div class="chart-title">Tasks Completed (7 days)</div>
        <div class="bar-chart">
          ${s.daily.map(d => `
            <div class="bar-group">
              <div class="bar-value">${d.tasks}</div>
              <div class="bar" style="height:${(d.tasks/maxTasks)*100}%;background:var(--green)"></div>
              <div class="bar-label">${d.date.split(' ')[1]}</div>
            </div>
          `).join('')}
        </div>
      </div>

      <div class="chart-card">
        <div class="chart-title">Token Usage (K, 7 days)</div>
        <div class="bar-chart">
          ${s.daily.map(d => `
            <div class="bar-group">
              <div class="bar-value">${d.tokens}K</div>
              <div class="bar" style="height:${(d.tokens/maxTokens)*100}%;background:var(--purple)"></div>
              <div class="bar-label">${d.date.split(' ')[1]}</div>
            </div>
          `).join('')}
        </div>
      </div>

      <div class="chart-card">
        <div class="chart-title">Proxy Accuracy Trend (%)</div>
        <div class="bar-chart">
          ${s.daily.map(d => `
            <div class="bar-group">
              <div class="bar-value">${d.proxyAcc}%</div>
              <div class="bar" style="height:${d.proxyAcc}%;background:${d.proxyAcc >= 80 ? 'var(--green)' : d.proxyAcc >= 70 ? 'var(--yellow)' : 'var(--red)'}"></div>
              <div class="bar-label">${d.date.split(' ')[1]}</div>
            </div>
          `).join('')}
        </div>
      </div>

      <div class="chart-card">
        <div class="chart-title">Escalations by Phase</div>
        <div class="bar-chart">
          ${s.phaseEscalations.map(d => `
            <div class="bar-group">
              <div class="bar-value">${d.count}</div>
              <div class="bar" style="height:${(d.count/maxEsc)*100}%;background:var(--red)"></div>
              <div class="bar-label">${d.phase.replace('_',' ')}</div>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `;
}

render();
</script>
</body>
</html>
