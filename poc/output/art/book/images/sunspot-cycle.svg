<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <!-- Overall background -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#080814"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>

    <!-- Chart area background -->
    <linearGradient id="chartBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a18"/>
      <stop offset="100%" stop-color="#060610"/>
    </linearGradient>

    <!-- Sunspot data fill area gradient -->
    <linearGradient id="dataFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.85"/>
      <stop offset="60%" stop-color="#ffa500" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#cc6600" stop-opacity="0.15"/>
    </linearGradient>

    <!-- Inset sunspot photosphere gradient -->
    <radialGradient id="photoGrad" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#fff8a0"/>
      <stop offset="50%" stop-color="#ffe840"/>
      <stop offset="100%" stop-color="#cc9900"/>
    </radialGradient>

    <!-- Sunspot penumbra gradient -->
    <radialGradient id="penumbraGrad" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#555555"/>
      <stop offset="60%" stop-color="#333333"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </radialGradient>

    <!-- Sunspot glow -->
    <filter id="sunspotGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Glow filter for chart line -->
    <filter id="lineGlow" x="-5%" y="-100%" width="110%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip for chart area -->
    <!-- Chart area: x=80 to x=740, y=80 to y=450 -->
    <clipPath id="chartClip">
      <rect x="80" y="80" width="660" height="370"/>
    </clipPath>

    <!-- Inset box clip -->
    <clipPath id="insetClip">
      <rect x="570" y="85" width="185" height="140" rx="6"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)"/>

  <!-- Star field (sparse, in margins outside chart) -->
  <g opacity="0.6">
    <circle cx="20" cy="30" r="0.7" fill="#ffffff" opacity="0.8"/>
    <circle cx="55" cy="12" r="0.5" fill="#cce0ff" opacity="0.6"/>
    <circle cx="730" cy="490" r="0.8" fill="#ffffff" opacity="0.7"/>
    <circle cx="770" cy="510" r="0.5" fill="#cce0ff" opacity="0.6"/>
    <circle cx="40" cy="530" r="0.9" fill="#ffffff" opacity="0.7"/>
    <circle cx="755" cy="28" r="0.6" fill="#ffffff" opacity="0.5"/>
    <circle cx="788" cy="55" r="0.8" fill="#cce0ff" opacity="0.7"/>
    <circle cx="12" cy="490" r="0.5" fill="#ffffff" opacity="0.6"/>
    <circle cx="30" cy="450" r="0.7" fill="#ffffff" opacity="0.8"/>
  </g>

  <!-- ===== TITLE ===== -->
  <text x="400" y="38" font-family="Arial" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="0.5">The Solar Cycle (1750–2025)</text>
  <line x1="100" y1="46" x2="700" y2="46" stroke="rgba(255,215,0,0.25)" stroke-width="0.7"/>

  <!-- ===== CHART BORDER ===== -->
  <rect x="78" y="78" width="664" height="374" rx="6" fill="none" stroke="rgba(255,215,0,0.2)" stroke-width="1.2"/>

  <!-- Chart background -->
  <rect x="80" y="80" width="660" height="370" rx="5" fill="url(#chartBg)"/>

  <!-- ===== GRID LINES ===== -->
  <!-- Horizontal grid lines: Y axis 0–300, chart height=370, y_scale=370/300=1.2333 px per unit -->
  <!-- Y=300: chart_y = 450 - 300*1.2333 = 450 - 370 = 80 -->
  <!-- Y=250: chart_y = 450 - 250*1.2333 = 450 - 308.3 = 141.7 -->
  <!-- Y=200: chart_y = 450 - 200*1.2333 = 450 - 246.7 = 203.3 -->
  <!-- Y=150: chart_y = 450 - 150*1.2333 = 450 - 185 = 265 -->
  <!-- Y=100: chart_y = 450 - 100*1.2333 = 450 - 123.3 = 326.7 -->
  <!-- Y=50:  chart_y = 450 - 50*1.2333  = 450 - 61.7 = 388.3 -->
  <!-- Y=0:   chart_y = 450 -->

  <!-- X axis: 1750 to 2025, width=660, x_scale=660/275=2.4 px per year -->
  <!-- x_offset = 80 (chart left), x = 80 + (year-1750)*2.4 -->

  <g stroke="rgba(80,80,120,0.35)" stroke-width="0.7" fill="none">
    <!-- Horizontal lines at 50, 100, 150, 200, 250, 300 -->
    <line x1="80" y1="388" x2="740" y2="388"/> <!-- y=50 -->
    <line x1="80" y1="327" x2="740" y2="327"/> <!-- y=100 -->
    <line x1="80" y1="265" x2="740" y2="265"/> <!-- y=150 -->
    <line x1="80" y1="203" x2="740" y2="203"/> <!-- y=200 -->
    <line x1="80" y1="142" x2="740" y2="142"/> <!-- y=250 -->
    <line x1="80" y1="80"  x2="740" y2="80"/>  <!-- y=300 -->

    <!-- Vertical lines every 25 years: 1775, 1800, ..., 2000 -->
    <!-- x = 80 + (year-1750)*2.4 -->
    <!-- 1775: 80+25*2.4=80+60=140 -->
    <!-- 1800: 80+50*2.4=80+120=200 -->
    <!-- 1825: 80+75*2.4=80+180=260 -->
    <!-- 1850: 80+100*2.4=80+240=320 -->
    <!-- 1875: 80+125*2.4=80+300=380 -->
    <!-- 1900: 80+150*2.4=80+360=440 -->
    <!-- 1925: 80+175*2.4=80+420=500 -->
    <!-- 1950: 80+200*2.4=80+480=560 -->
    <!-- 1975: 80+225*2.4=80+540=620 -->
    <!-- 2000: 80+250*2.4=80+600=680 -->
    <line x1="140" y1="80" x2="140" y2="450"/>
    <line x1="200" y1="80" x2="200" y2="450"/>
    <line x1="260" y1="80" x2="260" y2="450"/>
    <line x1="320" y1="80" x2="320" y2="450"/>
    <line x1="380" y1="80" x2="380" y2="450"/>
    <line x1="440" y1="80" x2="440" y2="450"/>
    <line x1="500" y1="80" x2="500" y2="450"/>
    <line x1="560" y1="80" x2="560" y2="450"/>
    <line x1="620" y1="80" x2="620" y2="450"/>
    <line x1="680" y1="80" x2="680" y2="450"/>
  </g>

  <!-- ===== SOLAR MAXIMUM VERTICAL DASHED LINES ===== -->
  <!-- Solar maxima approx years: 1761, 1769, 1778, 1788, 1805, 1816, 1830, 1837, 1848, 1860, 1870, 1883, 1893, 1907, 1917, 1928, 1937, 1947, 1958, 1968, 1979, 1989, 2000, 2014 -->
  <!-- x = 80 + (year-1750)*2.4 -->
  <g stroke="rgba(255,140,0,0.28)" stroke-width="0.8" stroke-dasharray="3,4" fill="none" clip-path="url(#chartClip)">
    <line x1="106" y1="80" x2="106" y2="450"/> <!-- 1761 -->
    <line x1="125" y1="80" x2="125" y2="450"/> <!-- 1769 -->
    <line x1="151" y1="80" x2="151" y2="450"/> <!-- 1778 -->
    <line x1="175" y1="80" x2="175" y2="450"/> <!-- 1769 approximate -->
    <line x1="205" y1="80" x2="205" y2="450"/> <!-- 1806 -->
    <line x1="230" y1="80" x2="230" y2="450"/> <!-- 1816 -->
    <line x1="248" y1="80" x2="248" y2="450"/> <!-- 1830 -->
    <line x1="258" y1="80" x2="258" y2="450"/> <!-- 1837 -->
    <line x1="271" y1="80" x2="271" y2="450"/> <!-- 1848 -->
    <line x1="284" y1="80" x2="284" y2="450"/> <!-- 1860 -->
    <line x1="308" y1="80" x2="308" y2="450"/> <!-- 1870 -->
    <line x1="320" y1="80" x2="320" y2="450"/> <!-- 1883 -->
    <line x1="346" y1="80" x2="346" y2="450"/> <!-- 1893 -->
    <line x1="378" y1="80" x2="378" y2="450"/> <!-- 1907 -->
    <line x1="400" y1="80" x2="400" y2="450"/> <!-- 1917 -->
    <line x1="423" y1="80" x2="423" y2="450"/> <!-- 1928 -->
    <line x1="448" y1="80" x2="448" y2="450"/> <!-- 1937 -->
    <line x1="474" y1="80" x2="474" y2="450"/> <!-- 1947 -->
    <line x1="500" y1="80" x2="500" y2="450"/> <!-- 1958 -->
    <line x1="523" y1="80" x2="523" y2="450"/> <!-- 1968 -->
    <line x1="551" y1="80" x2="551" y2="450"/> <!-- 1979 -->
    <line x1="575" y1="80" x2="575" y2="450"/> <!-- 1989 -->
    <line x1="600" y1="80" x2="600" y2="450"/> <!-- 2000 -->
    <line x1="634" y1="80" x2="634" y2="450"/> <!-- 2014 -->
  </g>

  <!-- ===== SUNSPOT DATA CURVE =====
    Approximate historical sunspot cycle data.
    x = 80 + (year - 1750) * 2.4
    y_chart = 450 - value * 1.2333
    Using smoothed approximate cycle data.
  -->

  <!-- Data path as filled area -->
  <!-- Start at baseline, trace through ~11-year cycles, return to baseline -->
  <path clip-path="url(#chartClip)"
        fill="url(#dataFill)"
        stroke="none"
        d="
    M 80,450
    C 83,450 88,448 92,440
    C 96,432 100,420 106,390
    C 112,355 118,320 122,350
    C 126,380 130,440 135,445
    C 139,449 142,445 147,420
    C 152,390 155,350 162,320
    C 168,295 173,300 178,330
    C 182,355 185,410 190,440
    C 194,445 198,448 203,440
    C 207,432 210,415 215,390
    C 220,360 225,340 230,355
    C 235,370 238,395 242,420
    C 246,438 249,445 253,440
    C 257,432 260,415 265,395
    C 270,372 274,355 278,340
    C 282,326 286,320 290,330
    C 294,340 296,365 300,400
    C 303,425 306,440 310,445
    C 313,449 317,445 321,430
    C 325,415 330,395 336,375
    C 342,350 347,335 352,355
    C 357,375 360,410 364,430
    C 367,442 370,447 374,442
    C 378,435 381,415 386,395
    C 391,370 396,350 400,340
    C 404,330 408,330 412,345
    C 416,358 420,378 424,365
    C 428,352 431,340 435,355
    C 439,368 442,392 446,415
    C 449,432 452,444 456,442
    C 460,438 463,425 468,400
    C 473,370 478,345 483,330
    C 488,310 492,305 497,315
    C 502,325 506,345 510,320
    C 514,296 518,290 523,305
    C 528,320 532,350 537,380
    C 541,405 545,430 549,440
    C 552,447 555,448 559,440
    C 563,430 567,410 571,385
    C 575,355 579,328 583,308
    C 587,285 591,278 596,285
    C 601,293 605,308 609,330
    C 613,352 617,375 621,395
    C 625,375 628,350 632,325
    C 636,295 640,270 644,258
    C 648,240 652,235 657,245
    C 662,258 666,285 670,315
    C 674,345 678,375 682,400
    C 686,420 690,438 694,445
    C 697,449 700,447 703,438
    C 706,428 709,410 712,390
    C 715,368 718,350 721,340
    C 724,330 727,332 730,345
    C 733,358 736,378 739,400
    C 741,415 742,430 743,445
    L 740,450
    Z
  "/>

  <!-- Data stroke line (brighter) -->
  <path clip-path="url(#chartClip)"
        fill="none"
        stroke="#ffd700"
        stroke-width="1.8"
        opacity="0.9"
        filter="url(#lineGlow)"
        d="
    M 80,450
    C 83,450 88,448 92,440
    C 96,432 100,420 106,390
    C 112,355 118,320 122,350
    C 126,380 130,440 135,445
    C 139,449 142,445 147,420
    C 152,390 155,350 162,320
    C 168,295 173,300 178,330
    C 182,355 185,410 190,440
    C 194,445 198,448 203,440
    C 207,432 210,415 215,390
    C 220,360 225,340 230,355
    C 235,370 238,395 242,420
    C 246,438 249,445 253,440
    C 257,432 260,415 265,395
    C 270,372 274,355 278,340
    C 282,326 286,320 290,330
    C 294,340 296,365 300,400
    C 303,425 306,440 310,445
    C 313,449 317,445 321,430
    C 325,415 330,395 336,375
    C 342,350 347,335 352,355
    C 357,375 360,410 364,430
    C 367,442 370,447 374,442
    C 378,435 381,415 386,395
    C 391,370 396,350 400,340
    C 404,330 408,330 412,345
    C 416,358 420,378 424,365
    C 428,352 431,340 435,355
    C 439,368 442,392 446,415
    C 449,432 452,444 456,442
    C 460,438 463,425 468,400
    C 473,370 478,345 483,330
    C 488,310 492,305 497,315
    C 502,325 506,345 510,320
    C 514,296 518,290 523,305
    C 528,320 532,350 537,380
    C 541,405 545,430 549,440
    C 552,447 555,448 559,440
    C 563,430 567,410 571,385
    C 575,355 579,328 583,308
    C 587,285 591,278 596,285
    C 601,293 605,308 609,330
    C 613,352 617,375 621,395
    C 625,375 628,350 632,325
    C 636,295 640,270 644,258
    C 648,240 652,235 657,245
    C 662,258 666,285 670,315
    C 674,345 678,375 682,400
    C 686,420 690,438 694,445
    C 697,449 700,447 703,438
    C 706,428 709,410 712,390
    C 715,368 718,350 721,340
    C 724,330 727,332 730,345
    C 733,358 736,378 739,400
    C 741,415 742,430 743,445
  "/>

  <!-- ===== SOLAR MAXIMUM "Max" LABELS ===== -->
  <g font-family="Arial" font-size="8.5" fill="rgba(255,180,50,0.80)" text-anchor="middle">
    <text x="106" y="380">Max</text>
    <text x="162" y="310">Max</text>
    <text x="230" y="344">Max</text>
    <text x="284" y="313">Max</text>
    <text x="400" y="330">Max</text>
    <text x="474" y="267">Max</text>  <!-- Cycle 19 — largest -->
    <text x="500" y="280">Max</text>
    <text x="551" y="318">Max</text>
    <text x="575" y="271">Max</text>
    <text x="644" y="246">Max</text>
    <text x="694" y="300">Max</text>
  </g>

  <!-- ===== MAUNDER MINIMUM ANNOTATION ===== -->
  <!-- 1645–1715 quiet period — near start, 1645: x=80+(1645-1750)*2.4 = 80-252 = negative, so pre-chart -->
  <!-- Dalton Minimum ~1790–1830: x=80+40*2.4=176 to 80+80*2.4=272 -->
  <rect x="163" y="84" width="90" height="20" rx="3" fill="rgba(80,40,0,0.4)"/>
  <text x="208" y="98" font-family="Arial" font-size="8.5" fill="rgba(255,160,60,0.85)" text-anchor="middle">Dalton Minimum</text>
  <line x1="163" y1="94" x2="163" y2="450" stroke="rgba(255,140,40,0.18)" stroke-width="0.7" stroke-dasharray="2,5"/>
  <line x1="253" y1="94" x2="253" y2="450" stroke="rgba(255,140,40,0.18)" stroke-width="0.7" stroke-dasharray="2,5"/>

  <!-- ===== AXES ===== -->
  <!-- X Axis bottom line -->
  <line x1="80" y1="450" x2="740" y2="450" stroke="rgba(200,200,220,0.5)" stroke-width="1.2"/>
  <!-- Y Axis left line -->
  <line x1="80" y1="80" x2="80" y2="450" stroke="rgba(200,200,220,0.5)" stroke-width="1.2"/>

  <!-- ===== X AXIS LABELS ===== -->
  <g font-family="Arial" font-size="10" fill="#b0b0c8" text-anchor="middle">
    <text x="80"  y="468">1750</text>
    <text x="140" y="468">1775</text>
    <text x="200" y="468">1800</text>
    <text x="260" y="468">1825</text>
    <text x="320" y="468">1850</text>
    <text x="380" y="468">1875</text>
    <text x="440" y="468">1900</text>
    <text x="500" y="468">1925</text>
    <text x="560" y="468">1950</text>
    <text x="620" y="468">1975</text>
    <text x="680" y="468">2000</text>
    <text x="740" y="468">2025</text>
  </g>
  <!-- X axis tick marks -->
  <g stroke="rgba(200,200,220,0.4)" stroke-width="0.8">
    <line x1="140" y1="450" x2="140" y2="455"/>
    <line x1="200" y1="450" x2="200" y2="455"/>
    <line x1="260" y1="450" x2="260" y2="455"/>
    <line x1="320" y1="450" x2="320" y2="455"/>
    <line x1="380" y1="450" x2="380" y2="455"/>
    <line x1="440" y1="450" x2="440" y2="455"/>
    <line x1="500" y1="450" x2="500" y2="455"/>
    <line x1="560" y1="450" x2="560" y2="455"/>
    <line x1="620" y1="450" x2="620" y2="455"/>
    <line x1="680" y1="450" x2="680" y2="455"/>
    <line x1="740" y1="450" x2="740" y2="455"/>
  </g>

  <!-- X Axis label -->
  <text x="410" y="490" font-family="Arial" font-size="12" fill="#c0c0d8" text-anchor="middle">Year</text>

  <!-- ===== Y AXIS LABELS ===== -->
  <g font-family="Arial" font-size="10" fill="#b0b0c8" text-anchor="end">
    <text x="74" y="454">0</text>
    <text x="74" y="392">50</text>
    <text x="74" y="330">100</text>
    <text x="74" y="268">150</text>
    <text x="74" y="207">200</text>
    <text x="74" y="145">250</text>
    <text x="74" y="84">300</text>
  </g>
  <!-- Y axis tick marks -->
  <g stroke="rgba(200,200,220,0.4)" stroke-width="0.8">
    <line x1="75" y1="388" x2="80" y2="388"/>
    <line x1="75" y1="327" x2="80" y2="327"/>
    <line x1="75" y1="265" x2="80" y2="265"/>
    <line x1="75" y1="203" x2="80" y2="203"/>
    <line x1="75" y1="142" x2="80" y2="142"/>
    <line x1="75" y1="80"  x2="80" y2="80"/>
  </g>

  <!-- Y Axis label (rotated) -->
  <text x="-265" y="22" font-family="Arial" font-size="12" fill="#c0c0d8" text-anchor="middle" transform="rotate(-90)">Sunspot Number</text>

  <!-- ===== INSET SUNSPOT DIAGRAM ===== -->
  <!-- Box: upper right, x=570, y=85, w=185, h=140 -->
  <!-- But there will be overlap with data curve. Let's ensure it's on top -->
  <rect x="569" y="84" width="187" height="142" rx="6" fill="rgba(5,5,18,0.92)" stroke="rgba(255,215,0,0.35)" stroke-width="1"/>

  <!-- Photosphere background for inset -->
  <rect x="571" y="86" width="183" height="138" rx="5" fill="url(#photoGrad)" clip-path="url(#insetClip)"/>

  <!-- Granulation texture on photosphere (subtle) -->
  <g clip-path="url(#insetClip)" opacity="0.3">
    <ellipse cx="610" cy="115" rx="18" ry="10" fill="rgba(255,200,0,0.3)" transform="rotate(20, 610, 115)"/>
    <ellipse cx="650" cy="125" rx="14" ry="8" fill="rgba(200,150,0,0.25)" transform="rotate(-15, 650, 125)"/>
    <ellipse cx="700" cy="108" rx="16" ry="9" fill="rgba(220,170,0,0.28)" transform="rotate(10, 700, 108)"/>
    <ellipse cx="620" cy="150" rx="20" ry="10" fill="rgba(200,140,0,0.22)" transform="rotate(-5, 620, 150)"/>
    <ellipse cx="680" cy="160" rx="15" ry="8" fill="rgba(230,160,0,0.25)" transform="rotate(25, 680, 160)"/>
    <ellipse cx="735" cy="140" rx="12" ry="7" fill="rgba(215,155,0,0.20)" transform="rotate(-20, 735, 140)"/>
  </g>

  <!-- Sunspot: penumbra (gray) -->
  <circle cx="663" cy="143" r="32" fill="url(#penumbraGrad)" filter="url(#sunspotGlow)"/>
  <!-- Sunspot: umbra (dark core) -->
  <circle cx="663" cy="143" r="17" fill="#111111"/>
  <!-- Umbra light-bridge hint -->
  <line x1="648" y1="143" x2="678" y2="143" stroke="rgba(80,50,10,0.5)" stroke-width="1.5"/>

  <!-- Second smaller sunspot nearby -->
  <circle cx="710" cy="155" r="14" fill="rgba(50,40,30,0.75)" filter="url(#sunspotGlow)"/>
  <circle cx="710" cy="155" r="7" fill="#151515"/>

  <!-- Inset labels -->
  <text x="663" y="99" font-family="Arial" font-size="10" font-weight="bold" fill="#1a0a00" text-anchor="middle">Sunspot Structure</text>
  <!-- Label lines inside inset -->
  <line x1="663" y1="126" x2="630" y2="108" stroke="rgba(30,10,0,0.6)" stroke-width="0.7"/>
  <text x="628" y="106" font-family="Arial" font-size="8.5" fill="#2a1500" text-anchor="end">Umbra</text>
  <line x1="663" y1="170" x2="690" y2="185" stroke="rgba(30,10,0,0.6)" stroke-width="0.7"/>
  <text x="692" y="188" font-family="Arial" font-size="8.5" fill="#2a1500" text-anchor="start">Penumbra</text>
  <line x1="600" y1="143" x2="582" y2="160" stroke="rgba(30,10,0,0.5)" stroke-width="0.7"/>
  <text x="580" y="172" font-family="Arial" font-size="8.5" fill="#2a1500" text-anchor="middle">Photosphere</text>

  <!-- ===== LEGEND ===== -->
  <rect x="82" y="508" width="200" height="30" rx="4" fill="rgba(0,0,0,0.4)" stroke="rgba(255,215,0,0.2)" stroke-width="0.8"/>
  <rect x="92" y="518" width="14" height="10" rx="2" fill="#ffd700" opacity="0.85"/>
  <text x="112" y="527" font-family="Arial" font-size="10.5" fill="#e0e0e0">Monthly Sunspot Number</text>

  <!-- ~11-year cycle annotation arrow -->
  <!-- Show between two peaks, e.g., around 1947 and 1958 cycles -->
