<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <!-- Deep space background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d0d2b"/>
      <stop offset="100%" stop-color="#000010"/>
    </radialGradient>

    <!-- Sun glow filter -->
    <filter id="sunGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Planet glow filter -->
    <filter id="planetGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Jupiter band clip -->
    <clipPath id="jupiterClip">
      <circle cx="0" cy="0" r="14"/>
    </clipPath>

    <!-- Saturn ring clip -->
    <clipPath id="saturnBodyClip">
      <circle cx="0" cy="0" r="12"/>
    </clipPath>

    <!-- Sun gradient -->
    <radialGradient id="sunGrad" cx="45%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#fff7aa"/>
      <stop offset="70%" stop-color="#ffe44a"/>
      <stop offset="100%" stop-color="#ff9900"/>
    </radialGradient>

    <!-- Earth gradient -->
    <radialGradient id="earthGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#5bc8ff"/>
      <stop offset="50%" stop-color="#1e90ff"/>
      <stop offset="100%" stop-color="#0a4a22"/>
    </radialGradient>

    <!-- Jupiter gradient -->
    <radialGradient id="jupiterGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#e8c07a"/>
      <stop offset="60%" stop-color="#c88b3a"/>
      <stop offset="100%" stop-color="#9b6420"/>
    </radialGradient>

    <!-- Saturn gradient -->
    <radialGradient id="saturnGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#f5e08a"/>
      <stop offset="60%" stop-color="#e4c05c"/>
      <stop offset="100%" stop-color="#b89030"/>
    </radialGradient>

    <!-- Orbital arrow marker -->
    <marker id="arrowBlue" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="rgba(150,180,255,0.6)"/>
    </marker>

    <!-- Label line marker -->
    <marker id="dotEnd" markerWidth="4" markerHeight="4" refX="2" refY="2" orient="auto">
      <circle cx="2" cy="2" r="1.5" fill="#aaaacc"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)"/>

  <!-- Star field -->
  <g opacity="0.8">
    <circle cx="45" cy="22" r="0.8" fill="#ffffff" opacity="0.7"/>
    <circle cx="112" cy="58" r="0.5" fill="#cce0ff" opacity="0.6"/>
    <circle cx="189" cy="14" r="1.0" fill="#ffffff" opacity="0.8"/>
    <circle cx="234" cy="88" r="0.6" fill="#ffffff" opacity="0.5"/>
    <circle cx="310" cy="35" r="0.8" fill="#cce0ff" opacity="0.7"/>
    <circle cx="378" cy="12" r="1.2" fill="#ffffff" opacity="0.9"/>
    <circle cx="422" cy="70" r="0.5" fill="#ffffff" opacity="0.6"/>
    <circle cx="490" cy="28" r="0.8" fill="#cce0ff" opacity="0.7"/>
    <circle cx="545" cy="55" r="1.0" fill="#ffffff" opacity="0.8"/>
    <circle cx="612" cy="18" r="0.6" fill="#ffffff" opacity="0.5"/>
    <circle cx="670" cy="80" r="0.9" fill="#cce0ff" opacity="0.7"/>
    <circle cx="735" cy="40" r="0.5" fill="#ffffff" opacity="0.6"/>
    <circle cx="760" cy="95" r="1.1" fill="#ffffff" opacity="0.8"/>
    <circle cx="28" cy="130" r="0.6" fill="#ffffff" opacity="0.5"/>
    <circle cx="78" cy="160" r="0.8" fill="#cce0ff" opacity="0.6"/>
    <circle cx="148" cy="145" r="0.5" fill="#ffffff" opacity="0.7"/>
    <circle cx="688" cy="140" r="0.9" fill="#ffffff" opacity="0.7"/>
    <circle cx="748" cy="165" r="0.6" fill="#cce0ff" opacity="0.5"/>
    <circle cx="780" cy="200" r="0.8" fill="#ffffff" opacity="0.6"/>
    <circle cx="15" cy="280" r="1.0" fill="#ffffff" opacity="0.8"/>
    <circle cx="55" cy="320" r="0.6" fill="#cce0ff" opacity="0.5"/>
    <circle cx="92" cy="380" r="0.8" fill="#ffffff" opacity="0.7"/>
    <circle cx="32" cy="440" r="0.5" fill="#ffffff" opacity="0.6"/>
    <circle cx="72" cy="490" r="1.0" fill="#cce0ff" opacity="0.7"/>
    <circle cx="120" cy="530" r="0.7" fill="#ffffff" opacity="0.8"/>
    <circle cx="170" cy="570" r="0.5" fill="#ffffff" opacity="0.5"/>
    <circle cx="710" cy="300" r="0.8" fill="#ffffff" opacity="0.7"/>
    <circle cx="760" cy="350" r="0.6" fill="#cce0ff" opacity="0.6"/>
    <circle cx="785" cy="420" r="1.0" fill="#ffffff" opacity="0.8"/>
    <circle cx="740" cy="480" r="0.7" fill="#ffffff" opacity="0.5"/>
    <circle cx="700" cy="540" r="0.8" fill="#cce0ff" opacity="0.7"/>
    <circle cx="650" cy="575" r="0.5" fill="#ffffff" opacity="0.6"/>
    <circle cx="600" cy="555" r="1.2" fill="#ffffff" opacity="0.9"/>
    <circle cx="540" cy="580" r="0.6" fill="#cce0ff" opacity="0.5"/>
    <circle cx="480" cy="565" r="0.8" fill="#ffffff" opacity="0.7"/>
    <circle cx="410" cy="585" r="0.5" fill="#ffffff" opacity="0.6"/>
    <circle cx="350" cy="560" r="0.9" fill="#cce0ff" opacity="0.7"/>
    <circle cx="280" cy="548" r="0.6" fill="#ffffff" opacity="0.8"/>
    <circle cx="220" cy="570" r="1.0" fill="#ffffff" opacity="0.6"/>
  </g>

  <!-- ===== ORBITAL ELLIPSES ===== -->
  <!-- Mercury orbit: rx=55, ry=50 -->
  <ellipse cx="400" cy="300" rx="55" ry="50" fill="none" stroke="rgba(200,210,255,0.25)" stroke-width="0.7"/>
  <!-- Venus orbit: rx=90, ry=84 -->
  <ellipse cx="400" cy="300" rx="90" ry="84" fill="none" stroke="rgba(200,210,255,0.22)" stroke-width="0.7"/>
  <!-- Earth orbit: rx="130" ry="122" -->
  <ellipse cx="400" cy="300" rx="130" ry="122" fill="none" stroke="rgba(200,210,255,0.22)" stroke-width="0.7"/>
  <!-- Mars orbit: rx=185, ry=174 -->
  <ellipse cx="400" cy="300" rx="185" ry="174" fill="none" stroke="rgba(200,210,255,0.20)" stroke-width="0.7"/>

  <!-- Asteroid Belt: dashed ring -->
  <ellipse cx="400" cy="300" rx="218" ry="205" fill="none" stroke="rgba(180,160,120,0.30)" stroke-width="3" stroke-dasharray="2,5"/>
  <ellipse cx="400" cy="300" rx="228" ry="215" fill="none" stroke="rgba(180,160,120,0.18)" stroke-width="2" stroke-dasharray="1,7"/>

  <!-- Jupiter orbit: rx=285, ry=268 -->
  <ellipse cx="400" cy="300" rx="285" ry="268" fill="none" stroke="rgba(200,210,255,0.18)" stroke-width="0.8"/>
  <!-- Saturn orbit: rx=350, ry=328 -->
  <ellipse cx="400" cy="300" rx="350" ry="328" fill="none" stroke="rgba(200,210,255,0.16)" stroke-width="0.8"/>
  <!-- Uranus orbit: would extend to ~420, clip at canvas -->
  <ellipse cx="400" cy="300" rx="408" ry="382" fill="none" stroke="rgba(200,210,255,0.13)" stroke-width="0.6" stroke-dasharray="4,3"/>
  <!-- Neptune orbit: would extend further, clip -->
  <ellipse cx="400" cy="300" rx="460" ry="432" fill="none" stroke="rgba(100,120,255,0.12)" stroke-width="0.6" stroke-dasharray="4,3"/>

  <!-- Kuiper Belt: faint outer dashes -->
  <ellipse cx="400" cy="300" rx="490" ry="460" fill="none" stroke="rgba(100,150,200,0.12)" stroke-width="2.5" stroke-dasharray="2,8"/>

  <!-- ===== ORBITAL DIRECTION ARROWS on selected orbits ===== -->
  <!-- Arrows at top of each orbit (counterclockwise view = left to right at top) -->
  <!-- Mercury top -->
  <path d="M 390,250 Q 398,249 406,250" fill="none" stroke="rgba(150,180,255,0.55)" stroke-width="1.2" marker-end="url(#arrowBlue)"/>
  <!-- Venus top -->
  <path d="M 388,216 Q 398,215 408,216" fill="none" stroke="rgba(150,180,255,0.5)" stroke-width="1.2" marker-end="url(#arrowBlue)"/>
  <!-- Earth top -->
  <path d="M 386,178 Q 398,177 410,178" fill="none" stroke="rgba(150,180,255,0.5)" stroke-width="1.2" marker-end="url(#arrowBlue)"/>
  <!-- Mars top -->
  <path d="M 382,126 Q 398,125 414,126" fill="none" stroke="rgba(150,180,255,0.45)" stroke-width="1.2" marker-end="url(#arrowBlue)"/>
  <!-- Jupiter top -->
  <path d="M 378,32 Q 398,31 418,32" fill="none" stroke="rgba(150,180,255,0.4)" stroke-width="1.2" marker-end="url(#arrowBlue)"/>

  <!-- ===== ASTEROID BELT LABEL ===== -->
  <text x="558" y="176" font-family="Arial" font-size="9" fill="rgba(180,160,120,0.75)" text-anchor="middle" transform="rotate(-48, 558, 176)">Asteroid Belt</text>

  <!-- ===== KUIPER BELT LABEL ===== -->
  <text x="756" y="318" font-family="Arial" font-size="9" fill="rgba(100,150,200,0.65)" text-anchor="start">Kuiper Belt</text>

  <!-- ===== SUN ===== -->
  <!-- Outer corona glow -->
  <circle cx="400" cy="300" r="55" fill="rgba(255,200,50,0.08)" filter="url(#sunGlow)"/>
  <circle cx="400" cy="300" r="42" fill="rgba(255,200,50,0.12)" filter="url(#sunGlow)"/>
  <!-- Sun body -->
  <circle cx="400" cy="300" r="30" fill="url(#sunGrad)" filter="url(#sunGlow)"/>

  <!-- ===== PLANETS ===== -->

  <!-- Mercury: position at ~200deg on orbit: cx=400+55*cos(200deg), cy=300+50*sin(200deg) -->
  <!-- cos(200)=-0.940, sin(200)=-0.342 => x=400-51.7=348.3, y=300-17.1=282.9 -->
  <g transform="translate(348, 283)" filter="url(#planetGlow)">
    <circle cx="0" cy="0" r="3" fill="#a0a0a0"/>
  </g>

  <!-- Venus: ~310deg: cos(310)=0.643, sin(310)=-0.766 => x=400+57.9=457.9, y=300-64.3=235.7 -->
  <g transform="translate(458, 236)" filter="url(#planetGlow)">
    <circle cx="0" cy="0" r="5" fill="#e8d5a3"/>
  </g>

  <!-- Earth: ~45deg: cos(45)=0.707, sin(45)=0.707 => x=400+91.9=491.9, y=300+86.3=386.3 -->
  <g transform="translate(492, 386)" filter="url(#planetGlow)">
    <circle cx="0" cy="0" r="5.5" fill="url(#earthGrad)"/>
    <!-- Thin atmosphere ring -->
    <circle cx="0" cy="0" r="6.5" fill="none" stroke="rgba(100,180,255,0.3)" stroke-width="1.2"/>
  </g>

  <!-- Mars: ~135deg: cos(135)=-0.707, sin(135)=0.707 => x=400-130.8=269.2, y=300+123.0=423.0 -->
  <g transform="translate(269, 423)" filter="url(#planetGlow)">
    <circle cx="0" cy="0" r="4" fill="#cd5c2c"/>
  </g>

  <!-- Jupiter: ~280deg: cos(280)=0.174, sin(280)=-0.985 => x=400+49.6=449.6, y=300-263.9=36.1 -->
  <g transform="translate(450, 36)">
    <!-- Jupiter body with bands -->
    <circle cx="0" cy="0" r="14" fill="url(#jupiterGrad)" filter="url(#planetGlow)"/>
    <!-- Band stripes clipped to circle -->
    <g clip-path="url(#jupiterClip)">
      <rect x="-14" y="-10" width="28" height="3.5" fill="rgba(160,100,40,0.55)"/>
      <rect x="-14" y="-4" width="28" height="2.5" fill="rgba(200,140,80,0.35)"/>
      <rect x="-14" y="1" width="28" height="3.5" fill="rgba(140,80,20,0.55)"/>
      <rect x="-14" y="6.5" width="28" height="2.5" fill="rgba(190,130,60,0.40)"/>
    </g>
    <!-- Great Red Spot hint -->
    <ellipse cx="4" cy="3" rx="4" ry="2.5" fill="rgba(180,60,30,0.55)"/>
  </g>

  <!-- Saturn: ~200deg: cos(200)=-0.940, sin(200)=-0.342 => x=400-329=71, y=300-112.2=187.8 -->
  <!-- Place Saturn at bottom right instead for better layout: ~340deg: cos(340)=0.940, sin(340)=-0.342 => x=400+329=729 (out of bounds) -->
  <!-- Use ~155deg: cos(155)=-0.906, sin(155)=0.423 => x=400-317.1=82.9, y=300+138.6=438.6 — also crowded -->
  <!-- Better: ~30deg: cos(30)=0.866, sin(30)=0.5 => x=400+303.1=703, y=300+164=464 (out) -->
  <!-- Use ~250deg: cos(250)=-0.342, sin(250)=-0.940 => x=400-119.7=280.3, y=300-308.3=-8.3 (out) -->
  <!-- Saturn at ~170deg: cos(170)=-0.985, sin(170)=0.174 => x=400-344.75=55.25, y=300+57.12=357.12 -->
  <g transform="translate(55, 357)">
    <!-- Saturn rings (back half) -->
    <ellipse cx="0" cy="0" rx="22" ry="6" fill="none" stroke="rgba(220,190,100,0.55)" stroke-width="3.5"/>
    <ellipse cx="0" cy="0" rx="27" ry="7.5" fill="none" stroke="rgba(180,150,70,0.35)" stroke-width="2"/>
    <!-- Saturn body -->
    <circle cx="0" cy="0" r="12" fill="url(#saturnGrad)" filter="url(#planetGlow)"/>
    <!-- Saturn rings (front half) -->
    <path d="M-22,0 A22,6 0 0 0 22,0" fill="none" stroke="rgba(220,190,100,0.55)" stroke-width="3.5"/>
    <path d="M-27,0 A27,7.5 0 0 0 27,0" fill="none" stroke="rgba(180,150,70,0.35)" stroke-width="2"/>
  </g>

  <!-- Uranus: ~65deg on its orbit: cos(65)=0.423, sin(65)=0.906 => x=400+172.6=572.6, y=300+346.5=646.5 (out) -->
  <!-- Use ~330deg: cos(330)=0.866, sin(330)=-0.5 => x=400+353.3=753, y=300-191=109 (borderline) -->
  <!-- Use ~325deg: cos(325)=0.819, sin(325)=-0.574 => x=400+334.2=734, y=300-219.4=80.6 -->
  <g transform="translate(690, 108)" filter="url(#planetGlow)">
    <circle cx="0" cy="0" r="9" fill="#7de8e8"/>
    <!-- Uranus faint ring hint -->
    <ellipse cx="0" cy="0" rx="14" ry="4" fill="none" stroke="rgba(125,232,232,0.35)" stroke-width="1.5" transform="rotate(97)"/>
  </g>

  <!-- Neptune: ~50deg: cos(50)=0.643, sin(50)=0.766 => x=400+295.8=695.8, y=300+331.3=631 (out) -->
  <!-- Use ~300deg: cos(300)=0.5, sin(300)=-0.866 => x=400+230=630, y=300-374=−74 (out) -->
  <!-- Use ~285deg: cos(285)=0.259, sin(285)=-0.966 => x=400+119.1=519.1, y=300-417.3=-117.3 (out) -->
  <!-- Neptune largely out of viewbox at full scale — place at ~275deg clipped: cos(275)=0.087,sin(275)=-0.996 -->
  <!-- x=400+40.0=440, y=300-430.7=-130 (out). Neptune will be clipped, show partial -->
  <!-- Put Neptune at ~268deg where partial orbit is visible: let's place it manually at edge -->
  <!-- Neptune at top center, partially visible: translate(390, -32) but clip -->
  <!-- Instead scale Neptune orbit to fit: show partial arc, place at 290deg -->
  <!-- cos(290)=0.342, sin(290)=-0.940 => x=400+157.3=557, y=300-406=-106 (out) -->
  <!-- Neptune at 295deg: cos=0.423,sin=-0.906 => x=400+194.6=594.6, y=300-391.4=-91 (out) -->
  <!-- Place Neptune at right edge clip: x=788, y calculated by orbit ellipse at x=788 -->
  <!-- rx=460, ry=432; (x-400)^2/460^2 + (y-300)^2/432^2 = 1; x=788: (388)^2/211600+(y-300)^2/186624=1 -->
  <!-- 150544/211600=0.7115; (y-300)^2=186624*(1-0.7115)=186624*0.2885=53860; y-300=±232.1 => y=67.9 or 532.1 -->
  <!-- So Neptune visible at (788, 68) top right edge -->
  <g transform="translate(782, 68)" filter="url(#planetGlow)">
    <circle cx="0" cy="0" r="8" fill="#3f54ba"/>
  </g>

  <!-- ===== PLANET LABELS ===== -->
  <!-- Mercury label -->
  <line x1="348" y1="281" x2="310" y2="250" stroke="#aaaacc" stroke-width="0.6" opacity="0.7"/>
  <text x="305" y="247" font-family="Arial" font-size="10" fill="#e0e0e0" text-anchor="middle">Mercury</text>

  <!-- Venus label -->
  <line x1="460" y1="233" x2="490" y2="210" stroke="#aaaacc" stroke-width="0.6" opacity="0.7"/>
  <text x="508" y="207" font-family="Arial" font-size="10" fill="#e0e0e0" text-anchor="start">Venus</text>

  <!-- Earth label -->
  <line x1="494" y1="388" x2="528" y2="405" stroke="#aaaacc" stroke-width="0.6" opacity="0.7"/>
  <text x="532" y="408" font-family="Arial" font-size="10" fill="#e0e0e0" text-anchor="start">Earth</text>

  <!-- Mars label -->
  <line x1="267" y1="425" x2="230" y2="448" stroke="#aaaacc" stroke-width="0.6" opacity="0.7"/>
  <text x="180" y="452" font-family="Arial" font-size="10" fill="#e0e0e0" text-anchor="start">Mars</text>

  <!-- Jupiter label -->
  <line x1="450" y1="50" x2="480" y2="58" stroke="#aaaacc" stroke-width="0.6" opacity="0.7"/>
  <text x="484" y="61" font-family="Arial" font-size="10" fill="#e0e0e0" text-anchor="start">Jupiter</text>

  <!-- Saturn label -->
  <line x1="55" y1="345" x2="30" y2="320" stroke="#aaaacc" stroke-width="0.6" opacity="0.7"/>
  <text x="25" y="316" font-family="Arial" font-size="10" fill="#e0e0e0" text-anchor="middle">Saturn</text>

  <!-- Uranus label -->
  <line x1="690" y1="117" x2="720" y2="132" stroke="#aaaacc" stroke-width="0.6" opacity="0.7"/>
  <text x="724" y="135" font-family="Arial" font-size="10" fill="#e0e0e0" text-anchor="start">Uranus</text>

  <!-- Neptune label -->
  <line x1="782" y1="60" x2="764" y2="42" stroke="#aaaacc" stroke-width="0.6" opacity="0.7"/>
  <text x="760" y="38" font-family="Arial" font-size="10" fill="#e0e0e0" text-anchor="middle">Neptune</text>

  <!-- Sun label -->
  <text x="400" y="342" font-family="Arial" font-size="11" font-weight="bold" fill="#ffe88a" text-anchor="middle" opacity="0.9">Sun</text>

  <!-- ===== TITLE ===== -->
  <text x="400" y="28" font-family="Arial" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle" opacity="0.95" letter-spacing="1">The Solar System</text>
  <line x1="280" y1="34" x2="520" y2="34" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
</svg>
