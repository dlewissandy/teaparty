<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <!-- Deep space background -->
    <radialGradient id="bgGrad" cx="35%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#0c0c20"/>
      <stop offset="100%" stop-color="#000008"/>
    </radialGradient>

    <!-- Core: brilliant white-yellow -->
    <radialGradient id="coreGrad" cx="45%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#fffff0"/>
      <stop offset="70%" stop-color="#ffe066"/>
      <stop offset="100%" stop-color="#ffcc00"/>
    </radialGradient>

    <!-- Radiative Zone gradient -->
    <radialGradient id="radZoneGrad" cx="45%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ffe880"/>
      <stop offset="50%" stop-color="#ffcc44"/>
      <stop offset="100%" stop-color="#e0a800"/>
    </radialGradient>

    <!-- Convective Zone gradient -->
    <radialGradient id="convZoneGrad" cx="45%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ffa030"/>
      <stop offset="50%" stop-color="#ff8c00"/>
      <stop offset="100%" stop-color="#cc5500"/>
    </radialGradient>

    <!-- Photosphere gradient -->
    <radialGradient id="photoGrad" cx="45%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#fff8c0"/>
      <stop offset="60%" stop-color="#fff5b0"/>
      <stop offset="100%" stop-color="#ffe060"/>
    </radialGradient>

    <!-- Prominence glow filter -->
    <filter id="prominGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Corona filter: soft wispy glow -->
    <filter id="coronaGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Sun outer glow -->
    <filter id="sunOuter" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Cutaway clip: a full circle except the upper-right wedge (from ~0 deg to ~90 deg removed) -->
    <!-- We keep the lower-left 3/4 of the circle: from 90deg to 360deg (going counterclockwise)
         i.e. clip keeps everything EXCEPT the upper-right quadrant -->
    <!-- Sun center: (310, 310), radius 260 -->
    <!-- Cutaway wedge: we show 3/4 of sun + interior revealed on cut face -->
    <!-- Full circle clip (for base layers): center 310,310 r=260 -->
    <clipPath id="fullSunClip">
      <circle cx="310" cy="310" r="262"/>
    </clipPath>

    <!-- Three-quarter clip: removes upper-right quadrant -->
    <!-- Keep region that is either: not in the upper-right quadrant -->
    <!-- Upper-right quadrant: x>310 AND y<310 -->
    <!-- Clip path = full rect minus that quadrant -->
    <clipPath id="cutawayClip">
      <path d="M0,0 L800,0 L800,310 L310,310 L310,0 L0,0 Z M0,310 L310,310 L310,600 L0,600 Z M310,310 L800,310 L800,600 L310,600 Z"/>
    </clipPath>

    <!-- Three-quarter sun clip (everything but upper-right quadrant within the circle) -->
    <clipPath id="threequarterClip">
      <path d="
        M 310,310
        L 310,50
        A 260,260 0 1 0 570,310
        Z
      "/>
    </clipPath>

    <!-- Star field clip: full view -->
    <clipPath id="fullView">
      <rect x="0" y="0" width="800" height="600"/>
    </clipPath>

    <!-- Convection cell pattern -->
    <pattern id="convPattern" x="0" y="0" width="30" height="26" patternUnits="userSpaceOnUse">
      <!-- Hexagonal convection cell suggestion -->
      <polygon points="15,1 28,8 28,19 15,25 2,19 2,8" fill="none" stroke="rgba(200,100,0,0.2)" stroke-width="0.8"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)"/>

  <!-- Star field -->
  <g opacity="0.7">
    <!-- Right side stars (left side will be mostly occluded by sun) -->
    <circle cx="580" cy="25" r="0.8" fill="#ffffff" opacity="0.8"/>
    <circle cx="630" cy="60" r="0.5" fill="#cce0ff" opacity="0.6"/>
    <circle cx="690" cy="20" r="1.0" fill="#ffffff" opacity="0.7"/>
    <circle cx="740" cy="80" r="0.6" fill="#ffffff" opacity="0.5"/>
    <circle cx="770" cy="140" r="0.8" fill="#cce0ff" opacity="0.7"/>
    <circle cx="790" cy="220" r="1.1" fill="#ffffff" opacity="0.9"/>
    <circle cx="760" cy="310" r="0.5" fill="#ffffff" opacity="0.6"/>
    <circle cx="785" cy="400" r="0.8" fill="#cce0ff" opacity="0.7"/>
    <circle cx="750" cy="470" r="1.0" fill="#ffffff" opacity="0.8"/>
    <circle cx="700" cy="540" r="0.6" fill="#ffffff" opacity="0.5"/>
    <circle cx="650" cy="575" r="0.9" fill="#cce0ff" opacity="0.7"/>
    <circle cx="590" cy="555" r="0.5" fill="#ffffff" opacity="0.6"/>
    <circle cx="540" cy="580" r="0.8" fill="#ffffff" opacity="0.7"/>
    <circle cx="470" cy="565" r="0.6" fill="#cce0ff" opacity="0.5"/>
    <circle cx="420" cy="580" r="1.0" fill="#ffffff" opacity="0.8"/>
    <circle cx="365" cy="572" r="0.7" fill="#ffffff" opacity="0.6"/>
    <!-- Upper area stars (will be under sun glow, so keep sparse and far right) -->
    <circle cx="620" cy="95" r="0.7" fill="#ffffff" opacity="0.7"/>
    <circle cx="678" cy="130" r="0.5" fill="#cce0ff" opacity="0.6"/>
    <circle cx="720" cy="180" r="0.8" fill="#ffffff" opacity="0.5"/>
    <!-- Lower-left stars where sun doesn't cover -->
    <circle cx="30" cy="480" r="0.8" fill="#ffffff" opacity="0.7"/>
    <circle cx="65" cy="520" r="0.5" fill="#cce0ff" opacity="0.6"/>
    <circle cx="110" cy="555" r="0.9" fill="#ffffff" opacity="0.8"/>
    <circle cx="160" cy="575" r="0.6" fill="#ffffff" opacity="0.5"/>
    <circle cx="20" cy="350" r="0.7" fill="#cce0ff" opacity="0.7"/>
    <circle cx="42" cy="400" r="0.5" fill="#ffffff" opacity="0.6"/>
    <circle cx="28" cy="280" r="0.8" fill="#ffffff" opacity="0.5"/>
    <circle cx="55" cy="200" r="1.0" fill="#cce0ff" opacity="0.7"/>
    <circle cx="22" cy="150" r="0.6" fill="#ffffff" opacity="0.8"/>
    <circle cx="70" cy="120" r="0.5" fill="#ffffff" opacity="0.5"/>
  </g>

  <!-- ===== CORONA: wispy rays radiating from sun edge ===== -->
  <!-- Corona rays in all directions from center 310,310 -->
  <g filter="url(#coronaGlow)" opacity="0.5">
    <!-- Corona streamers — thin tapered paths outward -->
    <g stroke="rgba(255,255,240,0.35)" stroke-width="1.5" fill="none">
      <!-- Upper-left rays (visible in cutaway view) -->
      <line x1="162" y1="162" x2="88" y2="88"/>
      <line x1="180" y1="140" x2="115" y2="75"/>
      <line x1="145" y1="185" x2="72" y2="112"/>
      <!-- Left rays -->
      <line x1="50" y1="310" x2="-20" y2="310"/>
      <line x1="55" y1="270" x2="-15" y2="255"/>
      <line x1="55" y1="350" x2="-15" y2="365"/>
      <!-- Lower-left rays -->
      <line x1="162" y1="458" x2="88" y2="532"/>
      <line x1="185" y1="472" x2="118" y2="548"/>
      <!-- Bottom rays -->
      <line x1="310" y1="570" x2="310" y2="620"/>
      <line x1="275" y1="568" x2="260" y2="618"/>
      <line x1="345" y1="568" x2="360" y2="618"/>
      <!-- Lower-right rays (within 3/4 visible area) -->
      <line x1="458" y1="458" x2="530" y2="530"/>
      <line x1="472" y1="440" x2="548" y2="512"/>
      <!-- Right rays (bottom half) -->
      <line x1="570" y1="350" x2="640" y2="368"/>
      <line x1="570" y1="370" x2="640" y2="395"/>
    </g>
    <!-- Wider corona fans -->
    <path d="M 310,310 L 50,50 Q 80,310 50,570 Z" fill="rgba(255,255,200,0.03)"/>
    <path d="M 310,310 L 570,570 Q 570,310 310,310" fill="rgba(255,255,200,0.02)"/>
  </g>

  <!-- ===== OUTER CORONA HALO ===== -->
  <circle cx="310" cy="310" r="285" fill="none" stroke="rgba(255,255,220,0.08)" stroke-width="20" filter="url(#coronaGlow)"/>
  <circle cx="310" cy="310" r="270" fill="rgba(255,240,200,0.04)" filter="url(#coronaGlow)"/>

  <!-- ===== SUN LAYERS (clipped to 3/4 circle, lower-left 3/4) ===== -->
  <!-- Sun center: (310, 310), all layers concentric -->

  <!-- Layer 5: Convective Zone (largest visible layer, r=200) -->
  <circle cx="310" cy="310" r="200" fill="url(#convZoneGrad)" clip-path="url(#threequarterClip)"/>
  <!-- Convection cell pattern overlay -->
  <circle cx="310" cy="310" r="200" fill="url(#convPattern)" clip-path="url(#threequarterClip)" opacity="0.6"/>

  <!-- Layer 4: Radiative Zone (r=120) -->
  <circle cx="310" cy="310" r="120" fill="url(#radZoneGrad)" clip-path="url(#threequarterClip)"/>

  <!-- Layer 3: Core (r=60) -->
  <circle cx="310" cy="310" r="60" fill="url(#coreGrad)" clip-path="url(#threequarterClip)"/>

  <!-- Core inner brilliance -->
  <circle cx="295" cy="295" r="25" fill="rgba(255,255,255,0.6)" clip-path="url(#threequarterClip)"/>

  <!-- ===== OUTER SURFACE LAYERS (over the full 3/4 circle exterior) ===== -->
  <!-- Photosphere: thin ring r=220 to r=225 -->
  <circle cx="310" cy="310" r="222" fill="none" stroke="#fff5b0" stroke-width="5" clip-path="url(#threequarterClip)" opacity="0.9"/>

  <!-- Chromosphere: thin reddish ring r=228 to r=233 -->
  <circle cx="310" cy="310" r="230" fill="none" stroke="rgba(255,80,60,0.6)" stroke-width="5" clip-path="url(#threequarterClip)"/>

  <!-- ===== FULL SURFACE LAYERS for the outer 3/4 ring ===== -->
  <!-- These overlay the convective zone to show surface properly -->

  <!-- Outer photosphere disc (visible surface, r=220) — full 3/4 -->
  <circle cx="310" cy="310" r="220" fill="url(#photoGrad)" clip-path="url(#threequarterClip)" filter="url(#sunOuter)"/>

  <!-- Limb darkening effect: darkens toward edges -->
  <radialGradient id="limbDark" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="transparent"/>
    <stop offset="70%" stop-color="transparent"/>
    <stop offset="100%" stop-color="rgba(80,20,0,0.45)"/>
  </radialGradient>
  <circle cx="310" cy="310" r="220" fill="url(#limbDark)" clip-path="url(#threequarterClip)"/>

  <!-- Thin photosphere stroke -->
  <circle cx="310" cy="310" r="220" fill="none" stroke="#ffe888" stroke-width="1.5" clip-path="url(#threequarterClip)" opacity="0.8"/>

  <!-- Thin chromosphere ring outside photosphere -->
  <circle cx="310" cy="310" r="228" fill="none" stroke="rgba(255,70,50,0.5)" stroke-width="4" clip-path="url(#threequarterClip)"/>

  <!-- ===== CUT FACE: reveal layer rings on the cut edge ===== -->
  <!-- Vertical cut edge (along x=310, from y=50 to y=310) — thin colored strips -->
  <!-- Show layer boundaries on the cut face -->
  <line x1="310" y1="50" x2="310" y2="310" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Horizontal cut edge (along y=310, from x=310 to x=570) — thin colored strips -->
  <line x1="310" y1="310" x2="570" y2="310" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Layer ring indicators on cut face (vertical cut) -->
  <!-- These horizontal "stripes" appear on the cut cross-section at x=310 -->
  <rect x="309" y="90" width="2" height="30" fill="url(#coreGrad)" opacity="0.9"/>
  <rect x="309" y="190" width="2" height="30" fill="url(#radZoneGrad)" opacity="0.9"/>
  <rect x="309" y="110" width="2" height="80" fill="url(#convZoneGrad)" opacity="0.8"/>

  <!-- ===== SOLAR PROMINENCE: curving plasma arc on LEFT side ===== -->
  <g filter="url(#prominGlow)">
    <!-- Main prominence arc: erupts from ~left edge of sun (~r=220 from center) -->
    <!-- Sun edge at left: x=310-220=90, y=310 -->
    <!-- Arc goes up and left, curving back -->
    <path d="M 92,280
             C 40,220 10,160 55,110
             C 85,75 130,95 148,140
             C 160,175 140,210 110,235
             C 95,248 90,262 92,280Z"
          fill="rgba(255,80,20,0.65)" stroke="rgba(255,120,50,0.8)" stroke-width="1.5"/>
    <!-- Inner brighter filament -->
    <path d="M 95,285
             C 50,230 22,170 62,118
             C 88,83 126,100 143,144"
          fill="none" stroke="rgba(255,160,80,0.7)" stroke-width="2.5"/>
    <!-- Secondary smaller prominence -->
    <path d="M 115,355
             C 75,330 45,295 60,265
             C 72,242 100,248 112,270
             C 120,285 118,318 115,355Z"
          fill="rgba(255,60,10,0.50)" stroke="rgba(255,100,40,0.7)" stroke-width="1"/>
  </g>

  <!-- ===== LEADER LINES AND LABELS ===== -->
  <!-- All labels on the right side of the illustration -->

  <!-- Core label -->
  <line x1="310" y1="278" x2="570" y2="188" stroke="rgba(255,255,200,0.55)" stroke-width="0.8"/>
  <circle cx="310" cy="278" r="2" fill="rgba(255,255,200,0.6)"/>
  <rect x="572" y="170" width="195" height="36" rx="3" fill="rgba(0,0,0,0.45)"/>
  <text x="580" y="185" font-family="Arial" font-size="11" font-weight="bold" fill="#ffffd0">Core</text>
  <text x="580" y="200" font-family="Arial" font-size="9.5" fill="#cccc88">15,000,000 °C — nuclear fusion</text>

  <!-- Radiative Zone label -->
  <line x1="310" y1="218" x2="570" y2="238" stroke="rgba(255,240,150,0.55)" stroke-width="0.8"/>
  <circle cx="310" cy="218" r="2" fill="rgba(255,240,150,0.6)"/>
  <rect x="572" y="224" width="172" height="26" rx="3" fill="rgba(0,0,0,0.45)"/>
  <text x="580" y="240" font-family="Arial" font-size="11" font-weight="bold" fill="#ffe880">Radiative Zone</text>

  <!-- Convective Zone label -->
  <line x1="240" y1="130" x2="572" y2="286" stroke="rgba(255,180,80,0.55)" stroke-width="0.8"/>
  <circle cx="240" cy="130" r="2" fill="rgba(255,180,80,0.6)"/>
  <rect x="572" y="272" width="195" height="26" rx="3" fill="rgba(0,0,0,0.45)"/>
  <text x="580" y="288" font-family="Arial" font-size="11" font-weight="bold" fill="#ffaa40">Convective Zone</text>

  <!-- Photosphere label -->
  <line x1="200" y1="138" x2="572" y2="330" stroke="rgba(255,245,160,0.55)" stroke-width="0.8"/>
  <circle cx="200" cy="138" r="2" fill="rgba(255,245,160,0.6)"/>
  <rect x="572" y="316" width="210" height="36" rx="3" fill="rgba(0,0,0,0.45)"/>
  <text x="580" y="331" font-family="Arial" font-size="11" font-weight="bold" fill="#fff5b0">Photosphere</text>
  <text x="580" y="346" font-family="Arial" font-size="9.5" fill="#cccc88">5,500 °C — visible surface</text>

  <!-- Chromosphere label -->
  <line x1="185" y1="153" x2="572" y2="378" stroke="rgba(255,100,80,0.55)" stroke-width="0.8"/>
  <circle cx="185" cy="153" r="2" fill="rgba(255,100,80,0.6)"/>
  <rect x="572" y="366" width="190" height="26" rx="3" fill="rgba(0,0,0,0.45)"/>
  <text x="580" y="382" font-family="Arial" font-size="11" font-weight="bold" fill="#ff9090">Chromosphere</text>

  <!-- Corona label -->
  <line x1="138" y1="192" x2="572" y2="420" stroke="rgba(255,255,230,0.55)" stroke-width="0.8"/>
  <circle cx="138" cy="192" r="2" fill="rgba(255,255,230,0.6)"/>
  <rect x="572" y="408" width="200" height="36" rx="3" fill="rgba(0,0,0,0.45)"/>
  <text x="580" y="423" font-family="Arial" font-size="11" font-weight="bold" fill="#fffff0">Corona</text>
  <text x="580" y="438" font-family="Arial" font-size="9.5" fill="#aaaaaa">1,000,000–3,000,000 °C</text>

  <!-- Prominence label -->
  <line x1="60" y1="160" x2="572" y2="470" stroke="rgba(255,120,60,0.55)" stroke-width="0.8"/>
  <circle cx="60" cy="160" r="2" fill="rgba(255,120,60,0.6)"/>
  <rect x="572" y="458" width="195" height="26" rx="3" fill="rgba(0,0,0,0.45)"/>
  <text x="580" y="474" font-family="Arial" font-size="11" font-weight="bold" fill="#ff8040">Solar Prominence</text>

  <!-- ===== TITLE ===== -->
  <text x="28" y="32" font-family="Arial" font-size="18" font-weight="bold" fill="#ffffff" opacity="0.95" letter-spacing="0.5">The Sun's Layers</text>
  <line x1="28" y1="38" x2="290" y2="38" stroke="rgba(255,255,255,0.20)" stroke-width="0.6"/>
  <text x="28" y="52" font-family="Arial" font-size="10" fill="#888888">Cross-section cutaway view</text>

  <!-- NOT TO SCALE note -->
  <text x="400" y="586" font-family="Arial" font-size="9" fill="#555566" text-anchor="middle">Interior proportions are illustrative, not to precise scale</text>
</svg>
