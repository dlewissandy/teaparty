# Organization defaults — defines the system workgroups and agents created
# when a new organization is set up.  This is the single source of truth;
# nothing else hardcodes agent names, prompts, or tool lists.

system_workgroups:

  # ── Administration ───────────────────────────────────────────────────
  - name: Administration
    agents:
      - name: administration-lead
        is_lead: true
        description: "Administration lead"
        prompt: >
          Administration lead. You triage requests, delegate to specialist
          agents within the admin team, and provide organizational oversight.
        model: haiku
        tools:
          - list_members
          - list_files
          - list_tasks

      - name: workgroup-admin
        description: "__system_admin_agent__"
        prompt: >
          Workgroup administrator. You handle workgroup lifecycle — creating,
          editing, and deleting workgroups, and managing their content
          (jobs, files, agents, members).
        model: haiku
        tools:
          - add_file
          - edit_file
          - rename_file
          - delete_file
          - add_agent
          - add_user
          - remove_member
          - delete_workgroup
          - list_members
          - list_files
          - list_tasks
          - accept_task
          - decline_task
          - complete_task
          - global_create_workgroup
          - global_list_workgroups
          - global_add_agent
          - global_list_agents
          - global_add_file
          - global_list_templates
          - global_list_available_tools
          - global_update_agent
          - edit_workgroup
          - add_agent_to_workgroup
          - remove_agent_from_workgroup
          - find_agent
          - delete_agent
          - add_tool_to_agent
          - remove_tool_from_agent

      - name: organization-admin
        description: "__system_admin_agent__"
        prompt: >
          Organization administrator. You handle organization lifecycle —
          creating, editing, and managing organizations.
        model: haiku
        tools:
          - global_create_organization
          - global_list_organizations
          - find_organization

      - name: partner-admin
        description: "__system_admin_agent__"
        prompt: >
          Partnership administrator. You handle partner relationships —
          finding, adding, and removing organizational partners.
        model: haiku
        tools:
          - list_partners
          - find_organization
          - add_partner
          - delete_partner

      - name: workflow-admin
        description: "__system_admin_agent__"
        prompt: >
          Workflow administrator. You handle workflow management — creating,
          modifying, and managing team workflows.
        model: haiku
        tools:
          - list_workflows
          - create_workflow
          - delete_workflow
          - find_workflow

  # ── Project Management ───────────────────────────────────────────────
  - name: Project Management
    agents:
      - name: projects-lead
        is_lead: true
        description: "Project coordinator"
        prompt: "Strategic and collaborative project coordinator."
        model: sonnet
        tools:
          - Read
          - Write
          - Edit
          - Glob
          - Grep
          - Bash
          - Task
          - WebSearch
          - WebFetch

  # ── Engagement ───────────────────────────────────────────────────────
  - name: Engagement
    agents:
      - name: engagements-lead
        is_lead: true
        description: "Engagement coordinator"
        prompt: "Organized and collaborative engagement coordinator."
        model: sonnet
        tools:
          - Read
          - Write
          - Edit
          - Glob
          - Grep
          - Bash
          - Task
          - WebSearch
          - WebFetch
