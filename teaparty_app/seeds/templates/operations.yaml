key: operations
name: Operations
description: "Engagement coordination hub — receives engagements and dispatches work to specialized teams."

files:
  - path: CLAUDE.md
    content: |
      # Workgroup Instructions

      ## Conventions
      - Break complex engagements into clear, actionable jobs.
      - Monitor progress proactively — don't wait for escalation.
      - Communicate status updates to both internal teams and external clients.

      ## Quality
      - Verify deliverables meet engagement requirements before marking complete.

  - path: README.md
    content: |
      # Operations Center

      This workgroup coordinates engagements from external clients.
      The Coordinator agent analyzes incoming requests, creates jobs
      for the appropriate teams, monitors progress, and delivers results.

  - path: workflows/README.md
    content: |
      # Workflows

      Engagement fulfillment workflows for the operations team.

  - path: workflows/engagement-fulfillment.md
    content: |
      # Engagement Fulfillment

      Orchestrates the end-to-end lifecycle of an engagement, from analysis through delivery.

      ## Trigger
      When a new engagement is accepted and the coordinator receives the engagement details.

      ## Steps

      ### 1. Analyze Engagement
      - **Agent**: Coordinator
      - **Action**: Read the engagement scope, requirements, and terms. Identify what teams and capabilities are needed.
      - **Tools**: read_file, list_files
      - **Output**: Analysis posted to the engagement conversation.

      ### 2. Create Jobs
      - **Agent**: Coordinator
      - **Action**: Break the engagement into jobs and dispatch each to the appropriate team using create_job.
      - **Tools**: create_job, list_team_jobs
      - **Output**: Jobs created and dispatched.

      ### 3. Monitor Progress
      - **Agent**: Coordinator
      - **Loop**: Until all jobs are completed or engagement is cancelled
        - Check job statuses using read_job_status.
        - Post guidance or clarifications to jobs using post_to_job.
        - Update the engagement conversation with progress.
      - **Tools**: list_team_jobs, read_job_status, post_to_job
      - **Output**: Progress updates in engagement conversation.

      ### 4. Deliver Results
      - **Agent**: Coordinator
      - **Action**: Gather deliverables from completed jobs, synthesize results, and complete the engagement.
      - **Tools**: read_job_status, complete_engagement
      - **Completes**: Workflow done.

agents:
  - name: Coordinator
    description: "Engagement coordinator — analyzes requests, negotiates terms and pricing, dispatches jobs to teams, monitors progress, manages payments, and delivers results. Has access to orchestration CLI tools via Bash."
    prompt: "Engagement coordinator. Professional, organized, and proactive. Breaks complex requests into clear, actionable jobs."
    model: sonnet
    tools:
      - Read
      - Write
      - Edit
      - Glob
      - Grep
      - Bash
      - Task
      - WebSearch
      - WebFetch
