  - path: workflows/code-review.md
    content: |
      # Code Review

      A structured code review process that ensures thorough analysis before changes ship.

      ## Trigger
      When a user requests a code review, submits code for review, or asks for feedback on implementation.

      ## Steps

      ### 1. Acknowledge and Scope
      - **Agent**: Reviewer
      - **Action**: Read the submitted code or description, confirm scope, and outline what will be reviewed.
      - **Tools**: list_files, read_file
      - **Output**: Scope summary posted to conversation.

      ### 2. Structural Analysis
      - **Agent**: Reviewer
      - **Action**: Analyze architecture, file organization, and design patterns. Note any structural concerns.
      - **Tools**: list_files, read_file
      - **Output**: review-notes.md created with structural observations.

      ### 3. Implementation Review
      - **Agent**: Implementer
      - **Action**: Review the code for correctness, edge cases, performance, and maintainability.
      - **Tools**: read_file
      - **Output**: Implementation feedback added to review-notes.md.

      ### 4. Synthesize Feedback
      - **Agent**: Reviewer
      - **Loop**: Until all concerns are addressed or 3 iterations max
        - Consolidate feedback from both perspectives.
        - Identify blocking issues vs. suggestions.
        - If new concerns arise, revisit relevant sections.
      - **Tools**: read_file, edit_file
      - **Output**: Final review-notes.md with prioritized feedback.

      ### 5. Present Results
      - **Agent**: Reviewer
      - **Action**: Summarize the review with clear action items, blocking issues, and suggestions.
      - **Completes**: Workflow done.

  - path: workflows/feature-build.md
    content: |
      # Feature Build

      End-to-end feature development from requirements through implementation and review.

      ## Trigger
      When a user wants to build a new feature or requests implementation of a specific capability.

      ## Steps

      ### 1. Clarify Requirements
      - **Agent**: Implementer
      - **Action**: Gather and document requirements, constraints, and acceptance criteria.
      - **Tools**: add_file, list_files
      - **Output**: Requirements documented in a feature spec file.

      ### 2. Design
      - **Agent**: Implementer
      - **Action**: Propose technical design, data structures, and implementation approach.
      - **Tools**: read_file, add_file
      - **Output**: Design document created.

      ### 3. Review Design
      - **Agent**: Reviewer
      - **Action**: Challenge the design for edge cases, scalability, and maintainability concerns.
      - **Tools**: read_file, edit_file
      - **Output**: Design feedback and any required revisions.

      ### 4. Implementation Plan
      - **Agent**: Implementer
      - **Action**: Break the design into ordered implementation steps with dependencies.
      - **Tools**: read_file, edit_file
      - **Output**: Step-by-step implementation plan added to design doc.

      ### 5. Implement
      - **Agent**: Implementer
      - **Loop**: Until all planned steps are complete or 5 iterations max
        - Implement the next step in the plan.
        - Document what was done and any deviations.
      - **Tools**: read_file, add_file, edit_file
      - **Output**: Implementation files created or updated.

      ### 6. Final Review
      - **Agent**: Reviewer
      - **Action**: Review the complete implementation against requirements and design.
      - **Tools**: read_file, list_files
      - **Goto**: 5 (if blocking issues found, return to implementation)
      - **Output**: Final review notes.

      ### 7. Wrap Up
      - **Agent**: Implementer
      - **Action**: Summarize what was built, document any known limitations, and suggest next steps.
      - **Completes**: Workflow done.

