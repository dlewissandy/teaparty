  - path: workflows/session-run.md
    content: |
      # Session Run

      A structured flow for running a collaborative roleplay session from scene-setting through play to debrief.

      ## Trigger
      When a user wants to start a new roleplay session, run a scene, or begin a storytelling exercise.

      ## Steps

      ### 1. Set Scene
      - **Agent**: Scene Director
      - **Action**: Establish the setting, time, mood, and initial situation. Reference world and character files for consistency.
      - **Tools**: read_file, list_files
      - **Output**: Scene description posted to conversation.

      ### 2. Character Check
      - **Agent**: Character Coach
      - **Action**: Confirm which characters are active, review their motivations and voice, and flag any consistency concerns.
      - **Tools**: read_file
      - **Output**: Character readiness confirmation.

      ### 3. Scene Play
      - **Agent**: Scene Director, Character Coach
      - **Loop**: Until the scene reaches a natural endpoint or 5 iterations max
        - Scene Director proposes the next beat or complication.
        - Character Coach ensures character consistency and suggests dialogue adjustments.
        - Respond to user input and choices.
      - **Tools**: read_file, edit_file
      - **Output**: Session file updated with scene events.

      ### 4. Debrief
      - **Agent**: Scene Director
      - **Action**: Summarize what happened, highlight memorable moments, and note threads to continue.
      - **Tools**: read_file, edit_file
      - **Output**: Session file updated with debrief notes.
      - **Completes**: Workflow done.

