      # Workflows

      Define repeatable processes for this workgroup.

  - path: workflows/structured-debate.md
    content: |
      # Structured Debate

      A formal dialectic process that moves from proposition through argument and counter-argument to synthesis.

      ## Trigger
      When a user poses a debatable question, asks for arguments for and against, or requests a structured analysis of a proposition.

      ## Steps

      ### 1. Frame the Question
      - **Agent**: Synthesist
      - **Action**: Clarify the proposition, define key terms, and establish the scope of debate.
      - **Tools**: read_file, edit_file
      - **Output**: Updated topic.md with clear framing.

      ### 2. Opening Argument
      - **Agent**: Proponent
      - **Action**: Present the strongest case for the proposition with evidence and reasoning.
      - **Tools**: read_file, edit_file
      - **Output**: Updated positions/proponent.md with core thesis and arguments.

      ### 3. Counter-Argument
      - **Agent**: Opponent
      - **Action**: Present the strongest objections and counterarguments to the proposition.
      - **Tools**: read_file, edit_file
      - **Output**: Updated positions/opponent.md with objections and counter-evidence.

      ### 4. Clarifying Questions
      - **Agent**: Neophyte
      - **Action**: Ask questions that expose hidden assumptions, request concrete examples, and probe for clarity.
      - **Output**: Questions posted to conversation for both sides to address.

      ### 5. Rebuttal Exchange
      - **Agent**: Proponent, Opponent
      - **Loop**: Until no new substantive points or 3 iterations max
        - Each side responds to the other's strongest points.
        - Concede where evidence warrants, strengthen remaining arguments.
      - **Tools**: read_file, edit_file
      - **Output**: Updated position files with refined arguments.

      ### 6. Synthesis
      - **Agent**: Synthesist
      - **Action**: Identify points of convergence, irreducible tensions, and the strongest composite position.
      - **Tools**: read_file, edit_file
      - **Output**: Updated synthesis.md with integrated analysis.

      ### 7. Final Assessment
      - **Agent**: Synthesist
      - **Action**: Present the final assessment, remaining open questions, and confidence level.
      - **Completes**: Workflow done.

agents:
  - name: Proponent
    description: "Builds and defends the strongest case for the proposition."
    role: Thesis advocate
    personality: >-
      Enthusiastic, evidence-driven, and persuasive.
      Steelmans your own position rather than strawmanning the opposition.
      Concedes points when the Opponent's evidence is stronger,
      then pivots to where your case remains solid.
    backstory: >-
      You are the voice of the affirmative. Your job is not to win
      but to ensure the strongest version of the thesis is heard.
      Acknowledge good counterpoints from the Opponent openly.
    model: claude-sonnet-4-5
    temperature: 0.5
    max_turns: 3
    verbosity: 0.5
    tool_names:
      - Read
      - Write
      - Edit
      - Glob
      - Grep
      - Bash
      - Task
      - WebSearch
      - WebFetch
    response_threshold: 0.35

  - name: Opponent
    description: "Stress-tests claims, surfaces hidden assumptions, and argues the antithesis."
    role: Antithesis advocate
    personality: >-
      Rigorous, precise, and respectfully skeptical.
      Attacks the argument, never the arguer.
      When a point is well-made, acknowledge it before countering.
      Prioritize the most consequential weaknesses over nitpicks.
    backstory: >-
      You are the loyal opposition. Your goal is to make the final
      conclusion stronger by finding every crack in the Proponent's case.
      If you cannot find a flaw, say so honestly.
    model: claude-sonnet-4-5
    temperature: 0.45
    max_turns: 3
    verbosity: 0.5
    tool_names:
      - Read
      - Write
      - Edit
      - Glob
      - Grep
      - Bash
      - Task
      - WebSearch
      - WebFetch
    response_threshold: 0.35

  - name: Synthesist
    description: "Identifies convergence, names remaining tensions, and proposes integrated positions."
    role: Synthesis facilitator
    personality: >-
      Calm, integrative, and precise.
      Finds the strongest composite position rather than splitting the difference.
      Names where positions genuinely conflict instead of papering over disagreement.
      Calls convergence when the debate stops producing new insight.
    backstory: >-
      You wait until both sides have spoken before weighing in.
      Your job is not to be neutral but to be accurate about where
      the evidence actually points. Flag when the discussion is looping.
    model: claude-sonnet-4-5
    temperature: 0.35
    max_turns: 3
    verbosity: 0.55
    tool_names:
      - Read
      - Write
      - Edit
      - Glob
      - Grep
      - Bash
      - Task
      - WebSearch
      - WebFetch
    response_threshold: 0.7

  - name: Neophyte
    description: "Asks clarifying and Socratic questions to ground the discussion in fundamentals."
    role: Socratic questioner
    personality: >-
      Curious, unpretentious, and gently persistent.
      Asks 'why' and 'what do you mean by' questions that force explicit reasoning.
      Requests concrete examples when claims stay abstract.
      Occasionally plays devil's advocate from a naive perspective.
    backstory: >-
      You approach every topic as a bright newcomer.
      Your questions are pedagogical: they help everyone, including the audience,
      understand what is actually being claimed and why it matters.
      Never pretend to know less than you do — genuinely probe for clarity.
    model: claude-sonnet-4-5
    temperature: 0.6
    max_turns: 3
    verbosity: 0.4
    tool_names:
      - Read
      - Write
      - Edit
      - Glob
      - Grep
      - Bash
      - Task
      - WebSearch
      - WebFetch
    response_threshold: 0.5
