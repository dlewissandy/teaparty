permissions:
  allow:
    # ── MCP catalog tools (legacy; the agent's tool whitelist is in its
    #    own agent.md frontmatter — these entries survive pending a
    #    broader cleanup). ────────────────────────────────────────────
    - mcp__teaparty-config__Send
    - mcp__teaparty-config__AskQuestion
    - mcp__teaparty-config__CloseConversation
    - mcp__teaparty-config__ListAgents
    - mcp__teaparty-config__GetAgent
    - mcp__teaparty-config__ListSkills
    - mcp__teaparty-config__GetSkill
    - mcp__teaparty-config__ListWorkgroups
    - mcp__teaparty-config__GetWorkgroup
    - mcp__teaparty-config__ListProjects
    - mcp__teaparty-config__GetProject
    - mcp__teaparty-config__ListHooks
    - mcp__teaparty-config__ListScheduledTasks
    - mcp__teaparty-config__ListPins
    - mcp__teaparty-config__ListTeamMembers
    - mcp__teaparty-config__CreateAgent
    - mcp__teaparty-config__EditAgent
    - mcp__teaparty-config__RemoveAgent
    - mcp__teaparty-config__CreateSkill
    - mcp__teaparty-config__EditSkill
    - mcp__teaparty-config__RemoveSkill
    - mcp__teaparty-config__CreateWorkgroup
    - mcp__teaparty-config__EditWorkgroup
    - mcp__teaparty-config__RemoveWorkgroup
    - mcp__teaparty-config__CreateHook
    - mcp__teaparty-config__EditHook
    - mcp__teaparty-config__RemoveHook
    - mcp__teaparty-config__CreateScheduledTask
    - mcp__teaparty-config__EditScheduledTask
    - mcp__teaparty-config__RemoveScheduledTask
    - mcp__teaparty-config__AddProject
    - mcp__teaparty-config__CreateProject
    - mcp__teaparty-config__RemoveProject
    - mcp__teaparty-config__ScaffoldProjectYaml
    - mcp__teaparty-config__PinArtifact
    - mcp__teaparty-config__UnpinArtifact
    - mcp__teaparty-config__WithdrawSession
    - mcp__teaparty-config__PauseDispatch
    - mcp__teaparty-config__ResumeDispatch
    - mcp__teaparty-config__ReprioritizeDispatch

    # ── Folder/path permissions — agents work inside their worktree.
    #    Read/Edit/Write/Glob/Grep are already confined by
    #    .claude/hooks/worktree_hook.py; these patterns cover Bash and
    #    act as defense-in-depth. ──────────────────────────────────────

    # Repo-local git
    - "Bash(git status)"
    - "Bash(git diff:*)"
    - "Bash(git log:*)"
    - "Bash(git show:*)"
    - "Bash(git branch:*)"
    - "Bash(git add:*)"
    - "Bash(git commit:*)"
    - "Bash(git checkout:*)"
    - "Bash(git stash:*)"
    - "Bash(git fetch:*)"
    - "Bash(git rebase:*)"
    - "Bash(git merge:*)"
    - "Bash(git restore:*)"
    - "Bash(git switch:*)"
    - "Bash(git worktree list)"

    # Build / test tooling
    - "Bash(uv:*)"
    - "Bash(python:*)"
    - "Bash(python3:*)"
    - "Bash(pytest:*)"
    - "Bash(npm run:*)"
    - "Bash(npm test:*)"
    - "Bash(node:*)"
    - "Bash(go:*)"
    - "Bash(cargo:*)"
    - "Bash(make:*)"

    # Read-only inspection inside the worktree
    - "Bash(ls:*)"
    - "Bash(pwd)"
    - "Bash(which:*)"
    - "Bash(env)"
    - "Bash(echo:*)"
    - "Bash(cat:*)"
    - "Bash(head:*)"
    - "Bash(tail:*)"
    - "Bash(wc:*)"
    - "Bash(grep:*)"
    - "Bash(find:*)"

  deny:
    # Privilege escalation — never.
    - "Bash(sudo:*)"
    - "Bash(su:*)"
    - "Bash(doas:*)"

    # Irrecoverable destruction.
    - "Bash(rm -rf /:*)"
    - "Bash(rm -rf ~:*)"
    - "Bash(mkfs:*)"
    - "Bash(dd:*)"
    - "Bash(shutdown:*)"
    - "Bash(reboot:*)"

    # Git danger zone.
    - "Bash(git push --force:*)"
    - "Bash(git push -f:*)"
    - "Bash(git reset --hard:*)"
    - "Bash(git config --global:*)"
    - "Bash(git config --system:*)"

    # Repo internals — no writes.  (Reads are allowed: `git log` etc.)
    - "Write(.git/**)"
    - "Edit(.git/**)"
    - "MultiEdit(.git/**)"
    - "Write(.claude/**)"
    - "Edit(.claude/**)"
    - "MultiEdit(.claude/**)"
    - "Bash(rm .git:*)"
    - "Bash(rm -rf .git:*)"
    - "Bash(rm .claude:*)"
    - "Bash(rm -rf .claude:*)"

    # Credential-adjacent paths (worktree_hook already jails these for
    # Read/Edit/Write; this is belt-and-suspenders).
    - "Read(~/.ssh/**)"
    - "Read(~/.aws/**)"
    - "Read(~/.config/gh/**)"
    - "Read(~/.netrc)"
    - "Read(~/.gnupg/**)"
    - "Read(/etc/passwd)"
    - "Read(/etc/shadow)"

  ask:
    # Environment mutation — human gate.
    - "Bash(pip install:*)"
    - "Bash(npm install:*)"
    - "Bash(uv add:*)"
    - "Bash(uv pip install:*)"

    # Network beyond git.
    - "Bash(curl:*)"
    - "Bash(wget:*)"
    - "Bash(ssh:*)"
    - "Bash(scp:*)"
    - "Bash(rsync:*)"

hooks:
  PreToolUse:
    - matcher: "Edit|Write"
      hooks:
        - type: command
          command: ".claude/hooks/enforce-ownership.sh"
    - matcher: "Bash"
      hooks:
        - type: command
          command: "python3 .claude/hooks/bash_jail_hook.py"
