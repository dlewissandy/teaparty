name: Quality Control
description: Verification of artifact behavior — test execution, regression coverage,
  performance, and AI detection. Distinct from Quality Assurance (which verifies
  intent fidelity and acceptance). Dispatch after implementation, before QA.
lead: quality-control-lead
humans:
  decider: primus
members:
  agents:
  - test-reviewer
  - regression-tester
  - performance-analyst
  - ai-smell
  hooks: []
artifacts:
- path: .teaparty/workgroups/NORMS-quality-control.md
  label: Norms
stats:
  storage: .teaparty/stats/quality-control.json
