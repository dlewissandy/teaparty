name: software-development
description: Per-issue orchestration of the fix-issue pipeline. One lead instance
  per open GitHub issue; parallel issues run as parallel leads. The lead delegates
  implementation to coding-lead, behavior verification to quality-control-lead,
  intent-fidelity verification to quality-assurance-lead, documentation updates
  to writing-lead, and a second coding round to resolve QA findings.
lead: software-development-lead
humans:
  decider: primus
members:
  agents:
  - coding-lead
  - quality-control-lead
  - quality-assurance-lead
  - writing-lead
  hooks: []
artifacts:
- path: .teaparty/workgroups/NORMS-software-development.md
  label: Norms
stats:
  storage: .teaparty/stats/software-development.json
agents:
- name: coding-lead
- name: quality-control-lead
- name: quality-assurance-lead
- name: writing-lead
