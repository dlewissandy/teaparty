site_name: TeaParty
site_description: "Research platform exploring four pillars of human-AI collaboration: Conversation for Action (CfA), hierarchical memory and learning, hierarchical teams, and human proxy agents"
repo_url: https://github.com/dlewissandy/teaparty

theme:
  name: material
  logo: images/teaparty.png
  favicon: images/teaparty.png
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - macros:
      module_name: docs/hooks/macros

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Home: index.md
  - Overview: overview.md
  - Conceptual Design:
    - Agentic Conversation for Action: conceptual-design/cfa-state-machine.md
    - Intent Engineering: conceptual-design/intent-engineering.md
    - Strategic Planning: conceptual-design/strategic-planning.md
    - Hierarchical Memory & Learning: conceptual-design/learning-system.md
    - Hierarchical Teams: conceptual-design/hierarchical-teams.md
    - Human Proxy Agents: conceptual-design/human-proxies.md
    - Agent Dispatch: conceptual-design/agent-dispatch.md
    - Office Manager: conceptual-design/office-manager.md
    - Human Participation: conceptual-design/human-participation.md
    - Messaging: conceptual-design/messaging.md
    - Sandbox Design: conceptual-design/sandbox-design.md
    - Cognitive Architecture: conceptual-design/cognitive-architecture.md
  - Detailed Design:
    - Overview: detailed-design/index.md
    - Agent Runtime: detailed-design/agent-runtime.md
    - CfA State Machine: detailed-design/cfa-state-machine.md
    - Approval Gate: detailed-design/approval-gate.md
    - Learning System: detailed-design/learning-system.md
  - Reference:
    - File Layout: reference/file-layout.md
    - Folder Structure: reference/folder-structure.md
    - UX Design: reference/UX.md
    - Research Directions: reference/research-directions.md
    - Autodiscovery: reference/autodiscovery.md
  - End-to-End Walkthrough:
    - Overview: e2e/e2e-walkthrough.md
    - Intent & Planning: e2e/dialog.md
    - Execution: e2e/execution.md
    - The Manuscript: e2e/results.md
    - Obstacles: e2e/obstacles.md
    - Learnings: e2e/learnings.md
    - Key Takeaways: e2e/takeaways.md
  - Experimental Results:
    - Overview: experimental-results/index.md
    - CfA Backtrack Effectiveness: experimental-results/cfa-backtrack-effectiveness.md
    - Hierarchical vs. Flat Coordination: experimental-results/hierarchical-vs-flat-coordination.md
    - Liaison Context Compression: experimental-results/liaison-context-compression.md
    - Proxy Convergence: experimental-results/proxy-convergence.md
    - Asymmetric Regret Calibration: experimental-results/asymmetric-regret-calibration.md
    - Scoped vs. Flat Retrieval: experimental-results/scoped-vs-flat-retrieval.md
    - Cost-Quality Frontier: experimental-results/cost-quality-frontier.md
