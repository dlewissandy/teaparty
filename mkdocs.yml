site_name: TeaParty
site_description: "Research platform exploring four pillars of human-AI collaboration: Conversation for Action (CfA), hierarchical memory and learning, hierarchical teams, and human proxy agents"
repo_url: https://github.com/dlewissandy/teaparty

theme:
  name: material
  logo: images/teaparty.png
  favicon: images/teaparty.png
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - macros:
      module_name: docs/hooks/macros

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Home: index.md
  - Conceptual Design:
    - Agentic Conversation for Action: cfa-state-machine.md
    - Intent Engineering: intent-engineering.md
    - Strategic Planning: strategic-planning.md
    - Hierarchical Memory & Learning: learning-system.md
    - Hierarchical Teams: hierarchical-teams.md
    - Human Proxy Agents: human-proxies.md
  - Implementation:
    - POC Architecture: poc-architecture.md
    - Folder Structure: folder-structure.md
    - Engagements & Partnerships: engagements-and-partnerships.md
    - Agent Dispatch: agent-dispatch.md
    - Workflows: workflows.md
  - Research:
    - Cognitive Architecture: cognitive-architecture.md
    - Research Index: research/INDEX.md
