site_name: TeaParty
site_description: "Research platform exploring four pillars of human-AI collaboration: Conversation for Action (CfA), hierarchical memory and learning, hierarchical teams, and human proxy agents"
repo_url: https://github.com/dlewissandy/teaparty

theme:
  name: material
  logo: images/teaparty.png
  favicon: images/teaparty.png
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - macros:
      module_name: docs/hooks/macros

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Home: index.md
  - Conceptual Design:
    - Agentic Conversation for Action: cfa-state-machine.md
    - Intent Engineering: intent-engineering.md
    - Strategic Planning: strategic-planning.md
    - Hierarchical Memory & Learning: learning-system.md
    - Hierarchical Teams: hierarchical-teams.md
    - Human Proxy Agents: human-proxies.md
  - Detailed Design:
    - Overview: detailed-design/index.md
    - Agent Runtime: detailed-design/agent-runtime.md
    - CfA State Machine: detailed-design/cfa-state-machine.md
    - Approval Gate: detailed-design/approval-gate.md
    - Learning System: detailed-design/learning-system.md
    - Folder Structure: folder-structure.md
    - Agent Dispatch: agent-dispatch.md
  - End-to-End Walkthrough:
    - Overview: e2e-walkthrough.md
    - Intent & Planning: e2e/dialog.md
    - Execution: e2e/execution.md
    - The Manuscript: e2e/results.md
    - Obstacles: e2e/obstacles.md
    - Learnings & Assessment: e2e/learnings.md
  - Experimental Results:
    - Overview: experimental-results/index.md
    - CfA Backtrack Effectiveness: experimental-results/cfa-backtrack-effectiveness.md
    - Hierarchical vs. Flat Coordination: experimental-results/hierarchical-vs-flat-coordination.md
    - Liaison Context Compression: experimental-results/liaison-context-compression.md
    - Proxy Convergence: experimental-results/proxy-convergence.md
    - Asymmetric Regret Calibration: experimental-results/asymmetric-regret-calibration.md
    - Scoped vs. Flat Retrieval: experimental-results/scoped-vs-flat-retrieval.md
    - Cost-Quality Frontier: experimental-results/cost-quality-frontier.md
