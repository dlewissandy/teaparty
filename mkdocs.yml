site_name: TeaParty
site_description: "Research platform exploring four pillars of human-AI collaboration: Conversation for Action (CfA), hierarchical memory and learning, hierarchical teams, and human proxy agents"
repo_url: https://github.com/dlewissandy/teaparty

theme:
  name: material
  logo: images/teaparty.png
  favicon: images/teaparty.png
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - macros:
      module_name: docs/hooks/macros

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra_css:
  - stylesheets/extra.css

nav:
  - Introduction:
    - What is TeaParty: index.md
    - Overview: overview.md
  - Background:
    - Conversation Patterns for Agents: background/conversation-patterns.md
    - Agent Memory and Learning: background/agent-memory.md
    - Human-AI Collaboration and Oversight: background/human-ai-collaboration.md
    - Research Library: research/INDEX.md
    - Cognitive Architectures Supplement: research/cognitive-architectures-supplement.md
    - Human Proxy Agent Design: research/human-proxy-agent-design.md
    - Proxy Prediction & Active Learning: research/proxy-prediction-and-active-learning.md
