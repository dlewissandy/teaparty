<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TeaParty — Gantt</title>
<link rel="stylesheet" href="styles.css">
<script src="breadcrumb.js"></script>
<style>
  .gantt-page { padding: 16px; overflow: auto; flex: 1; }
  .gantt-header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 12px; }
  .gantt-title  { font-size: 16px; font-weight: 600; color: var(--green); }
  .gantt-meta   { font-size: 10px; color: var(--text-dim); }
  .gantt-empty  { font-size: 12px; color: var(--text-dim); padding: 32px; text-align: center; }
  .gantt-svg    { display: block; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; }
  .gantt-tip    {
    position: absolute; pointer-events: none; padding: 6px 8px;
    background: var(--bg); border: 1px solid var(--border); border-radius: 3px;
    font-size: 10px; color: var(--text); display: none; z-index: 100;
    white-space: pre-line; max-width: 320px;
  }
  .gantt-legend { display: flex; gap: 14px; margin: 12px 0; flex-wrap: wrap; font-size: 10px; color: var(--text-dim); }
  .gantt-legend span { display: inline-flex; align-items: center; gap: 4px; }
  .gantt-legend i { display: inline-block; width: 10px; height: 10px; border-radius: 2px; }
</style>
</head>
<body>

<div style="display:flex;flex-direction:column;height:100vh">
<div id="breadcrumb-slot" style="padding:6px 12px;flex-shrink:0"></div>
<div class="gantt-page">
  <div class="gantt-header">
    <div class="gantt-title">Job Gantt</div>
    <div class="gantt-meta" id="meta">loading…</div>
  </div>
  <div class="gantt-legend">
    <span><i style="background:#5d8aa8"></i>project_lead</span>
    <span><i style="background:#9d72c1"></i>team_lead</span>
    <span><i style="background:#7aa874"></i>specialist</span>
    <span><i style="background:#c08a5e"></i>proxy</span>
    <span><i style="background:#666"></i>tool span</span>
  </div>
  <div id="gantt-root">
    <div class="gantt-empty">Loading…</div>
  </div>
  <div class="gantt-tip" id="tip"></div>
</div>
</div>

<script>
// ── URL params ────────────────────────────────────────────────────────────────
var _params = new URLSearchParams(window.location.search);
var _job_id = _params.get('job') || _params.get('job_id') || '';

// ── Breadcrumb ────────────────────────────────────────────────────────────────
(function () {
  document.getElementById('breadcrumb-slot').innerHTML = breadcrumbBar([
    { label: 'Home', href: 'index.html' },
    { label: 'Statistics', href: 'stats.html' },
    { label: 'Gantt' },
  ]);
}());

if (!_job_id) {
  document.getElementById('gantt-root').innerHTML =
    '<div class="gantt-empty">Pass <code>?job=&lt;job_id&gt;</code> to view a Gantt chart for that job.</div>';
} else {
  fetch('/api/analysis/gantt/' + encodeURIComponent(_job_id))
    .then(function (r) { return r.json(); })
    .then(render)
    .catch(function (err) {
      document.getElementById('gantt-root').innerHTML =
        '<div class="gantt-empty">Failed to load Gantt data: ' + err + '</div>';
    });
}

var ROLE_COLOR = {
  project_lead: '#5d8aa8',
  team_lead:    '#9d72c1',
  specialist:   '#7aa874',
  proxy:        '#c08a5e',
  management:   '#a09060',
  unknown:      '#888',
};

function render(payload) {
  var sessions = payload.sessions || [];
  var intervals = payload.phase_intervals || [];
  var tools = payload.tool_spans || [];
  var edges = payload.dispatch_edges || [];

  if (!sessions.length) {
    document.getElementById('gantt-root').innerHTML =
      '<div class="gantt-empty">No sessions recorded for ' + _job_id + ' yet.</div>';
    return;
  }

  // Compute time bounds across all events.
  var allTs = [];
  sessions.forEach(function (s) {
    if (s.first_ts != null) allTs.push(s.first_ts);
    if (s.last_ts != null)  allTs.push(s.last_ts);
  });
  tools.forEach(function (t) {
    if (t.start_ts != null) allTs.push(t.start_ts);
    if (t.end_ts != null)   allTs.push(t.end_ts);
  });
  intervals.forEach(function (p) {
    if (p.start_ts != null) allTs.push(p.start_ts);
    if (p.end_ts != null)   allTs.push(p.end_ts);
  });
  if (!allTs.length) {
    document.getElementById('gantt-root').innerHTML =
      '<div class="gantt-empty">Sessions found but no spans recorded yet.</div>';
    return;
  }
  var t0 = Math.min.apply(Math, allTs);
  var t1 = Math.max.apply(Math, allTs);
  var span = Math.max(1, t1 - t0);

  // Sort sessions: lead first, then by depth, then by first_ts.
  sessions.sort(function (a, b) {
    var da = a.dispatch_depth == null ? 99 : a.dispatch_depth;
    var db = b.dispatch_depth == null ? 99 : b.dispatch_depth;
    if (da !== db) return da - db;
    return (a.first_ts || 0) - (b.first_ts || 0);
  });

  document.getElementById('meta').textContent =
    'job ' + _job_id + ' — ' + sessions.length + ' sessions, ' +
    tools.length + ' tool calls, ' + edges.length + ' dispatch edges, ' +
    span.toFixed(1) + 's wall clock';

  // SVG dimensions.
  var rowH = 28;
  var labelW = 220;
  var width = Math.max(900, window.innerWidth - 60);
  var chartW = width - labelW - 20;
  var height = sessions.length * rowH + 40;

  function x(t) { return labelW + (t - t0) / span * chartW; }
  var sessionRow = {};
  sessions.forEach(function (s, i) { sessionRow[s.session_id] = i; });

  var ns = 'http://www.w3.org/2000/svg';
  var svg = document.createElementNS(ns, 'svg');
  svg.setAttribute('class', 'gantt-svg');
  svg.setAttribute('width', String(width));
  svg.setAttribute('height', String(height));

  // Axis line and time ticks.
  var axisY = sessions.length * rowH + 8;
  var axis = document.createElementNS(ns, 'line');
  axis.setAttribute('x1', String(labelW));
  axis.setAttribute('y1', String(axisY));
  axis.setAttribute('x2', String(labelW + chartW));
  axis.setAttribute('y2', String(axisY));
  axis.setAttribute('stroke', 'var(--border)');
  svg.appendChild(axis);
  for (var k = 0; k <= 4; k++) {
    var tx = labelW + (k / 4) * chartW;
    var tick = document.createElementNS(ns, 'line');
    tick.setAttribute('x1', String(tx));
    tick.setAttribute('y1', String(axisY));
    tick.setAttribute('x2', String(tx));
    tick.setAttribute('y2', String(axisY + 4));
    tick.setAttribute('stroke', 'var(--border)');
    svg.appendChild(tick);
    var lbl = document.createElementNS(ns, 'text');
    lbl.setAttribute('x', String(tx));
    lbl.setAttribute('y', String(axisY + 18));
    lbl.setAttribute('font-size', '9');
    lbl.setAttribute('text-anchor', 'middle');
    lbl.setAttribute('fill', 'var(--text-dim)');
    lbl.textContent = ((k / 4) * span).toFixed(1) + 's';
    svg.appendChild(lbl);
  }

  // Per-session row.
  sessions.forEach(function (s, i) {
    var y = i * rowH + 6;
    // Label
    var label = document.createElementNS(ns, 'text');
    label.setAttribute('x', String(labelW - 8));
    label.setAttribute('y', String(y + 14));
    label.setAttribute('font-size', '11');
    label.setAttribute('text-anchor', 'end');
    label.setAttribute('fill', 'var(--text)');
    label.textContent = (s.agent_name || s.session_id) +
      (s.dispatch_depth != null ? ' (d=' + s.dispatch_depth + ')' : '');
    svg.appendChild(label);

    // Session bar.
    if (s.first_ts != null && s.last_ts != null && s.last_ts > s.first_ts) {
      var bar = document.createElementNS(ns, 'rect');
      bar.setAttribute('x', String(x(s.first_ts)));
      bar.setAttribute('y', String(y + 4));
      bar.setAttribute('width', String(Math.max(2, x(s.last_ts) - x(s.first_ts))));
      bar.setAttribute('height', '14');
      bar.setAttribute('fill', ROLE_COLOR[s.role] || '#888');
      bar.setAttribute('opacity', '0.85');
      bindTip(bar, s.session_id + '\nrole=' + s.role +
        '\nagent=' + s.agent_name +
        '\nspan=' + (s.last_ts - s.first_ts).toFixed(2) + 's');
      svg.appendChild(bar);
    }

    // Phase intervals as faint underlay rectangles.
    intervals.filter(function (p) { return p.session_id === s.session_id; })
      .forEach(function (p) {
        if (p.start_ts == null) return;
        var endTs = p.end_ts != null ? p.end_ts : t1;
        var rect = document.createElementNS(ns, 'rect');
        rect.setAttribute('x', String(x(p.start_ts)));
        rect.setAttribute('y', String(y));
        rect.setAttribute('width', String(Math.max(2, x(endTs) - x(p.start_ts))));
        rect.setAttribute('height', '4');
        rect.setAttribute('fill', '#cccccc');
        rect.setAttribute('opacity', '0.45');
        bindTip(rect, 'phase: ' + (p.phase || '?') + ' (' + (p.new_state || '?') + ')');
        svg.appendChild(rect);
      });
  });

  // Tool spans within their issuing session row.
  tools.forEach(function (t) {
    var rowIdx = sessionRow[t.session_id];
    if (rowIdx == null || t.start_ts == null || t.end_ts == null) return;
    var y = rowIdx * rowH + 22;
    var tb = document.createElementNS(ns, 'rect');
    tb.setAttribute('x', String(x(t.start_ts)));
    tb.setAttribute('y', String(y));
    tb.setAttribute('width', String(Math.max(2, x(t.end_ts) - x(t.start_ts))));
    tb.setAttribute('height', '4');
    tb.setAttribute('fill', t.is_error ? '#c66' : '#666');
    bindTip(tb, t.tool_name + (t.mcp_server ? ' [' + t.mcp_server + ']' : '') +
      '\n' + (t.duration_ms || 0) + 'ms');
    svg.appendChild(tb);
  });

  // Dispatch edges drawn as connectors between session rows.
  edges.forEach(function (e) {
    var pi = sessionRow[e.parent_session_id];
    var ci = sessionRow[e.child_session_id];
    if (pi == null || ci == null || e.ts == null) return;
    var px = x(e.ts), py = pi * rowH + 18, cy = ci * rowH + 4;
    var line = document.createElementNS(ns, 'path');
    line.setAttribute('d',
      'M' + px + ',' + py + ' C ' + px + ',' + (py + 8) + ' ' +
      px + ',' + (cy - 8) + ' ' + (px + 4) + ',' + cy);
    line.setAttribute('stroke', '#888');
    line.setAttribute('fill', 'none');
    line.setAttribute('opacity', '0.5');
    svg.appendChild(line);
  });

  var root = document.getElementById('gantt-root');
  root.innerHTML = '';
  root.appendChild(svg);
}

function bindTip(el, text) {
  var tip = document.getElementById('tip');
  el.addEventListener('mousemove', function (e) {
    tip.textContent = text;
    tip.style.left = (e.pageX + 12) + 'px';
    tip.style.top  = (e.pageY + 12) + 'px';
    tip.style.display = 'block';
  });
  el.addEventListener('mouseleave', function () {
    tip.style.display = 'none';
  });
}
</script>
</body>
</html>
