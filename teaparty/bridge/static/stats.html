<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TeaParty — Statistics</title>
<link rel="stylesheet" href="styles.css">
<script src="breadcrumb.js"></script>
<!-- Chart.js for rendering charts (Issue #406) -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  .stats-page { padding: 20px; overflow-y: auto; flex: 1; }
  .stats-scope-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .stats-scope-subtitle { font-size: 10px; color: var(--text-dim); margin-bottom: 16px; }
  .time-range-bar {
    display: flex; align-items: center; gap: 6px; margin-bottom: 16px;
  }
  .time-range-bar span { font-size: 10px; color: var(--text-dim); }
  .time-range-btn {
    padding: 3px 9px; font-size: 9px; font-family: inherit; cursor: pointer;
    background: var(--surface); border: 1px solid var(--border); border-radius: 3px;
    color: var(--text-dim); transition: border-color 0.1s, color 0.1s;
  }
  .time-range-btn:hover { border-color: var(--green); color: var(--text); }
  .time-range-btn.active { border-color: var(--green); color: var(--green); }
  .chart-canvas-wrap { height: 180px; }
  .stats-empty { font-size: 10px; color: var(--text-dim); text-align: center; padding: 20px; }
</style>
</head>
<body>

<div style="display:flex;flex-direction:column;height:100vh">
<div id="breadcrumb-slot" style="padding:6px 12px;flex-shrink:0"></div>
<div class="stats-page" id="content">
  <div class="pane-title">Statistics</div>
  <div class="stats-empty">Loading\u2026</div>
</div>
</div>

<script>
// ── URL params ────────────────────────────────────────────────────────────────
var _params  = new URLSearchParams(window.location.search);
var _scope   = _params.get('scope') || null;
var _agent   = _params.get('agent') || null;
var _session = _params.get('session') || null;
var time_range = _params.get('time_range') || '7d';

// ── Breadcrumb ────────────────────────────────────────────────────────────────
(function () {
  document.getElementById('breadcrumb-slot').innerHTML = breadcrumbBar([
    { label: 'Home', href: 'index.html' },
    { label: 'Statistics' },
  ]);
  var label = 'Statistics';
  if (_agent) label += ' \u2014 ' + _agent;
  else if (_scope) label += ' \u2014 ' + _scope;
  document.title = 'TeaParty \u2014 ' + label;
}());

// ── Chart registry ────────────────────────────────────────────────────────────
var _charts = {};

function _destroyCharts() {
  Object.keys(_charts).forEach(function(k) {
    try { _charts[k].destroy(); } catch (e) {}
  });
  _charts = {};
}

// ── Fetch helpers ─────────────────────────────────────────────────────────────
function _chartUrl(chart_type) {
  var base = '/api/telemetry/chart/' + encodeURIComponent(chart_type);
  var qs = [];
  if (_scope)   qs.push('scope='   + encodeURIComponent(_scope));
  if (_agent)   qs.push('agent='   + encodeURIComponent(_agent));
  if (_session) qs.push('session=' + encodeURIComponent(_session));
  qs.push('time_range=' + encodeURIComponent(time_range));
  return base + (qs.length ? '?' + qs.join('&') : '');
}

function _fetchChart(chart_type) {
  return fetch(_chartUrl(chart_type))
    .then(function(r) { return r.ok ? r.json() : null; })
    .catch(function() { return null; });
}

// ── Chart theme colours ───────────────────────────────────────────────────────
var C = {
  green:  '#4ecca3', yellow: '#f0c040', orange: '#e07020',
  red: '#e94560', purple: '#a78bfa', dim: '#888',
  grid: 'rgba(42,42,74,0.6)', text: '#eee',
};

function _baseOptions(yLabel) {
  return {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    scales: {
      x: { ticks: { color: C.dim, font: { size: 8 } }, grid: { color: C.grid } },
      y: {
        ticks: { color: C.dim, font: { size: 8 } }, grid: { color: C.grid },
        title: yLabel ? { display: true, text: yLabel, color: C.dim, font: { size: 8 } } : {},
      },
    },
  };
}

// ── Render a canvas inside a chart-card ──────────────────────────────────────
function _cardHTML(id, title) {
  return '<div class="chart-card"><div class="chart-title">' + title + '</div>'
    + '<div class="chart-canvas-wrap"><canvas id="' + id + '"></canvas></div></div>';
}

// ── Individual chart builders ─────────────────────────────────────────────────

function _renderCostOverTime(data) {
  if (!data || !data.length) return;
  var labels = data.map(function(d) { return d.date.slice(5); });
  var vals   = data.map(function(d) { return d.cost_usd; });
  var ctx = document.getElementById('chart-cost').getContext('2d');
  _charts['cost'] = new Chart(ctx, {
    type: 'line',
    data: { labels: labels, datasets: [{ data: vals, borderColor: C.purple,
      backgroundColor: 'rgba(167,139,250,0.1)', fill: true, tension: 0.3, pointRadius: 3 }] },
    options: _baseOptions('USD'),
  });
}

function _renderTurnsPerDay(data) {
  if (!data || !data.length) return;
  var labels = data.map(function(d) { return d.date.slice(5); });
  var vals   = data.map(function(d) { return d.count; });
  var ctx = document.getElementById('chart-turns').getContext('2d');
  _charts['turns'] = new Chart(ctx, {
    type: 'bar',
    data: { labels: labels, datasets: [{ data: vals, backgroundColor: C.green }] },
    options: _baseOptions('Turns'),
  });
}

function _renderActiveSessions(data) {
  if (!data || !data.length) return;
  var labels = data.map(function(d) { return d.datetime ? d.datetime.slice(5, 16) : ''; });
  var vals   = data.map(function(d) { return d.count; });
  var ctx = document.getElementById('chart-active').getContext('2d');
  _charts['active'] = new Chart(ctx, {
    type: 'line',
    data: { labels: labels, datasets: [{ data: vals, borderColor: C.green,
      backgroundColor: 'rgba(78,204,163,0.1)', fill: true, tension: 0.3, pointRadius: 2 }] },
    options: _baseOptions('Sessions'),
  });
}

function _renderPhaseDistribution(data) {
  if (!data || !data.length) return;
  var labels = data.map(function(d) { return d.phase; });
  var vals   = data.map(function(d) { return d.count; });
  var ctx = document.getElementById('chart-phases').getContext('2d');
  _charts['phases'] = new Chart(ctx, {
    type: 'bar',
    data: { labels: labels, datasets: [{ data: vals, backgroundColor: C.yellow }] },
    options: _baseOptions('Count'),
  });
}

function _renderBacktrackCost(data) {
  if (!data || !data.length) return;
  var labels = data.map(function(d) { return d.kind.replace(/_/g, '\u2192'); });
  var vals   = data.map(function(d) { return d.cost_usd; });
  var ctx = document.getElementById('chart-backtrack').getContext('2d');
  _charts['backtrack'] = new Chart(ctx, {
    type: 'bar',
    data: { labels: labels, datasets: [{ data: vals, backgroundColor: C.red }] },
    options: _baseOptions('USD'),
  });
}

function _renderEscalationOutcomes(data) {
  if (!data || (data.total === 0)) return;
  var ctx = document.getElementById('chart-escalation').getContext('2d');
  _charts['escalation'] = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ['Proxy answered', 'Human answered'],
      datasets: [{ data: [data.by_proxy, data.by_human], backgroundColor: [C.green, C.red] }],
    },
    options: { responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: true, labels: { color: C.text, font: { size: 9 } } } } },
  });
}

function _renderWithdrawalPhases(data) {
  if (!data || !data.length) return;
  var labels = data.map(function(d) { return d.phase; });
  var vals   = data.map(function(d) { return d.count; });
  var ctx = document.getElementById('chart-withdrawal').getContext('2d');
  _charts['withdrawal'] = new Chart(ctx, {
    type: 'bar',
    data: { labels: labels, datasets: [{ data: vals, backgroundColor: C.orange }] },
    options: _baseOptions('Count'),
  });
}

function _renderGatePassRate(data) {
  if (!data || !data.length) return;
  var labels = data.map(function(d) { return d.gate_type; });
  var vals   = data.map(function(d) { return Math.round(d.rate * 100); });
  var ctx = document.getElementById('chart-gatepass').getContext('2d');
  _charts['gatepass'] = new Chart(ctx, {
    type: 'bar',
    data: { labels: labels, datasets: [{ data: vals, backgroundColor: C.green }] },
    options: _baseOptions('%'),
  });
}

// ── Main render ───────────────────────────────────────────────────────────────

function _scopeTitle() {
  if (_agent) return _agent;
  if (_scope) return _scope;
  return 'Organization';
}

function _timeRangeLabel() {
  if (time_range === 'today') return 'Today';
  if (time_range === '7d')    return 'Last 7 days';
  if (time_range === '30d')   return 'Last 30 days';
  return 'All time';
}

function _updateUrl() {
  var qs = [];
  if (_scope)   qs.push('scope='   + encodeURIComponent(_scope));
  if (_agent)   qs.push('agent='   + encodeURIComponent(_agent));
  if (_session) qs.push('session=' + encodeURIComponent(_session));
  qs.push('time_range=' + encodeURIComponent(time_range));
  history.replaceState({}, '', 'stats.html?' + qs.join('&'));
}

function render() {
  _destroyCharts();
  _updateUrl();

  var content = document.getElementById('content');
  var html = '';
  html += '<div class="stats-scope-title">Statistics \u2014 ' + _scopeTitle() + '</div>';
  html += '<div class="stats-scope-subtitle">' + _timeRangeLabel() + '</div>';

  html += '<div class="time-range-bar"><span>Time range:</span>';
  [['today','Today'],['7d','7 days'],['30d','30 days'],['all','All time']].forEach(function(pair) {
    var active = time_range === pair[0] ? ' active' : '';
    html += '<button class="time-range-btn' + active + '" onclick="setTimeRange(\''
      + pair[0] + '\')">' + pair[1] + '</button>';
  });
  html += '</div>';

  html += '<div class="chart-grid">';
  html += _cardHTML('chart-cost',       'Cost Over Time (USD)');
  html += _cardHTML('chart-turns',      'Turns per Day');
  html += _cardHTML('chart-active',     'Active Sessions Timeline');
  html += _cardHTML('chart-phases',     'Phase Distribution');
  html += _cardHTML('chart-backtrack',  'Backtrack Cost by Kind (cost_over_time)');
  html += _cardHTML('chart-escalation', 'Escalation Outcomes');
  html += _cardHTML('chart-withdrawal', 'Withdrawal Phases');
  html += _cardHTML('chart-gatepass',   'Gate Pass Rate (%)');
  html += '</div>';

  content.innerHTML = html;

  Promise.all([
    _fetchChart('cost_over_time'),
    _fetchChart('turns_per_day'),
    _fetchChart('active_sessions_timeline'),
    _fetchChart('phase_distribution'),
    _fetchChart('backtrack_cost'),
    _fetchChart('escalation_outcomes'),
    _fetchChart('withdrawal_phases'),
    _fetchChart('gate_pass_rate'),
  ]).then(function(results) {
    if (results[0]) _renderCostOverTime(results[0].data);
    if (results[1]) _renderTurnsPerDay(results[1].data);
    if (results[2]) _renderActiveSessions(results[2].data);
    if (results[3]) _renderPhaseDistribution(results[3].data);
    if (results[4]) _renderBacktrackCost(results[4].data);
    if (results[5]) _renderEscalationOutcomes(results[5].data);
    if (results[6]) _renderWithdrawalPhases(results[6].data);
    if (results[7]) _renderGatePassRate(results[7].data);
  });
}

function setTimeRange(tr) {
  time_range = tr;
  render();
}

render();
</script>
</body>
</html>
