<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TeaParty</title>
<link rel="stylesheet" href="styles.css">
<style>
  .home { padding: 20px; overflow-y: auto; flex: 1; }
  .home-title { font-size: 18px; font-weight: 600; color: var(--green); margin-bottom: 4px; }
  .home-subtitle { font-size: 10px; color: var(--text-dim); margin-bottom: 16px; }

  .org-row {
    display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap;
  }
  .org-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 5px;
    padding: 10px 14px; cursor: pointer; transition: border-color 0.15s;
    display: flex; align-items: center; gap: 8px; min-width: 140px;
  }
  .org-card:hover { border-color: var(--green); }
  .org-card .oc-icon { font-size: 14px; }
  .org-card .oc-label { font-size: 11px; font-weight: 600; }
  .org-card .oc-meta { font-size: 9px; color: var(--text-dim); }

  .project-grid { columns: 2 320px; column-gap: 12px; }
  .project-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
    overflow: hidden; break-inside: avoid; margin-bottom: 12px;
  }
  .pc-header {
    padding: 10px 14px; display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid var(--border);
  }
  .pc-name { font-size: 13px; font-weight: 600; }
  .pc-status { }
  .pc-description { padding: 6px 14px; font-size: 9px; color: var(--text-dim); font-style: italic; border-bottom: 1px solid var(--border); }
  .pc-stats {
    display: flex; gap: 0; border-bottom: 1px solid var(--border);
  }
  .pc-stat {
    flex: 1; padding: 6px 10px; text-align: center; border-right: 1px solid var(--border);
  }
  .pc-stat:last-child { border-right: none; }
  .pc-stat-value { font-size: 14px; font-weight: 700; }
  .pc-stat-label { font-size: 7px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
  .pc-escalations {
    padding: 6px 14px; border-bottom: 1px solid var(--border);
  }
  .pc-esc-item {
    display: flex; align-items: center; gap: 5px; padding: 3px 0;
    font-size: 9px; color: var(--text-dim); cursor: pointer;
  }
  .pc-esc-item:hover { color: var(--text); }
  .pc-actions {
    display: flex; gap: 0;
  }
  .pc-action {
    flex: 1; padding: 8px 10px; text-align: center; cursor: pointer;
    font-size: 10px; font-family: inherit; color: var(--text-dim);
    background: transparent; border: none; border-right: 1px solid var(--border);
    transition: background 0.1s, color 0.1s;
  }
  .pc-action:last-child { border-right: none; }
  .pc-action:hover { background: rgba(255,255,255,0.03); color: var(--text); }
  .pc-action-icon { font-size: 12px; display: block; margin-bottom: 2px; }

  .attention-badge {
    display: inline-flex; align-items: center; gap: 3px;
    font-size: 9px; color: var(--red); font-weight: 600;
  }
  .attention-dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--red);
    animation: pulse 1.5s infinite;
  }

  /* Accordion sections in the blade */
  .accord-section { flex: 0 0 auto; }
  .accord-section.expanded { flex: 1 1 0; display: flex; flex-direction: column; min-height: 0; }
  .accord-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 10px; cursor: pointer; border-bottom: 1px solid var(--border);
    background: var(--surface); transition: background 0.15s;
    gap: 6px; min-height: 24px; flex-shrink: 0;
  }
  .accord-header:hover { background: rgba(78,204,163,0.05); }
  .accord-header.expanded { background: var(--surface2); border-left: 2px solid var(--green); }
  .accord-label { font-size: 10px; font-weight: 600; color: var(--text); text-transform: capitalize; }
  .accord-body { flex: 1; min-height: 0; overflow: hidden; display: flex; flex-direction: column; }
</style>
</head>
<body>

<div class="blade-layout">
<div class="home" id="content" style="flex:1;min-width:0"></div>
<div class="blade" id="blade">
  <div class="blade-tab" onclick="toggleBlade()"><span id="blade-tab-chevron" style="writing-mode:horizontal-tb;display:inline-block;font-size:14px;line-height:1">&lt;</span></div>
  <div class="blade-body">
    <div class="blade-header"><span class="blade-title" id="blade-title" style="font-size:18px;color:var(--green);text-transform:none;letter-spacing:normal">Management Chat</span></div>
    <div class="blade-filters" id="blade-filters"></div>
    <div id="dispatch-accordion" style="flex:1;display:flex;flex-direction:column;min-height:0"></div>
  </div>
</div>
</div>

<script>
function openPage(url) { location.href = url; }

function createJob(projectSlug) {
  var task = prompt('Describe the job:');
  if (!task) return;
  fetch('/api/jobs', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ project: projectSlug, task: task }),
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.conversation_id) {
      location.href = 'chat.html?conv=' + encodeURIComponent(data.conversation_id);
    }
  })
  .catch(function(err) { alert('Failed to create job: ' + err); });
}

function seedBlade(message) {
  if (!pageState.omConvId) return;
  if (!_bladeOpen) toggleBlade();
  fetch('/api/conversations/' + encodeURIComponent(pageState.omConvId), {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ content: message }),
  });
}

var _bladeOpen = false;

function toggleBlade() {
  _bladeOpen = !_bladeOpen;
  localStorage.setItem('bladeOpen', _bladeOpen ? '1' : '0');
  var el = document.getElementById('blade');
  var chev = document.getElementById('blade-tab-chevron');
  if (_bladeOpen) {
    el.classList.add('open');
    if (chev) chev.innerHTML = '&gt;';
    _updateAccordion();
  } else {
    el.classList.remove('open');
    if (chev) chev.innerHTML = '&lt;';
  }
}

// ── Accordion state ─────────────────────────────────────────────────────────
var _accordionExpanded = null;  // session_id of the currently expanded section
var _dispatchTree = null;       // last fetched tree

function _updateAccordion() {
  if (!_bladeOpen) return;
  var omSessionId = pageState.omSessionId;
  if (!omSessionId) return;
  fetch('/api/dispatch-tree/' + encodeURIComponent(omSessionId))
    .then(function(r) { return r.ok ? r.json() : null; })
    .then(function(tree) {
      if (!tree) return;
      _dispatchTree = tree;
      if (!_accordionExpanded) _accordionExpanded = tree.session_id;
      _renderAccordion();
    })
    .catch(function() {});
}

function _renderAccordion() {
  var container = document.getElementById('dispatch-accordion');
  if (!container || !_dispatchTree) return;

  // Collect current session_ids in the DOM to detect structural changes.
  var currentSections = container.querySelectorAll('.accord-section');
  var currentIds = [];
  for (var i = 0; i < currentSections.length; i++) {
    currentIds.push(currentSections[i].getAttribute('data-session'));
  }

  // Flatten the new tree to get the expected session_id list.
  var flat = _flattenTree(_dispatchTree);
  var newIds = flat.map(function(n) { return n.session_id; });

  // If the structure hasn't changed and the expanded section is the same,
  // only update status badges — don't rebuild (preserves iframe state).
  if (JSON.stringify(currentIds) === JSON.stringify(newIds)) {
    // Update status badges in-place
    flat.forEach(function(node) {
      var section = container.querySelector('[data-session="' + node.session_id + '"]');
      if (section) {
        var badge = section.querySelector('.item-badge');
        if (badge) {
          var statusCls = node.status === 'active' ? 'badge-active' : 'badge-idle';
          badge.className = 'item-badge ' + statusCls;
          badge.textContent = node.status;
        }
      }
    });
    // Check if expanded section changed — if so, full rebuild needed
    var expandedSection = container.querySelector('.accord-section.expanded');
    var expandedId = expandedSection ? expandedSection.getAttribute('data-session') : null;
    if (expandedId === _accordionExpanded) return;
  }

  // If the expanded section no longer exists in the tree, expand its parent.
  var expandedExists = flat.some(function(n) { return n.session_id === _accordionExpanded; });
  if (!expandedExists) {
    _accordionExpanded = _findParent(_dispatchTree, _accordionExpanded) || _dispatchTree.session_id;
  }

  // Structure changed or expanded section changed — full rebuild
  container.innerHTML = _renderNode(_dispatchTree, 0);
  _syncFiltersToIframe();
}

function _renderNode(node, depth) {
  var isExpanded = (_accordionExpanded === node.session_id);
  var indent = depth * 16;
  var statusCls = node.status === 'active' ? 'badge-active' : 'badge-idle';
  var agentLabel = node.agent_name.replace(/-/g, ' ');
  // Capitalize first letter
  agentLabel = agentLabel.charAt(0).toUpperCase() + agentLabel.slice(1);

  var html = '';
  // Section header (always visible)
  var sectionCls = 'accord-section' + (isExpanded ? ' expanded' : '');
  html += '<div class="' + sectionCls + '" data-session="' + node.session_id + '" style="margin-left:' + indent + 'px">';
  html += '<div class="accord-header' + (isExpanded ? ' expanded' : '') + '" onclick="accordionToggle(\'' + node.session_id + '\')">';
  html += '<span class="accord-label">' + agentLabel + '</span>';
  html += '<span class="item-badge ' + statusCls + '" style="font-size:7px">' + node.status + '</span>';
  html += '</div>';

  // Expanded content (iframe with chat)
  if (isExpanded) {
    // The dispatch tree's root node IS the office-manager session
    // itself — its conversation_id in the tree falls back to
    // `dispatch:{session_id}`, but the OM's real chat lives on
    // `om:{qualifier}` (pageState.omConvId). Using the fallback
    // produces a blank iframe, which is what the user sees when
    // CloseConversation bubbles the expanded section back up to the
    // root. Override with omConvId at depth 0.
    var convId;
    if (depth === 0 && pageState.omConvId) {
      convId = pageState.omConvId;
    } else {
      convId = node.conversation_id || ('session:' + node.session_id);
    }
    html += '<div class="accord-body">';
    html += '<iframe src="chat.html?conv=' + encodeURIComponent(convId) + '&minimal=1&_t=' + Date.now() + '" style="width:100%;flex:1;border:none;display:block;min-height:0"></iframe>';
    html += '</div>';
  }
  html += '</div>';

  // Children (rendered after this section, at greater depth)
  if (node.children && node.children.length > 0) {
    for (var i = 0; i < node.children.length; i++) {
      html += _renderNode(node.children[i], depth + 1);
    }
  }
  return html;
}

function accordionToggle(sessionId) {
  _accordionExpanded = sessionId;
  _renderAccordion();
  _syncFiltersToIframe();
}

// When a session completes, remove it and expand the one above
function _handleSessionRemoval(sessionId) {
  if (!_dispatchTree) return;
  var flat = _flattenTree(_dispatchTree);
  var idx = -1;
  for (var i = 0; i < flat.length; i++) {
    if (flat[i].session_id === sessionId) { idx = i; break; }
  }
  if (idx >= 0 && _accordionExpanded === sessionId) {
    // Expand the section above (previous sibling or parent)
    _accordionExpanded = idx > 0 ? flat[idx - 1].session_id : flat[0].session_id;
  }
  _updateAccordion();
}

function _removeFromTree(node, sessionId) {
  if (!node.children) return;
  node.children = node.children.filter(function(c) { return c.session_id !== sessionId; });
  for (var i = 0; i < node.children.length; i++) {
    _removeFromTree(node.children[i], sessionId);
  }
}

function _findParent(tree, targetId) {
  if (!tree.children) return null;
  for (var i = 0; i < tree.children.length; i++) {
    if (tree.children[i].session_id === targetId) return tree.session_id;
    var found = _findParent(tree.children[i], targetId);
    if (found) return found;
  }
  return null;
}

function _flattenTree(node) {
  var result = [node];
  if (node.children) {
    for (var i = 0; i < node.children.length; i++) {
      result = result.concat(_flattenTree(node.children[i]));
    }
  }
  return result;
}

// ── Blade-level filter bar ───────────────────────────────────────────────────
var BLADE_FILTERS = ['agent', 'human', 'thinking', 'tools', 'results', 'system', 'state', 'cost', 'log'];
var bladeActiveFilters = { agent: true, human: true };

function _syncFiltersToIframe() {
  setTimeout(function() {
    var iframe = document.querySelector('.accord-section.expanded iframe');
    if (iframe && iframe.contentWindow) {
      iframe.contentWindow.postMessage({ type: 'setFilters', filters: bladeActiveFilters }, '*');
    }
  }, 300);
}

function renderBladeFilters() {
  var html = BLADE_FILTERS.map(function(f) {
    var on = bladeActiveFilters[f] ? ' on' : '';
    return '<button class="filter-btn filter-' + f + on + '" onclick="toggleBladeFilter(\'' + f + '\')">' + f + '</button>';
  }).join('');
  document.getElementById('blade-filters').innerHTML = html;
}

function toggleBladeFilter(f) {
  bladeActiveFilters[f] = !bladeActiveFilters[f];
  renderBladeFilters();
  _syncFiltersToIframe();
}

renderBladeFilters();

// ── Blade filter CSS (inline) ───────────────────────────────────────────────
(function() {
  var style = document.createElement('style');
  style.textContent = '.blade-filters { display:flex; gap:2px; padding:4px 6px; border-bottom:1px solid var(--border); flex-shrink:0; flex-wrap:wrap; }';
  document.head.appendChild(style);
})();

if (localStorage.getItem('bladeOpen') === '1') {
  _bladeOpen = true;
  document.getElementById('blade').classList.add('open');
  var _chev0 = document.getElementById('blade-tab-chevron');
  if (_chev0) _chev0.innerHTML = '&gt;';
}

// Show a modal dialog for project onboarding (add or create).
// title: dialog heading; endpoint: '/api/projects/add' or '/api/projects/create'
function showProjectModal(title, endpoint) {
  var overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;' +
    'background:rgba(0,0,0,0.7);z-index:1000;display:flex;align-items:center;justify-content:center;';
  overlay.innerHTML =
    '<div style="background:var(--surface);border:1px solid var(--border);border-radius:6px;' +
      'padding:20px;width:380px;font-family:inherit;">' +
      '<div style="font-size:13px;font-weight:600;color:var(--green);margin-bottom:16px;">' + title + '</div>' +
      '<label style="display:block;font-size:10px;color:var(--text-dim);margin-bottom:4px;">Directory path</label>' +
      '<input id="om-path" type="text" placeholder="/path/to/project" ' +
        'style="width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);' +
        'padding:6px 8px;font-size:11px;font-family:inherit;border-radius:3px;margin-bottom:12px;box-sizing:border-box;" />' +
      '<label style="display:block;font-size:10px;color:var(--text-dim);margin-bottom:4px;">Project name</label>' +
      '<input id="om-name" type="text" placeholder="my-project" ' +
        'style="width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);' +
        'padding:6px 8px;font-size:11px;font-family:inherit;border-radius:3px;margin-bottom:6px;box-sizing:border-box;" />' +
      '<div id="om-error" style="font-size:10px;color:var(--red);min-height:16px;margin-bottom:10px;"></div>' +
      '<div style="display:flex;gap:8px;justify-content:flex-end;">' +
        '<button id="om-cancel" style="background:transparent;border:1px solid var(--border);' +
          'color:var(--text-dim);padding:6px 14px;border-radius:3px;font-size:11px;font-family:inherit;cursor:pointer;">' +
          'Cancel</button>' +
        '<button id="om-confirm" style="background:var(--accent2);border:none;color:var(--text);' +
          'padding:6px 14px;border-radius:3px;font-size:11px;font-family:inherit;cursor:pointer;">' +
          'Confirm</button>' +
      '</div>' +
    '</div>';
  document.body.appendChild(overlay);

  var pathInput = document.getElementById('om-path');
  var nameInput = document.getElementById('om-name');
  var errorEl = document.getElementById('om-error');

  // Auto-fill name from the last path segment as the user types.
  pathInput.addEventListener('input', function() {
    var parts = pathInput.value.split('/').filter(Boolean);
    if (parts.length) nameInput.value = parts[parts.length - 1];
  });

  function close() { document.body.removeChild(overlay); }

  document.getElementById('om-cancel').addEventListener('click', close);

  document.getElementById('om-confirm').addEventListener('click', async function() {
    var path = pathInput.value.trim();
    var name = nameInput.value.trim();
    errorEl.textContent = '';
    if (!path) { errorEl.textContent = 'Directory path is required.'; return; }
    if (!name) { errorEl.textContent = 'Project name is required.'; return; }
    try {
      var resp = await fetch(endpoint, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({name: name, path: path}),
      });
      var data = await resp.json();
      if (!resp.ok) { errorEl.textContent = data.error || 'Request failed (' + resp.status + ').'; return; }
      close();
      loadData();
    } catch(e) { errorEl.textContent = e.message; }
  });

  pathInput.focus();
}

function pickAndCreateProject() { showProjectModal('New Project', '/api/projects/create'); }
function pickAndAddProject() { showProjectModal('Add Project', '/api/projects/add'); }

// Standard CfA phase sequence for workflow bar rendering.
// Bars: INTENT, PLAN, WORK, DONE. Gates (circles): INTENT_ASSERT, PLAN_ASSERT, WORK_ASSERT.
var PHASES = ['INTENT', 'INTENT_ASSERT', 'PLAN', 'PLAN_ASSERT', 'WORK', 'WORK_ASSERT', 'DONE'];

// Map CfA states to workflow bar positions.
var STATE_TO_PHASE_IDX = {
  // Intent phase (bar 0)
  'IDEA': 0, 'PROPOSAL': 0, 'INTENT_QUESTION': 0, 'INTENT_ESCALATE': 0, 'INTENT_RESPONSE': 0,
  // Intent gate (circle 1)
  'INTENT_ASSERT': 1,
  // Planning phase (bar 2)
  'INTENT': 2, 'DRAFT': 2, 'PLANNING_QUESTION': 2, 'PLANNING_ESCALATE': 2, 'PLANNING_RESPONSE': 2,
  // Plan gate (circle 3)
  'PLAN_ASSERT': 3,
  // Execution phase (bar 4)
  'PLAN': 4, 'TASK': 4, 'TASK_IN_PROGRESS': 4, 'TASK_QUESTION': 4, 'TASK_ESCALATE': 4,
  'TASK_RESPONSE': 4, 'FAILED_TASK': 4, 'COMPLETED_TASK': 4, 'WORK_IN_PROGRESS': 4,
  'AWAITING_REPLIES': 4,
  // Work gate (circle 5)
  'WORK_ASSERT': 5,
  // Done (bar 6)
  'COMPLETED_WORK': 6, 'WITHDRAWN': 6,
};

function phaseIndex(phase, state) {
  // Prefer state-based lookup for precision.
  if (state && STATE_TO_PHASE_IDX[state] !== undefined) return STATE_TO_PHASE_IDX[state];
  // Fallback: map phase name to segment.
  var phaseMap = { 'intent': 0, 'planning': 2, 'execution': 4 };
  return phaseMap[phase] || 0;
}

function renderWorkflow(phaseIdx, large, needsInput) {
  // Find the gate index at or just after phaseIdx (the next ASSERT segment).
  var activeGate = -1;
  if (needsInput) {
    for (var g = phaseIdx; g < PHASES.length; g++) {
      if (PHASES[g].indexOf('ASSERT') !== -1) { activeGate = g; break; }
    }
  }
  var cls = large ? 'workflow-bar large' : 'workflow-bar';
  var html = '<div class="' + cls + '">';
  for (var i = 0; i < PHASES.length; i++) {
    var ph = PHASES[i];
    var isGate = ph.indexOf('ASSERT') !== -1;
    var isDone = phaseIdx >= PHASES.length - 1;
    var state;
    if (i === activeGate) {
      state = 'active';
    } else if (i < phaseIdx || (isDone && i === phaseIdx)) {
      state = 'complete';
    } else if (i === phaseIdx) {
      state = 'active';
    } else {
      state = '';
    }
    if (isGate) {
      html += '<div class="wf-gate ' + state + '" title="' + ph + '"></div>';
    } else {
      html += '<div class="wf-bar ' + state + '" title="' + ph + '"></div>';
    }
  }
  html += '</div>';
  return html;
}

// Page state: updated by fetchAll() and WebSocket events.
// escalationConvMap: session_id → conversation_id from input_requested events.
var pageState = { projects: [], configs: {}, omConvId: 'om:darrell', omSessionId: 'office-manager-darrell', escalationConvMap: {} };

function fetchAll() {
  Promise.all([
    fetch('/api/state').then(function(r) { return r.json(); }),
    fetch('/api/conversations?type=office_manager').then(function(r) { return r.json(); })
  ]).then(function(results) {
    pageState.projects = results[0] || [];
    var omConvs = results[1] || [];
    if (omConvs.length > 0) {
      pageState.omConvId = omConvs[0].id;
      // Derive session_id: om:{qualifier} → office-manager-{qualifier}
      var qualifier = omConvs[0].id.replace(/^om:/, '');
      pageState.omSessionId = 'office-manager-' + qualifier;
      _updateAccordion();
    }
    var configFetches = pageState.projects.map(function(p) {
      return fetch('/api/config/' + encodeURIComponent(p.slug))
        .then(function(r) { return r.json(); })
        .then(function(cfg) { pageState.configs[p.slug] = cfg; })
        .catch(function() {});
    });
    return Promise.all(configFetches);
  }).then(function() {
    render();
    // Merge escalation state from REST into escalationConvMap.
    // Only ADD entries for sessions the server says need input — never remove
    // entries established by WebSocket input_requested events. The map is
    // the sticky source of truth; only onMessage() (human reply) clears it.
    pageState.projects.forEach(function(p) {
      (p.sessions || []).forEach(function(s) {
        if (s.needs_input && s.input_conv_id && !pageState.escalationConvMap[s.session_id]) {
          pageState.escalationConvMap[s.session_id] = s.input_conv_id;
        }
      });
    });
  }).catch(function() {
    document.getElementById('content').innerHTML =
      '<p style="color:var(--red);padding:20px">Bridge not reachable. Start the bridge server first.</p>';
  });
}

function render() {
  // Use escalationConvMap as the sticky source of truth for escalation count.
  // REST attention_count may lag behind or clear prematurely; the map is only
  // cleared when the human explicitly responds (onMessage).
  var totalEsc = Object.keys(pageState.escalationConvMap).length;

  // Org row
  var orgHtml = '<div class="org-row">';
  orgHtml += '<div class="org-card" onclick="openPage(\'config.html\')">';
  orgHtml += '<span class="oc-icon">&#9881;</span>';
  orgHtml += '<div><div class="oc-label">Management Team</div><div class="oc-meta">Organization catalog</div></div>';
  orgHtml += '</div>';

  orgHtml += '<div class="org-card" onclick="openPage(\'stats.html\')">';
  orgHtml += '<span class="oc-icon">&#9733;</span>';
  orgHtml += '<div><div class="oc-label">Statistics</div><div class="oc-meta">Org-wide metrics</div></div>';
  orgHtml += '</div>';

  if (totalEsc > 0) {
    orgHtml += '<div class="org-card" style="border-color:var(--red)">';
    orgHtml += '<span class="attention-dot"></span>';
    orgHtml += '<div><div class="oc-label" style="color:var(--red)">' + totalEsc + ' Escalations</div><div class="oc-meta">Across all projects</div></div>';
    orgHtml += '</div>';
  }

  orgHtml += '</div>';

  // Project cards
  var projectsHtml = '<div class="project-grid">';

  pageState.projects.forEach(function(p) {
    var cfg = pageState.configs[p.slug] || {};
    var team = cfg.team || {};
    var description = team.description || '';
    var workgroupCount = (cfg.workgroups || []).length;
    var activeSessions = (p.sessions || []).filter(function(s) { return s.status === 'active'; });
    var status = p.active_count > 0 ? 'active' : 'idle';

    projectsHtml += '<div class="project-card">';

    // Header — click navigates to project config
    projectsHtml += '<div class="pc-header" style="cursor:pointer" onclick="openPage(\'config.html?project=' + p.slug + '\')">';
    projectsHtml += '<div class="pc-name">' + p.slug + '</div>';
    projectsHtml += '<span class="item-badge badge-' + status + '">' + status.toUpperCase() + '</span>';
    projectsHtml += '</div>';

    // Description (only shown when config provides one)
    if (description) {
      projectsHtml += '<div class="pc-description">' + description + '</div>';
    }

    // Stats
    projectsHtml += '<div class="pc-stats">';
    projectsHtml += '<div class="pc-stat"><div class="pc-stat-value" style="color:var(--green)">' + p.active_count + '</div><div class="pc-stat-label">Active Jobs</div></div>';
    // Count sticky escalations for this project from escalationConvMap
    var projEsc = (p.sessions || []).filter(function(s) {
      return s.needs_input || !!pageState.escalationConvMap[s.session_id];
    }).length;
    var escStyle = projEsc > 0 ? ' style="color:var(--red)"' : '';
    projectsHtml += '<div class="pc-stat"><div class="pc-stat-value"' + escStyle + '>' + projEsc + '</div><div class="pc-stat-label">Escalations</div></div>';
    projectsHtml += '<div class="pc-stat"><div class="pc-stat-value">' + workgroupCount + '</div><div class="pc-stat-label">Workgroups</div></div>';
    projectsHtml += '</div>';

    // Active session rows (job rows) — omitted when idle (zero active sessions)
    if (activeSessions.length > 0) {
      projectsHtml += '<div style="border-bottom:1px solid var(--border)">';
      activeSessions.forEach(function(s) {
        var convId = 'job:' + p.slug + ':' + s.session_id;
        var pIdx = phaseIndex(s.cfa_phase, s.cfa_state);
        var jobName = s.task || s.session_id;
        projectsHtml += '<div class="pc-esc-item" style="padding:5px 14px;gap:6px" data-session="' + s.session_id + '" onclick="openPage(\'chat.html?conv=' + convId + '\')">';
        // Show badge from escalationConvMap (sticky) OR REST needs_input (initial load).
        var stickyConvId = pageState.escalationConvMap[s.session_id];
        if (s.needs_input || stickyConvId) {
          // Build task-specific escalation URL from sticky map or REST input_conv_id.
          // task: conv → job:…&task=…  |  job: conv → job:…  |  fallback → job: (no task)
          var rawConvId = stickyConvId || s.input_conv_id || '';
          var escParts = rawConvId.split(':');
          var escUrl = (escParts[0] === 'task' && escParts.length === 4)
            ? ('chat.html?conv=job:' + escParts[1] + ':' + escParts[2] + '&task=' + escParts[3])
            : ('chat.html?conv=' + convId);
          projectsHtml += '<span class="attention-dot" onclick="event.stopPropagation();openPage(\'' + escUrl + '\')"></span>';
        } else {
          projectsHtml += '<span style="width:6px"></span>';
        }
        projectsHtml += '<span style="flex-shrink:0;width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:9px;color:var(--text)">' + jobName + '</span>';
        projectsHtml += '<span style="flex:1">' + renderWorkflow(pIdx, false, s.needs_input || !!stickyConvId) + '</span>';
        var liveness = s.heartbeat_status === 'alive' ? 'active' : 'idle';
        projectsHtml += '<span class="item-badge badge-' + liveness + '" style="flex-shrink:0">' + liveness + '</span>';
        projectsHtml += '</div>';
      });
      projectsHtml += '</div>';
    }

    // Action buttons
    var pName = p.name || p.slug;
    projectsHtml += '<div class="pc-actions">';
    projectsHtml += '<button class="pc-action" onclick="createJob(\'' + p.slug + '\')"><span class="pc-action-icon">&#9654;</span>New Job</button>';
    projectsHtml += '<button class="pc-action" onclick="seedBlade(\'Please pause all running jobs for the ' + pName + ' project.\')"><span class="pc-action-icon">&#9646;&#9646;</span>Pause All</button>';
    projectsHtml += '<button class="pc-action" onclick="seedBlade(\'Please restart all paused jobs for the ' + pName + ' project.\')"><span class="pc-action-icon">&#9654;</span>Restart All</button>';
    projectsHtml += '<button class="pc-action" onclick="seedBlade(\'Please ask the ' + pName + ' lead for a status update.\')"><span class="pc-action-icon">&#9733;</span>Status</button>';
    projectsHtml += '</div>';

    projectsHtml += '</div>';
  });

  projectsHtml += '</div>';

  document.getElementById('content').innerHTML =
    '<div class="home-title">TeaParty</div>' +
    '<div class="home-subtitle">Agent coordination platform</div>' +
    orgHtml +
    '<div style="display:flex;align-items:center;margin-bottom:8px"><span style="font-size:11px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.5px">Projects</span><span style="flex:1"></span><button style="background:var(--accent2);color:var(--text);border:none;padding:4px 8px;border-radius:3px;font-size:9px;font-family:inherit;cursor:pointer;margin-right:4px" onclick="pickAndAddProject()">Add Project</button><button style="background:var(--accent2);color:var(--text);border:none;padding:4px 10px;border-radius:3px;font-size:9px;font-family:inherit;cursor:pointer" onclick="pickAndCreateProject()">+ New Project</button></div>' +
    projectsHtml;
}

// WebSocket for real-time updates. Reconnects on disconnect with 3s delay.
function connectWS() {
  var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  var ws = new WebSocket(proto + '//' + location.host + '/ws');

  ws.onmessage = function(e) {
    try {
      var event = JSON.parse(e.data);
      if (event.type === 'state_changed') {
        onStateChanged(event.session_id, event.phase, event.state);
      } else if (event.type === 'input_requested') {
        onInputRequested(event.session_id, event.conversation_id);
      } else if (event.type === 'escalation_cleared') {
        // Issue #398: dedicated server event for awaiting_input True→False
        // transitions. Replaces the prior side channel that inferred clearance
        // from human-sender 'message' broadcasts — index.html no longer
        // subscribes to or inspects chat messages.
        onEscalationCleared(event.session_id);
      } else if (event.type === 'session_completed') {
        // Session is done — its escalation no longer requires a response.
        delete pageState.escalationConvMap[event.session_id];
        _handleSessionRemoval(event.session_id);
        fetchAll();
      } else if (event.type === 'dispatch_started') {
        // New child — must re-fetch tree to discover it.
        _updateAccordion();
      } else if (event.type === 'dispatch_completed') {
        // Child removed — apply locally for instant feedback.
        // Don't re-fetch: the parent may still be running and we
        // need to show it before its own completion event arrives.
        if (_dispatchTree) {
          // If we're viewing the child that just completed, expand its parent.
          if (_accordionExpanded === event.child_session_id) {
            _accordionExpanded = event.parent_session_id || _dispatchTree.session_id;
          }
          _removeFromTree(_dispatchTree, event.child_session_id);
          // After removal, make sure _accordionExpanded still points to
          // a node that exists. In a recursive-close cascade the parent
          // we just jumped to may itself be about to be removed, or was
          // already removed by a prior event in the same cascade — fall
          // back up the chain until we hit a surviving node, or the
          // tree root as a last resort. Without this the iframe
          // renders nothing (blank section).
          var flatAfter = _flattenTree(_dispatchTree);
          var stillExists = flatAfter.some(function(n) {
            return n.session_id === _accordionExpanded;
          });
          if (!stillExists) {
            _accordionExpanded = _dispatchTree.session_id;
          }
          var container = document.getElementById('dispatch-accordion');
          if (container) container.innerHTML = _renderNode(_dispatchTree, 0);
          _syncFiltersToIframe();
        }
      }
    } catch (err) {}
  };

  ws.onclose = function() {
    setTimeout(connectWS, 3000);
  };
}

// Update a session row's workflow bar and status badge in-place on state_changed.
function onStateChanged(sessionId, phase, cfaState) {
  var row = document.querySelector('[data-session="' + sessionId + '"]');
  if (!row) { fetchAll(); return; }
  // Update workflow bar in-place
  var barEl = row.querySelector('.workflow-bar');
  if (barEl) {
    var tmp = document.createElement('div');
    var hasEsc = !!pageState.escalationConvMap[sessionId];
    tmp.innerHTML = renderWorkflow(phaseIndex(phase, cfaState), false, hasEsc);
    var newBar = tmp.firstChild;
    if (newBar) barEl.parentNode.replaceChild(newBar, barEl);
  }
  // Update status badge in-place
  var badge = row.querySelector('.item-badge');
  if (badge) {
    var newStatus = (cfaState === 'COMPLETED_WORK' || cfaState === 'WITHDRAWN') ? 'idle' : 'active';
    badge.className = 'item-badge badge-' + newStatus;
    badge.textContent = newStatus;
  }
  // Keep page state in sync
  pageState.projects.forEach(function(p) {
    (p.sessions || []).forEach(function(s) {
      if (s.session_id === sessionId) {
        s.cfa_phase = phase;
        s.cfa_state = cfaState;
      }
    });
  });
  // Refresh accordion — new dispatches may have appeared
  _updateAccordion();
}

// Add escalation dot to a session row on input_requested.
// convId is the conversation_id from the event (e.g. task:poc:job-001:task-a).
function onInputRequested(sessionId, convId) {
  pageState.escalationConvMap[sessionId] = convId || ('session:' + sessionId);
  // Derive click target: all escalations navigate in job: format per spec.
  // task: conv → job:{project}:{job_id}&task={task_id}
  // job: conv → use as-is
  // session: conv (uberteam requesting input directly) → rewrite as job:{slug}:{sessionId}
  var parts = convId ? convId.split(':') : [];
  var dotUrl;
  if (parts[0] === 'task' && parts.length === 4) {
    dotUrl = 'chat.html?conv=job:' + parts[1] + ':' + parts[2] + '&task=' + parts[3];
  } else if (parts[0] === 'job') {
    dotUrl = 'chat.html?conv=' + convId;
  } else {
    // session: type or unknown — look up project slug to build job: URL
    var projectSlug = '';
    pageState.projects.forEach(function(proj) {
      (proj.sessions || []).forEach(function(s) {
        if (s.session_id === sessionId) { projectSlug = proj.slug; }
      });
    });
    dotUrl = projectSlug
      ? 'chat.html?conv=job:' + projectSlug + ':' + sessionId
      : 'chat.html?conv=session:' + sessionId;
  }
  var row = document.querySelector('[data-session="' + sessionId + '"]');
  if (row) {
    var dotSlot = row.firstElementChild;
    if (dotSlot && !dotSlot.classList.contains('attention-dot')) {
      dotSlot.className = 'attention-dot';
    }
    if (dotSlot) {
      var url = dotUrl;
      dotSlot.onclick = function(e) { e.stopPropagation(); openPage(url); };
    }
  }
  // Keep page state in sync so re-renders preserve the escalation dot
  pageState.projects.forEach(function(p) {
    (p.sessions || []).forEach(function(s) {
      if (s.session_id === sessionId && !s.needs_input) {
        s.needs_input = true;
        p.attention_count = (p.attention_count || 0) + 1;
      }
    });
  });
}

// Clear the escalation dot and decrement the project attention badge in
// response to a server-emitted ``escalation_cleared`` event (issue #398).
// The relay fires this exactly once when a conversation's awaiting_input
// flag transitions True → False.
function onEscalationCleared(sessionId) {
  if (!sessionId || !pageState.escalationConvMap[sessionId]) return;
  delete pageState.escalationConvMap[sessionId];
  var row = document.querySelector('[data-session="' + sessionId + '"]');
  if (row) {
    var dotSlot = row.firstElementChild;
    if (dotSlot && dotSlot.classList.contains('attention-dot')) {
      dotSlot.className = '';
      dotSlot.style.width = '6px';
      dotSlot.onclick = null;
    }
  }
  pageState.projects.forEach(function(p) {
    (p.sessions || []).forEach(function(s) {
      if (s.session_id === sessionId && s.needs_input) {
        s.needs_input = false;
        p.attention_count = Math.max(0, (p.attention_count || 1) - 1);
      }
    });
  });
}

fetchAll();
connectWS();
</script>
