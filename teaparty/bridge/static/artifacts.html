<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TeaParty — Artifacts</title>
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11.9.0/styles/atom-one-dark.min.css">
<script src="breadcrumb.js"></script>
<script src="accordion-chat.js"></script>
<script src="artifact-page.js"></script>
</head>
<body>

<div class="blade-layout">
<div class="content-wrap">
<div id="breadcrumb-slot" style="padding:6px 12px"></div>
<!-- Stats bar explicitly excluded from artifacts page (#406).
     The artifact browser's focus is file-level, not session/project-level.
     A stats strip here would be visual noise with no actionable context. -->
<div id="artifact-content" style="display:flex;flex-direction:column;flex:1;min-height:0"></div>
</div>
<div class="blade" id="blade"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11.9.0/highlight.min.js"></script>
<script>
var params = new URLSearchParams(window.location.search);
var project = params.get('project') || 'poc';
ArtifactPage.mount({
  contentEl: document.getElementById('artifact-content'),
  breadcrumbEl: document.getElementById('breadcrumb-slot'),
  bladeEl: document.getElementById('blade'),
  mode: 'browse',
  projectSlug: project,
  pinScope: params.get('scope') || 'project',
  pinName: params.get('name') || '',
  customTitle: params.get('title') || null,
  requestedFile: params.get('file') || null,
  requestedDir: params.get('dir') || null,
  conv: params.get('conv') || '',
  chatConversationId: 'config:artifact:' + project + ':' + (params.get('file') || 'browse'),
  chatAgentName: 'configuration-lead',
  chatLaunchRepo: '',
  chatTitle: 'Config Lead',
});
</script>
</body>
</html>
